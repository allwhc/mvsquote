                    colStyles = { 0: { cellWidth: 'auto' }, 1: { halign: 'center', cellWidth: 15 }, 2: { halign: 'right', cellWidth: 25 }, 3: { halign: 'center', cellWidth: 18 }, 4: { halign: 'right', cellWidth: 25 }, 5: { halign: 'right', cellWidth: 25 } };
                } else {
                    tableHead = [['Product', 'Qty', 'Price', 'Total']];
                    tableData = doc.items.map(item => {
                        const netPrice = item.mrp * (1 - (item.discount || 0) / 100);
                        return [item.name, item.qty.toString(), formatCurrencyPDF(netPrice), formatCurrencyPDF(netPrice * item.qty)];
                    });
                    colStyles = { 0: { cellWidth: 'auto' }, 1: { halign: 'center', cellWidth: 20 }, 2: { halign: 'right', cellWidth: 30 }, 3: { halign: 'right', cellWidth: 30 } };
                }

                pdf.autoTable({
                    startY: 104,
                    head: tableHead,
                    body: tableData,
                    theme: 'striped',
                    headStyles: { fillColor: brandColor, fontSize: 9, fontStyle: 'bold', cellPadding: 4 },
                    bodyStyles: { fontSize: 9, cellPadding: 4, overflow: 'linebreak' },
                    columnStyles: colStyles,
                    tableWidth: 180,
                    margin: { left: 15, right: 15 }
                });

                // Summary
                const finalY = pdf.lastAutoTable.finalY + 12;

                let summaryOffset = 0;

                if (docIncludeGST) {
                    pdf.setFontSize(11);
                    pdf.setTextColor(80);
                    pdf.text('Subtotal:', 135, finalY);
                    pdf.setTextColor(30);
                    pdf.setFont('helvetica', 'bold');
                    pdf.text(formatCurrencyPDF(doc.subtotal), 195, finalY, { align: 'right' });

                    pdf.setFont('helvetica', 'normal');
                    pdf.setTextColor(80);
                    pdf.text('GST (' + CONFIG.GST_RATE + '%):', 135, finalY + 8);
                    pdf.setTextColor(30);
                    pdf.setFont('helvetica', 'bold');
                    pdf.text(formatCurrencyPDF(doc.gst), 195, finalY + 8, { align: 'right' });

                    pdf.setDrawColor(...brandColor);
                    pdf.setLineWidth(0.5);
                    pdf.line(120, finalY + 13, 195, finalY + 13);

                    pdf.setFont('helvetica', 'bold');
                    pdf.setFontSize(14);
                    pdf.setTextColor(...brandColor);
                    pdf.text('Grand Total:', 120, finalY + 20);
                    pdf.setTextColor(16, 185, 129);
                    pdf.text(formatCurrencyPDF(doc.grandTotal), 195, finalY + 20, { align: 'right' });
                    summaryOffset = 28;
                } else {
                    pdf.setDrawColor(...brandColor);
                    pdf.setLineWidth(0.5);
                    pdf.line(120, finalY - 2, 195, finalY - 2);

                    pdf.setFont('helvetica', 'bold');
                    pdf.setFontSize(14);
                    pdf.setTextColor(...brandColor);
                    pdf.text('Total:', 140, finalY + 6);
                    pdf.setTextColor(16, 185, 129);
                    pdf.text(formatCurrencyPDF(doc.grandTotal), 195, finalY + 6, { align: 'right' });
                    summaryOffset = 14;
                }

                // Notes - placed below the summary block with bullet points
                let notesEndY = finalY + summaryOffset;
                if (doc.notes) {
                    const notesStartY = finalY + summaryOffset + 4;
                    pdf.setTextColor(...brandColor);
                    pdf.setFont('helvetica', 'bold');
                    pdf.setFontSize(10);
                    pdf.text('Terms & Conditions:', 15, notesStartY);
                    pdf.setFont('helvetica', 'normal');
                    pdf.setFontSize(9);
                    pdf.setTextColor(60);
                    const bulletLines = doc.notes.split('\n').filter(l => l.trim());
                    let bulletY = notesStartY + 7;
                    bulletLines.forEach(line => {
                        const wrapped = pdf.splitTextToSize(line.trim(), 165);
                        pdf.text('\u2022', 17, bulletY);
                        pdf.text(wrapped, 22, bulletY);
                        bulletY += wrapped.length * 4.5 + 2;
                    });
                    notesEndY = bulletY;
                }

                // Footer
                let footerY = Math.max(notesEndY + 10, 255);

                // Bank details - only on invoices
                if (type === 'invoice') {
                    pdf.setDrawColor(200);
                    pdf.line(15, footerY, 195, footerY);
                    footerY += 5;
                    pdf.setTextColor(...brandColor);
                    pdf.setFont('helvetica', 'bold');
                    pdf.setFontSize(9);
                    pdf.text('Bank Details:', 15, footerY);
                    pdf.setFont('helvetica', 'normal');
                    pdf.setFontSize(8);
                    pdf.setTextColor(60);
                    pdf.text('Bank: ' + CONFIG.BANK.name + ', ' + CONFIG.BANK.branch, 15, footerY + 5);
                    pdf.text('A/C No: ' + CONFIG.BANK.account + '  |  IFSC: ' + CONFIG.BANK.ifsc, 15, footerY + 10);
                    footerY += 16;
                }

                // Brand of MV Solutions line - for sub-brands
                if (brand.subtitle) {
                    pdf.setDrawColor(200);
                    pdf.line(15, footerY, 195, footerY);
                    footerY += 5;
                    pdf.setTextColor(120);
                    pdf.setFontSize(8);
                    pdf.text(brand.name + ' is a brand of MV Solutions | GSTIN: ' + CONFIG.COMPANY.gst, 105, footerY, { align: 'center' });
                    footerY += 6;
                }

                pdf.setTextColor(150);
                pdf.setFontSize(8);
                pdf.text('Thank you for your business!', 105, Math.min(footerY + 4, 292), { align: 'center' });

                // Save
                const filename = `${type === 'invoice' ? 'INV' : 'QT'}-${doc.number}.pdf`;
                pdf.save(filename);
            };

            return (
                <div>
                    <div className="page-header">
                        <div>
                            <h1 className="page-title">Saved Documents</h1>
                            <p className="page-subtitle">All quotations and invoices - click to view details</p>
                        </div>
                    </div>

                    <div className="card">
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Document #</th>
                                        <th>Brand</th>
                                        <th>Date</th>
                                        <th>Customer</th>
                                        <th>Items</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {quotations.length === 0 ? (
                                        <tr>
                                            <td colSpan="8" style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>
                                                No documents yet. Create a quotation to get started.
                                            </td>
                                        </tr>
                                    ) : (
                                        quotations.map(doc => {
                                            const bk = doc.brand || 'MV Solutions';
                                            const bi = CONFIG.BRANDS[bk] || CONFIG.BRANDS['MV Solutions'];
                                            return (
                                            <tr key={doc.id}>
                                                <td><span className="code-badge">{doc.number}</span></td>
                                                <td><span style={{ padding: '2px 10px', borderRadius: '12px', fontSize: '11px', fontWeight: '600', color: 'rgb(' + bi.color.join(',') + ')', background: 'rgba(' + bi.color.join(',') + ', 0.1)', border: '1px solid rgba(' + bi.color.join(',') + ', 0.3)', whiteSpace: 'nowrap' }}>{bk}</span></td>
                                                <td>{formatDate(doc.date)}</td>
                                                <td>
                                                    <strong>{doc.customer.name}</strong>
                                                    {doc.customer.phone && <small style={{ display: 'block', color: 'var(--text-muted)' }}>{doc.customer.phone}</small>}
                                                </td>
                                                <td>{doc.items.length} items</td>
                                                <td className="price green">{formatCurrency(doc.grandTotal)}</td>
                                                <td>
                                                    <select 
                                                        className="form-select" 
                                                        style={{ padding: '4px 8px', fontSize: '12px', width: 'auto' }}
                                                        value={doc.status} 
                                                        onChange={e => updateStatus(doc.id, e.target.value)}
                                                    >
                                                        <option value="draft">Draft</option>
                                                        <option value="sent">Sent</option>
                                                        <option value="accepted">Accepted</option>
                                                        <option value="rejected">Rejected</option>
                                                        <option value="invoiced">Invoiced</option>
                                                    </select>
                                                </td>
                                                <td className="actions">
                                                    <button className="btn btn-secondary btn-sm btn-icon" onClick={() => viewDocument(doc)} title="View Details">
                                                        <Icons.Eye />
                                                    </button>
                                                    <button className="btn btn-danger btn-sm btn-icon" onClick={() => deleteDocument(doc.id)} title="Delete">
                                                        <Icons.Trash />
                                                    </button>
                                                </td>
                                            </tr>
                                        );})
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* View Document Modal */}
                    <Modal
                        isOpen={showModal}
                        onClose={() => { setShowModal(false); setSelectedDoc(null); }}
                        title={`Document: ${selectedDoc?.number || ''}`}
                        size="large"
                        footer={
                            <>
                                <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Close</button>
                                <button className="btn btn-primary" onClick={() => generatePDFFromDoc(selectedDoc, 'quotation')}>
                                    <Icons.Download /> Quotation PDF
                                </button>
                                <button className="btn btn-success" onClick={() => generatePDFFromDoc(selectedDoc, 'invoice')}>
                                    <Icons.Download /> Invoice PDF
                                </button>
                            </>
                        }
                    >
                        {selectedDoc && (
                            <div>
                                {/* Customer Info */}
                                <div style={{ background: 'var(--bg)', padding: '16px', borderRadius: '8px', marginBottom: '16px' }}>
                                    <h4 style={{ marginBottom: '12px', color: 'var(--primary)' }}>Customer Details</h4>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                        <div>
                                            <label style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Name</label>
                                            <div style={{ fontWeight: '600' }}>{selectedDoc.customer.name || 'N/A'}</div>
                                        </div>
                                        <div>
                                            <label style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Phone</label>
                                            <div>{selectedDoc.customer.phone || 'N/A'}</div>
                                        </div>
                                        <div style={{ gridColumn: 'span 2' }}>
                                            <label style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Address</label>
                                            <div>{selectedDoc.customer.address || 'N/A'}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Items Table */}
                                <div style={{ marginBottom: '16px' }}>
                                    <h4 style={{ marginBottom: '12px', color: 'var(--primary)' }}>Items</h4>
                                    <table style={{ width: '100%', fontSize: '13px' }}>
                                        <thead>
                                            <tr style={{ background: 'var(--primary)', color: 'white' }}>
                                                <th style={{ padding: '10px', textAlign: 'left' }}>Product</th>
                                                <th style={{ padding: '10px', textAlign: 'center' }}>Qty</th>
                                                <th style={{ padding: '10px', textAlign: 'right' }}>MRP</th>
                                                <th style={{ padding: '10px', textAlign: 'center' }}>Disc %</th>
                                                <th style={{ padding: '10px', textAlign: 'right' }}>Net Price</th>
                                                <th style={{ padding: '10px', textAlign: 'right' }}>Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {selectedDoc.items.map((item, idx) => {
                                                const netPrice = item.mrp * (1 - (item.discount || 0) / 100);
                                                return (
                                                    <tr key={idx} style={{ borderBottom: '1px solid var(--border)' }}>
                                                        <td style={{ padding: '10px' }}>
                                                            <strong>{item.name}</strong>
                                                            <small style={{ display: 'block', color: 'var(--text-muted)' }}>{item.sku}</small>
                                                        </td>
                                                        <td style={{ padding: '10px', textAlign: 'center' }}>{item.qty}</td>
                                                        <td style={{ padding: '10px', textAlign: 'right' }}>{formatCurrency(item.mrp)}</td>
                                                        <td style={{ padding: '10px', textAlign: 'center' }}>{item.discount > 0 ? `${item.discount}%` : '-'}</td>
                                                        <td style={{ padding: '10px', textAlign: 'right' }}>{formatCurrency(netPrice)}</td>
                                                        <td style={{ padding: '10px', textAlign: 'right', fontWeight: '600', color: 'var(--success)' }}>{formatCurrency(netPrice * item.qty)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>

                                {/* Totals */}
                                <div style={{ background: 'linear-gradient(135deg, var(--primary-lighter) 0%, #E0E7FF 100%)', padding: '16px', borderRadius: '8px' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                                        <span style={{ color: 'var(--text-muted)' }}>Subtotal</span>
                                        <span style={{ fontFamily: 'JetBrains Mono, monospace', fontWeight: '600' }}>{formatCurrency(selectedDoc.subtotal)}</span>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                                        <span style={{ color: 'var(--text-muted)' }}>GST ({CONFIG.GST_RATE}%)</span>
                                        <span style={{ fontFamily: 'JetBrains Mono, monospace', fontWeight: '600' }}>{formatCurrency(selectedDoc.gst)}</span>
                                    </div>
                                    <div style={{ borderTop: '2px solid var(--primary)', paddingTop: '12px', marginTop: '8px', display: 'flex', justifyContent: 'space-between' }}>
                                        <span style={{ fontSize: '16px', fontWeight: '700', color: 'var(--primary)' }}>Grand Total</span>
                                        <span style={{ fontSize: '18px', fontWeight: '700', color: 'var(--success)', fontFamily: 'JetBrains Mono, monospace' }}>{formatCurrency(selectedDoc.grandTotal)}</span>
                                    </div>
                                </div>

                                {/* Notes */}
                                {selectedDoc.notes && (
                                    <div style={{ marginTop: '16px', padding: '12px', background: 'var(--bg)', borderRadius: '8px' }}>
                                        <label style={{ fontSize: '12px', color: 'var(--text-muted)', display: 'block', marginBottom: '4px' }}>Notes / Terms</label>
                                        <div style={{ fontSize: '13px' }}>{selectedDoc.notes}</div>
                                    </div>
                                )}

                                {/* Document Info */}
                                <div style={{ marginTop: '16px', display: 'flex', gap: '16px', fontSize: '12px', color: 'var(--text-muted)' }}>
                                    <span>Created: {new Date(selectedDoc.date).toLocaleString('en-IN')}</span>
                                    <span>Status: <strong style={{ color: 'var(--text)' }}>{selectedDoc.status}</strong></span>
                                </div>
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        // ============ SYNC ICONS ============
        const SyncIcons = {
            Cloud: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
            Upload: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Download: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Refresh: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
            Check: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
            Alert: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

        // ============ LOADING COMPONENT ============
        const LoadingScreen = ({ message }) => (

        // ============ COMPONENT ESTIMATOR ============
        const ComponentEstimator = ({ products, items, bom, subProducts }) => {
            const [selectedProduct, setSelectedProduct] = useState('');
            const [quantity, setQuantity] = useState(1);
            const [productList, setProductList] = useState([]);
            const [componentResults, setComponentResults] = useState([]);
            const [grandTotal, setGrandTotal] = useState(0);
            const [showVendorContact, setShowVendorContact] = useState(true);

            const addProduct = () => {
                if (!selectedProduct || quantity < 1) return;
                const product = products.find(p => p.sku === selectedProduct);
                if (!product) return;

                // Check if already in list
                const existingIndex = productList.findIndex(p => p.sku === selectedProduct);
                if (existingIndex >= 0) {
                    const updated = [...productList];
                    updated[existingIndex].qty += quantity;
                    setProductList(updated);
                } else {
                    setProductList([...productList, { sku: product.sku, name: product.name, qty: quantity }]);
                }
                setSelectedProduct('');
                setQuantity(1);
            };

            const removeProduct = (sku) => {
                setProductList(productList.filter(p => p.sku !== sku));
            };

            // Recursive function to get all components for a product
            const getProductComponents = (productSku, multiplier = 1, visited = new Set()) => {
                if (visited.has(productSku)) return [];
                visited.add(productSku);

                let components = [];

                // Get direct components from BOM
                const directComponents = bom.filter(b => b.productSku === productSku);
                directComponents.forEach(dc => {
                    components.push({
                        code: dc.componentCode,
                        qty: dc.qty * multiplier
                    });
                });

                // Get sub-products and their components recursively
                const subs = subProducts.filter(sp => sp.productSku === productSku);
                subs.forEach(sub => {
                    const subComponents = getProductComponents(sub.subProductSku, sub.qty * multiplier, new Set(visited));
                    components = [...components, ...subComponents];
                });

                return components;
            };

            const calculateComponents = () => {
                if (productList.length === 0) return;

                // Collect all components
                let allComponents = [];
                productList.forEach(p => {
                    const comps = getProductComponents(p.sku, p.qty);
                    allComponents = [...allComponents, ...comps];
                });

                // Group by component code and sum quantities
                const grouped = {};
                allComponents.forEach(comp => {
                    if (grouped[comp.code]) {
                        grouped[comp.code].qty += comp.qty;
                    } else {
                        grouped[comp.code] = { code: comp.code, qty: comp.qty };
                    }
                });

                // Enrich with item details - use primary vendor (first in list)
                const results = Object.values(grouped).map(comp => {
                    const item = items.find(i => i.code === comp.code);
                    const vendors = item?.vendors || parseVendorsGlobal(item?.vendor, item?.vendorAddress) || [];
                    const primary = vendors[0] || { name: '', phone: '', email: '' };
                    return {
                        code: comp.code,
                        name: item?.name || 'Unknown',
                        qty: comp.qty,
                        price: item?.price || 0,
                        total: comp.qty * (item?.price || 0),
                        vendor: primary.name || '-',
                        vendorPhone: primary.phone || '',
                        vendorEmail: primary.email || '',
                        category: item?.category || '-'
                    };
                });

                results.sort((a, b) => {
                    if (a.category !== b.category) return a.category.localeCompare(b.category);
                    return a.name.localeCompare(b.name);
                });

                setComponentResults(results);

                                <tr class="total-row">

            // Download PDF with clickable links
            const handleDownloadHTML = () => {

                const html = `<!DOCTYPE html>

                const blob = new Blob([html], { type: 'text/html' });

                                        }}>
                                            <span><strong>{p.name}</strong> × {p.qty}</span>
                                            <button

                                                <Icons.X />
                                            </button>

                                </div>
                                <button

                                    <Icons.Calculator /> Calculate Components

                    {componentResults.length > 0 && (

                                    <tbody>
                                        {componentResults.map((c, idx) => (

                                                <td style={{ textAlign: 'right', fontWeight: '600', color: 'var(--success)' }}>{formatCurrency(c.total)}</td>
                                                <td style={{ fontSize: '13px', fontWeight: '500' }}>{c.vendor !== '-' ? c.vendor : '-'}</td>
                                                {showVendorContact && (

                                                        {c.vendorEmail && <div><a href={`mailto:${c.vendorEmail}`} style={{ color: 'var(--primary)' }}>{c.vendorEmail}</a></div>}

                    )}

                    {productList.length === 0 && componentResults.length === 0 && (
                        <div className="card" style={{ textAlign: 'center', padding: '60px 20px' }}>

                            <p style={{ color: 'var(--text-muted)' }}>Add products above to calculate the components needed</p>
                        </div>
                    )}
                </div>
            );
        };

        // Parse vendor + vendorAddress ;; separated strings into vendors array
        const parseVendorsGlobal = (vendor, vendorAddress) => {
            if (!vendor) return [];
            const names = vendor.split(' ;; ').map(s => s.trim());
            const contacts = (vendorAddress || '').split(' ;; ').map(s => s.trim());
            return names.map((name, i) => {
                const contact = contacts[i] || '';
                if (contact.includes('|')) {
                    const parts = contact.split('|');
                    return { name, phone: parts[0] || '', email: parts[1] || '' };
                }
                if (contact.includes('@')) return { name, phone: '', email: contact };
                return { name: contact ? `${name} (${contact})` : name, phone: '', email: '' };
            });
        };

        // Enrich items loaded from Google Sheets with parsed vendors array
        const enrichItems = (items) => items.map(item => {
            if (item.vendors && item.vendors.length > 0) return item;
            const vendors = parseVendorsGlobal(item.vendor, item.vendorAddress);
            return { ...item, vendors };
        });

        // ============ INVENTORY MANAGEMENT ============
        const InventoryManagement = ({ items, products, bom, subProducts }) => {
            const [invTab, setInvTab] = useState('stock');
            const [transactions, setTransactions] = useState([]);
            const [invLoading, setInvLoading] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showProductionModal, setShowProductionModal] = useState(false);
            const [addType, setAddType] = useState('IN');
            const [filterItem, setFilterItem] = useState('');
            const [filterReason, setFilterReason] = useState('');
            const [stockSearch, setStockSearch] = useState('');
            const [lowStockThreshold, setLowStockThreshold] = useState(5);

            // Form state for Add Stock IN/OUT
            const [form, setForm] = useState({
                itemCode: '', qty: '', reason: '', vendor: '', cost: '',
                billNumber: '', reference: '', notes: ''
            });

            // Production form
            const [prodForm, setProdForm] = useState({ productSKU: '', qty: 1 });
            const [bomCheck, setBomCheck] = useState([]);
            const [prodError, setProdError] = useState('');

            // Load transactions from Firebase
            useEffect(() => {
                const loadInventory = async () => {
                    setInvLoading(true);
                    const txns = await FirebaseInventory.getAllTransactions();
                    setTransactions(txns);
                    setInvLoading(false);
                };
                loadInventory();
            }, []);

            const stock = useMemo(() => FirebaseInventory.calculateStock(
                transactions.filter(t => t.collection !== 'finished_goods')
            ), [transactions]);

            const finishedGoods = useMemo(() => FirebaseInventory.calculateFinishedGoods(transactions), [transactions]);

            const refreshTransactions = async () => {
                const txns = await FirebaseInventory.getAllTransactions();
                setTransactions(txns);
            };

            // Handle Add Transaction
            const handleAddTransaction = async () => {
                if (!form.itemCode || !form.qty || !form.reason) return;
                const item = items.find(i => i.code === form.itemCode);
                if (!item) return;

                // Check stock for OUT
                if (addType === 'OUT') {
                    const available = stock[form.itemCode]?.current || 0;
                    if (Number(form.qty) > available) {
                        alert(`Not enough stock! Available: ${available}, Requested: ${form.qty}`);
                        return;
                    }
                }

                await FirebaseInventory.addTransaction({
                    itemCode: form.itemCode,
                    itemName: item.name,
                    type: addType,
                    qty: Number(form.qty),
                    reason: form.reason,
                    vendor: form.vendor || '',
                    cost: Number(form.cost) || 0,
                    billNumber: form.billNumber || '',
                    reference: form.reference || '',
                    notes: form.notes || '',
                    collection: 'raw_materials'
                });

                setForm({ itemCode: '', qty: '', reason: '', vendor: '', cost: '', billNumber: '', reference: '', notes: '' });
                setShowAddModal(false);
                await refreshTransactions();
            };

            // Handle Production
            const handleCheckBOM = () => {
                const product = products.find(p => p.sku === prodForm.productSKU);
                if (!product) return;
                const productBOM = bom.filter(b => b.productSku === prodForm.productSKU);
                // Also include sub-product BOMs
                const subProds = subProducts.filter(sp => sp.productSku === prodForm.productSKU);
                let allBomItems = [...productBOM];
                subProds.forEach(sp => {
                    const subBom = bom.filter(b => b.productSku === sp.subProductSku);
                    subBom.forEach(sb => {
                        const existing = allBomItems.find(b => b.code === sb.code);
                        if (existing) existing.qty = (Number(existing.qty) || 1) + (Number(sb.qty) || 1);
                        else allBomItems.push({ ...sb });
                    });
                });
                const check = FirebaseInventory.checkBOMAvailability(product, Number(prodForm.qty) || 1, allBomItems, items, stock);
                setBomCheck(check);
                setProdError(check.some(c => !c.sufficient) ? 'Insufficient stock for some items!' : '');
            };

            const handleProduction = async () => {
                const product = products.find(p => p.sku === prodForm.productSKU);
                if (!product || bomCheck.some(c => !c.sufficient)) return;
                const productBOM = bom.filter(b => b.productSku === prodForm.productSKU);
                const subProds = subProducts.filter(sp => sp.productSku === prodForm.productSKU);
                let allBomItems = [...productBOM];
                subProds.forEach(sp => {
                    const subBom = bom.filter(b => b.productSku === sp.subProductSku);
                    subBom.forEach(sb => {
                        const existing = allBomItems.find(b => b.code === sb.code);
                        if (existing) existing.qty = (Number(existing.qty) || 1) + (Number(sb.qty) || 1);
                        else allBomItems.push({ ...sb });
                    });
                });
                await FirebaseInventory.addProductionOrder(product, Number(prodForm.qty) || 1, allBomItems, items);
                setProdForm({ productSKU: '', qty: 1 });
                setBomCheck([]);
                setProdError('');
                setShowProductionModal(false);
                await refreshTransactions();
            };

            const handleDeleteTxn = async (id) => {
                const pwd = prompt('Enter admin password to delete this transaction:');
                if (!pwd) return;
                if (pwd !== 'admin123') { alert('Incorrect password.'); return; }
                if (!confirm('Delete this transaction? This will affect stock counts.')) return;
                await FirebaseInventory.deleteTransaction(id);
                await refreshTransactions();
            };

            // Filtered transactions for history tab
            const filteredTxns = useMemo(() => {
                let txns = transactions.filter(t => t.collection !== 'finished_goods');
                if (filterItem) txns = txns.filter(t => t.itemCode === filterItem);
                if (filterReason) txns = txns.filter(t => t.reason === filterReason);
                return txns;
            }, [transactions, filterItem, filterReason]);

            // Filtered stock cards
            const stockEntries = useMemo(() => {
                let entries = Object.values(stock);
                if (stockSearch) {
                    const s = stockSearch.toLowerCase();
                    entries = entries.filter(e => e.itemName?.toLowerCase().includes(s) || e.itemCode?.toLowerCase().includes(s));
                }
                return entries.sort((a, b) => a.current - b.current);
            }, [stock, stockSearch]);

            const fgEntries = useMemo(() => Object.values(finishedGoods).sort((a, b) => a.productName?.localeCompare(b.productName)), [finishedGoods]);

            if (invLoading) return <div className="card" style={{ textAlign: 'center', padding: '40px' }}>Loading inventory from Firebase...</div>;

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title"><Icons.Inventory /> Inventory Management</h1>
                        <div style={{ display: 'flex', gap: '8px' }}>
                            <button className="btn btn-success" onClick={() => { setAddType('IN'); setShowAddModal(true); }}>
                                <Icons.ArrowIn /> Stock In
                            </button>
                            <button className="btn btn-danger" onClick={() => { setAddType('OUT'); setShowAddModal(true); }}>
                                <Icons.ArrowOut /> Stock Out
                            </button>
                            <button className="btn btn-primary" onClick={() => setShowProductionModal(true)}>
                                <Icons.Factory /> Build Product
                            </button>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="inv-tabs">
                        <button className={`inv-tab ${invTab === 'stock' ? 'active' : ''}`} onClick={() => setInvTab('stock')}>Raw Materials</button>
                        <button className={`inv-tab ${invTab === 'finished' ? 'active' : ''}`} onClick={() => setInvTab('finished')}>Finished Goods</button>
                        <button className={`inv-tab ${invTab === 'history' ? 'active' : ''}`} onClick={() => setInvTab('history')}>Transaction History</button>
                    </div>

                    {/* Raw Materials Stock Tab */}
                    {invTab === 'stock' && (
                        <div>
                            <div style={{ display: 'flex', gap: '12px', marginBottom: '16px', alignItems: 'center' }}>
                                <div className="search-box" style={{ flex: 1 }}>
                                    <Icons.Search />
                                    <input placeholder="Search items..." value={stockSearch} onChange={e => setStockSearch(e.target.value)} />
                                </div>
                                <label style={{ fontSize: '13px', color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>
                                    Low stock alert: &lt;
                                    <input type="number" value={lowStockThreshold} onChange={e => setLowStockThreshold(Number(e.target.value))}
                                        style={{ width: '50px', marginLeft: '4px', padding: '4px 6px', border: '1px solid var(--border)', borderRadius: '4px' }} />
                                </label>
                            </div>
                            {stockEntries.length === 0 ? (
                                <div className="card" style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>
                                    No inventory yet. Use "Stock In" to add items.
                                </div>
                            ) : (
                                <div className="stock-grid">
                                    {stockEntries.map(s => (
                                        <div key={s.itemCode} className={`stock-card ${s.current <= 0 ? 'no-stock' : s.current < lowStockThreshold ? 'low-stock' : ''}`}>
                                            <div className="stock-card-header">
                                                <div>
                                                    <div className="stock-card-name">{s.itemName}</div>
                                                    <div className="stock-card-code">{s.itemCode}</div>
                                                </div>
                                                <div className={`stock-card-qty ${s.current < lowStockThreshold ? 'low' : ''}`}>{s.current}</div>
                                            </div>
                                            <div className="stock-card-detail">
                                                <span style={{ color: 'var(--success)' }}>In: {s.totalIn}</span>
                                                <span style={{ color: 'var(--danger)' }}>Out: {s.totalOut}</span>
                                            </div>
                                            {s.current < lowStockThreshold && s.current > 0 && (
                                                <div style={{ marginTop: '6px', fontSize: '11px', color: 'var(--danger)', fontWeight: 600 }}>
                                                    Low Stock Alert!
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Finished Goods Tab */}
                    {invTab === 'finished' && (
                        <div>
                            {fgEntries.length === 0 ? (
                                <div className="card" style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>
                                    No finished goods yet. Use "Build Product" to produce.
                                </div>
                            ) : (
                                <div className="stock-grid">
                                    {fgEntries.map(s => (
                                        <div key={s.productSKU} className={`stock-card ${s.current <= 0 ? 'no-stock' : ''}`}>
                                            <div className="stock-card-header">
                                                <div>
                                                    <div className="stock-card-name">{s.productName}</div>
                                                    <div className="stock-card-code">{s.productSKU}</div>
                                                </div>
                                                <div className="stock-card-qty">{s.current}</div>
                                            </div>
                                            <div className="stock-card-detail">
                                                <span style={{ color: 'var(--success)' }}>Produced: {s.totalIn}</span>
                                                <span style={{ color: 'var(--danger)' }}>Sold/Used: {s.totalOut}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Transaction History Tab */}
                    {invTab === 'history' && (
                        <div>
                            <div style={{ display: 'flex', gap: '12px', marginBottom: '16px', flexWrap: 'wrap' }}>
                                <select className="form-select" value={filterItem} onChange={e => setFilterItem(e.target.value)}
                                    style={{ padding: '8px 12px', border: '1px solid var(--border)', borderRadius: '8px', fontSize: '13px', minWidth: '200px' }}>
                                    <option value="">All Items</option>
                                    {items.map(i => <option key={i.code} value={i.code}>{i.name} ({i.code})</option>)}
                                </select>
                                <select className="form-select" value={filterReason} onChange={e => setFilterReason(e.target.value)}
                                    style={{ padding: '8px 12px', border: '1px solid var(--border)', borderRadius: '8px', fontSize: '13px', minWidth: '180px' }}>
                                    <option value="">All Reasons</option>
                                    {[...INVENTORY_REASONS.IN, ...INVENTORY_REASONS.OUT].map(r => <option key={r.key} value={r.key}>{r.label}</option>)}
                                </select>
                                <button className="btn btn-secondary" onClick={() => { setFilterItem(''); setFilterReason(''); }}>Clear</button>
                                <span style={{ fontSize: '13px', color: 'var(--text-muted)', alignSelf: 'center' }}>{filteredTxns.length} transactions</span>
                            </div>
                            {filteredTxns.length === 0 ? (
                                <div className="card" style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>No transactions found.</div>
                            ) : (
                                <div className="txn-list">
                                    <div className="txn-row" style={{ fontWeight: 700, fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', background: 'var(--bg)' }}>
                                        <span>Date</span><span>Type</span><span>Qty</span><span>Item</span><span>Reason / Reference</span><span>Vendor / Notes</span><span></span>
                                    </div>
                                    {filteredTxns.map(txn => (
                                        <div key={txn.id} className="txn-row">
                                            <span style={{ fontSize: '12px' }}>{txn.createdAt ? formatDate(txn.createdAt) : '-'}</span>
                                            <span className={`txn-badge ${txn.type === 'IN' ? 'in' : 'out'}`}>{txn.type}</span>
                                            <span style={{ fontWeight: 700 }}>{txn.qty}</span>
                                            <span>
                                                <div style={{ fontWeight: 600 }}>{txn.itemName}</div>
                                                <div className="stock-card-code">{txn.itemCode}</div>
                                            </span>
                                            <span>
                                                <div className="txn-reason">{(INVENTORY_REASONS.IN.concat(INVENTORY_REASONS.OUT)).find(r => r.key === txn.reason)?.label || txn.reason}</div>
                                                {txn.reference && <div className="txn-ref">{txn.reference}</div>}
                                            </span>
                                            <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                                {txn.vendor && <div>{txn.vendor}</div>}
                                                {txn.billNumber && <div>Bill: {txn.billNumber}</div>}
                                                {txn.cost > 0 && <div>{formatCurrency(txn.cost)}/unit</div>}
                                                {txn.notes && <div>{txn.notes}</div>}
                                            </span>
                                            <button className="btn btn-danger btn-sm btn-icon" onClick={() => handleDeleteTxn(txn.id)} title="Delete">
                                                <Icons.Trash />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Add Stock IN/OUT Modal */}
                    <Modal isOpen={showAddModal} onClose={() => setShowAddModal(false)} title={addType === 'IN' ? 'Stock In' : 'Stock Out'} size=""
                        footer={<button className="btn btn-primary" onClick={handleAddTransaction} disabled={!form.itemCode || !form.qty || !form.reason}>Save</button>}>
                        <div className="inv-form-grid">
                            <div className="form-group full-width">
                                <label className="form-label">Item * (only registered items)</label>
                                <SearchableSelect
                                    options={items}
                                    value={form.itemCode}
                                    onChange={val => setForm({ ...form, itemCode: val })}
                                    placeholder="Search items by name or code..."
                                    renderOption={(i) => {
                                        const avail = stock[i.code]?.current || 0;
                                        return `${i.code} - ${i.name}${addType === 'OUT' ? ` [Stock: ${avail}]` : ''}`;
                                    }}
                                />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Quantity *</label>
                                <input type="number" className="form-input" min="1" value={form.qty} onChange={e => setForm({ ...form, qty: e.target.value })}
                                    placeholder={addType === 'OUT' && form.itemCode ? `Max: ${stock[form.itemCode]?.current || 0}` : 'Qty'} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Reason *</label>
                                <select className="form-input" value={form.reason} onChange={e => setForm({ ...form, reason: e.target.value })}>
                                    <option value="">Select Reason...</option>
                                    {INVENTORY_REASONS[addType].filter(r => !r.auto).map(r => <option key={r.key} value={r.key}>{r.label}</option>)}
                                </select>
                            </div>
                            {addType === 'IN' && form.reason === 'PURCHASE' && (
                                <>
                                    <div className="form-group">
                                        <label className="form-label">Vendor</label>
                                        <input className="form-input" value={form.vendor} onChange={e => setForm({ ...form, vendor: e.target.value })} placeholder="Vendor name" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Cost per unit</label>
                                        <input type="number" className="form-input" value={form.cost} onChange={e => setForm({ ...form, cost: e.target.value })} placeholder="0" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Bill Number</label>
                                        <input className="form-input" value={form.billNumber} onChange={e => setForm({ ...form, billNumber: e.target.value })} placeholder="INV-2026-001" />
                                    </div>
                                </>
                            )}
                            <div className="form-group full-width">
                                <label className="form-label">Reference</label>
                                <input className="form-input" value={form.reference} onChange={e => setForm({ ...form, reference: e.target.value })}
                                    placeholder={addType === 'OUT' ? 'e.g., QT-0045, Lab testing, Client demo' : 'e.g., PO number, supplier ref'} />
                            </div>
                            <div className="form-group full-width">
                                <label className="form-label">Notes</label>
                                <input className="form-input" value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} placeholder="Optional notes..." />
                            </div>
                            {addType === 'OUT' && form.itemCode && (
                                <div className="full-width" style={{ padding: '10px', background: 'var(--bg)', borderRadius: '8px', fontSize: '13px' }}>
                                    Available: <strong>{stock[form.itemCode]?.current || 0}</strong>
                                    {form.qty && <span> | After this: <strong style={{ color: (stock[form.itemCode]?.current || 0) - Number(form.qty) < 0 ? 'var(--danger)' : 'var(--success)' }}>
                                        {(stock[form.itemCode]?.current || 0) - Number(form.qty)}
                                    </strong></span>}
                                </div>
                            )}
                        </div>
                    </Modal>

                    {/* Build Product Modal */}
                    <Modal isOpen={showProductionModal} onClose={() => { setShowProductionModal(false); setBomCheck([]); setProdError(''); }}
                        title="Build Product (Production)" size=""
                        footer={
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button className="btn btn-secondary" onClick={handleCheckBOM} disabled={!prodForm.productSKU}>Check BOM</button>
                                <button className="btn btn-primary" onClick={handleProduction}
                                    disabled={!prodForm.productSKU || bomCheck.length === 0 || bomCheck.some(c => !c.sufficient)}>
                                    Build
                                </button>
                            </div>
                        }>
                        <div className="inv-form-grid">
                            <div className="form-group full-width">
                                <label className="form-label">Product *</label>
                                <SearchableSelect
                                    options={products}
                                    value={prodForm.productSKU}
                                    onChange={val => { setProdForm({ ...prodForm, productSKU: val }); setBomCheck([]); setProdError(''); }}
                                    placeholder="Search products by name or SKU..."
                                    renderOption={(p) => `${p.sku} - ${p.name}`}
                                />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Quantity to Build *</label>
                                <input type="number" className="form-input" min="1" value={prodForm.qty}
                                    onChange={e => { setProdForm({ ...prodForm, qty: e.target.value }); setBomCheck([]); }} />
                            </div>
                        </div>
                        {bomCheck.length > 0 && (
                            <div className="prod-check" style={{ marginTop: '16px' }}>
                                <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '4px' }}>BOM Check:</div>
                                {bomCheck.map(c => (
                                    <div key={c.itemCode} className={`prod-check-row ${c.sufficient ? 'ok' : 'short'}`}>
                                        <span style={{ flex: 1 }}>{c.itemName}</span>
                                        <span style={{ width: '80px' }}>Need: {c.needed}</span>
                                        <span style={{ width: '80px' }}>Have: {c.available}</span>
                                        {!c.sufficient && <span style={{ color: 'var(--danger)', fontWeight: 700 }}>Short: {c.shortage}</span>}
                                        {c.sufficient && <span style={{ color: 'var(--success)', fontWeight: 700 }}>OK</span>}
                                    </div>
                                ))}
                                {prodError && <div style={{ color: 'var(--danger)', fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{prodError}</div>}
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        // ============ SITE INSPECTION ============
        const TANK_MATERIALS = ['Concrete', 'Plastic (HDPE)', 'Stainless Steel', 'Mild Steel', 'FRP', 'Other'];
        const TANK_TYPES = ['Overhead', 'Underground', 'Ground Level'];
        const MONITORING_OPTIONS = ['Water Level', 'Temperature', 'Flow', 'Pressure'];
        const ALERT_OPTIONS = ['Overflow', 'Low Level', 'Dry Run', 'Leak Detection'];
        const INSPECTION_STATUSES = ['pending_quote', 'quoted', 'closed'];

        const emptyTank = () => ({ label: '', type: 'Overhead', material: 'Concrete', height: '', capacity: '', photos: [], wireRouting: '', wireNotes: '' });

        const INSP_DRAFT_KEY = 'mvs_inspection_draft';

        const SiteInspection = ({ products }) => {
            const [view, setView] = useState('list'); // 'list' | 'form' | 'detail'
            const [inspections, setInspections] = useState([]);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [draftSaved, setDraftSaved] = useState(false);
            const [selectedInsp, setSelectedInsp] = useState(null);
            const [step, setStep] = useState(0);

            // Form state
            const emptyForm = () => ({
                customerName: '', contactPerson: '', phone: '',
                gps: null, address: '',
                propertyType: '', numBuildings: '', numFloors: '',
                tanks: [emptyTank()],
                clustered: 'Clustered (<50m)',
                power: 'Yes', wifi: 'Yes',
                controlRoomDistance: '',
                siteConditionPhotos: [],
                siteExtraDetails: '',
                monitoring: ['Water Level'],
                alerts: ['Overflow', 'Low Level'],
                valveControl: false, valveControlDesc: '',
                submersiblePumpControl: false, submersiblePumpDesc: '',
                singlePhaseMotorControl: false, singlePhaseMotorDesc: '',
                pumpAutomation: 'No', pumpCount: '',
                suggestedProducts: [],
                notes: '',
                nextAction: '', nextFollowupDate: '',
                referenceSource: '',
                inspectedBy: '',
                status: 'pending_quote'
            });
            const [form, setForm] = useState(emptyForm());

            // Draft helpers
            const hasDraft = () => { try { return !!localStorage.getItem(INSP_DRAFT_KEY); } catch { return false; } };
            const loadDraft = () => { try { return JSON.parse(localStorage.getItem(INSP_DRAFT_KEY)); } catch { return null; } };
            const saveDraft = (data) => { try { localStorage.setItem(INSP_DRAFT_KEY, JSON.stringify({ ...data, _draftSavedAt: new Date().toISOString() })); } catch {} };
            const clearDraft = () => { try { localStorage.removeItem(INSP_DRAFT_KEY); } catch {} };

            // Auto-save draft whenever form changes (only while in form view)
            useEffect(() => {
                if (view === 'form') {
                    saveDraft(form);
                    setDraftSaved(true);
                    const t = setTimeout(() => setDraftSaved(false), 2000);
                    return () => clearTimeout(t);
                }
            }, [form, view]);

            const startNewInspection = () => {
                if (hasDraft()) {
                    const draft = loadDraft();
                    const name = draft?.customerName || 'unnamed';
                    const savedAt = draft?._draftSavedAt ? new Date(draft._draftSavedAt).toLocaleTimeString() : '';
                    const resume = confirm(`You have a saved draft for "${name}" (saved at ${savedAt}).\n\nTap OK to resume draft, or Cancel to start fresh.`);
                    if (resume) {
                        setForm(draft);
                    } else {
                        clearDraft();
                        setForm(emptyForm());
                    }
                } else {
                    setForm(emptyForm());
                }
                setStep(0);
                setView('form');
            };

            const handleCancel = () => {
                if (form.customerName || form.inspectedBy) {
                    const keep = confirm('Keep this as a draft to continue later?\n\nOK = Save draft\nCancel = Discard and go back');
                    if (keep) {
                        saveDraft(form);
                        alert('Draft saved. You can resume it next time.');
                    } else {
                        clearDraft();
                    }
                } else {
                    clearDraft();
                }
                setView('list');
            };

            const handleManualSaveDraft = () => {
                saveDraft(form);
                alert('Draft saved to this device.');
            };

            useEffect(() => {
                FirebaseInspections.getAllInspections().then(data => {
                    setInspections(data);
                    setLoading(false);
                });
            }, []);

            // GPS capture
            const captureGPS = () => {
                if (!navigator.geolocation) { alert('GPS not supported on this device.'); return; }
                navigator.geolocation.getCurrentPosition(
                    pos => setForm(f => ({ ...f, gps: { lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6), accuracy: Math.round(pos.coords.accuracy) } })),
                    err => alert('Could not get GPS: ' + err.message),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            };

            // Camera trigger — captures filename only, photo stays on phone
            const triggerCamera = (onCapture) => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.capture = 'environment';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (file) {
                        onCapture({ filename: file.name, takenAt: new Date().toISOString() });
                    }
                    input.value = '';
                };
                input.click();
            };

            // Tank helpers
            const addTank = () => setForm(f => ({ ...f, tanks: [...f.tanks, emptyTank()] }));
            const removeTank = idx => setForm(f => ({ ...f, tanks: f.tanks.filter((_, i) => i !== idx) }));
            const updateTank = (idx, field, val) => setForm(f => {
                const tanks = [...f.tanks];
                tanks[idx] = { ...tanks[idx], [field]: val };
                return { ...f, tanks };
            });
            const addTankPhoto = (idx) => {
                triggerCamera(photo => {
                    setForm(f => {
                        const tanks = [...f.tanks];
                        tanks[idx] = { ...tanks[idx], photos: [...(tanks[idx].photos || []), photo] };
                        return { ...f, tanks };
                    });
                });
            };

            // Checklist toggle
            const toggleCheck = (field, val) => {
                setForm(f => {
                    const arr = f[field] || [];
                    return { ...f, [field]: arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val] };
                });
            };

            // Product multi-select
            const toggleProduct = (sku) => {
                setForm(f => {
                    const arr = f.suggestedProducts || [];
                    return { ...f, suggestedProducts: arr.includes(sku) ? arr.filter(x => x !== sku) : [...arr, sku] };
                });
            };

            const handleSave = async () => {
                if (!form.customerName || !form.inspectedBy) { alert('Customer name and Inspected By are required.'); return; }
                setSaving(true);
                const { _draftSavedAt, ...formData } = form;
                const id = await FirebaseInspections.saveInspection({ ...formData, id: Date.now() });
                if (id) {
                    clearDraft();
                    const saved = { ...formData, id: Date.now(), firebaseId: id, createdAt: new Date().toISOString() };
                    setInspections(prev => [saved, ...prev]);
                    setForm(emptyForm());
                    setStep(0);
                    setView('list');
                    alert('Inspection submitted to Firebase!');
                } else {
                    alert('Submit failed. Check internet connection.\n\nYour data is still saved as a draft on this device.');
                }
                setSaving(false);
            };

            const handleStatusChange = async (insp, newStatus) => {
                if (insp.firebaseId) await FirebaseInspections.updateStatus(insp.firebaseId, newStatus);
                setInspections(prev => prev.map(i => i.firebaseId === insp.firebaseId ? { ...i, status: newStatus } : i));
                if (selectedInsp?.firebaseId === insp.firebaseId) setSelectedInsp(s => ({ ...s, status: newStatus }));
            };

            const handleDelete = async (insp) => {
                const pwd = prompt('Enter admin password to delete this inspection:');
                if (!pwd) return;
                if (pwd !== 'admin123') { alert('Incorrect password.'); return; }
                if (!confirm('Delete this inspection permanently?')) return;
                if (insp.firebaseId) await FirebaseInspections.deleteInspection(insp.firebaseId);
                setInspections(prev => prev.filter(i => i.firebaseId !== insp.firebaseId));
                setView('list');
                setSelectedInsp(null);
            };

            const statusLabel = s => ({ pending_quote: 'Pending Quote', quoted: 'Quoted', closed: 'Closed' }[s] || s);
            const statusClass = s => ({ pending_quote: 'insp-status-pending', quoted: 'insp-status-quoted', closed: 'insp-status-closed' }[s] || '');

            const STEPS = ['Customer', 'Tanks', 'Site', 'Requirements', 'Recommend'];

            // ---- RENDER: LIST ----
            if (view === 'list') return (
                <div>
                    <div className="page-header">
                        <div>
                            <h1 className="page-title">Site Inspections</h1>
                            <p className="page-subtitle">Field inspection forms — saved to Firebase instantly</p>
                        </div>
                        <button className="btn btn-primary" onClick={startNewInspection}>
                            <Icons.Plus /> New Inspection
                        </button>
                    </div>

                    {hasDraft() && (() => { const d = loadDraft(); return (
                        <div style={{ background: '#FEF3C7', border: '1px solid #FDE68A', borderRadius: '10px', padding: '12px 16px', marginBottom: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px', flexWrap: 'wrap' }}>
                            <div>
                                <strong style={{ color: '#92400E' }}>Draft in progress</strong>
                                <span style={{ color: '#92400E', fontSize: '13px', marginLeft: '8px' }}>
                                    {d?.customerName ? `"${d.customerName}"` : 'Unnamed'}{d?._draftSavedAt ? ` · saved ${new Date(d._draftSavedAt).toLocaleTimeString()}` : ''}
                                </span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button className="btn btn-primary btn-sm" onClick={startNewInspection}>Resume Draft</button>
                                <button className="btn btn-danger btn-sm" onClick={() => { if (confirm('Discard draft?')) { clearDraft(); setInspections(prev => [...prev]); } }}>Discard</button>
                            </div>
                        </div>
                    ); })()}

                    {loading ? (
                        <div className="card" style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>Loading from Firebase...</div>
                    ) : inspections.length === 0 ? (
                        <div className="card" style={{ textAlign: 'center', padding: '60px 20px' }}>
                            <Icons.Clipboard />
                            <h3 style={{ marginTop: '16px' }}>No inspections yet</h3>
                            <p style={{ color: 'var(--text-muted)', marginBottom: '20px' }}>Tap "New Inspection" to start a site visit form</p>
                            <button className="btn btn-primary" onClick={startNewInspection}>
                                <Icons.Plus /> Start First Inspection
                            </button>
                        </div>
                    ) : (
                        <div>
                            {inspections.map(insp => (
                                <div key={insp.firebaseId || insp.id} className="insp-card" onClick={() => { setSelectedInsp(insp); setView('detail'); }}>
                                    <div className="insp-card-header">
                                        <div>
                                            <div className="insp-card-name">{insp.customerName}</div>
                                            <div className="insp-card-meta">
                                                {insp.contactPerson && <span>{insp.contactPerson} · </span>}
                                                {insp.phone && <span>{insp.phone} · </span>}
                                                {insp.propertyType && <span>{insp.propertyType} · </span>}{insp.tanks?.length || 0} tanks · {insp.inspectedBy}
                                            </div>
                                            {insp.address && <div className="insp-card-meta" style={{ marginTop: '2px' }}>{insp.address}</div>}
                                        </div>
                                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '6px' }}>
                                            <span className={`status-badge ${statusClass(insp.status)}`}>{statusLabel(insp.status)}</span>
                                            <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{insp.createdAt ? formatDate(insp.createdAt) : ''}</span>
                                        </div>
                                    </div>
                                    <div style={{ display: 'flex', gap: '16px', fontSize: '12px', color: 'var(--text-muted)' }}>
                                        {insp.monitoring?.length > 0 && <span>📊 {insp.monitoring.join(', ')}</span>}
                                        {insp.suggestedProducts?.length > 0 && <span>🛒 {insp.suggestedProducts.length} product(s) suggested</span>}
                                        {insp.gps && <span>📍 GPS captured</span>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            // ---- RENDER: DETAIL ----
            if (view === 'detail' && selectedInsp) return (
                <div>
                    <div className="page-header">
                        <div>
                            <button className="btn btn-secondary btn-sm" onClick={() => setView('list')} style={{ marginBottom: '8px' }}>← Back</button>
                            <h1 className="page-title">{selectedInsp.customerName}</h1>
                            <p className="page-subtitle">{selectedInsp.address} · {formatDate(selectedInsp.createdAt)} · By {selectedInsp.inspectedBy}</p>
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            <select className="form-select" style={{ width: 'auto' }} value={selectedInsp.status}
                                onChange={e => handleStatusChange(selectedInsp, e.target.value)}>
                                {INSPECTION_STATUSES.map(s => <option key={s} value={s}>{statusLabel(s)}</option>)}
                            </select>
                            <button className="btn btn-danger btn-sm" onClick={() => handleDelete(selectedInsp)}>
                                <Icons.Trash /> Delete
                            </button>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                        {/* Customer */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Customer Info</h3></div>
                            <div className="card-body" style={{ fontSize: '14px' }}>
                                <div><strong>Customer:</strong> {selectedInsp.customerName}</div>
                                <div><strong>Contact:</strong> {selectedInsp.contactPerson || '—'}</div>
                                <div><strong>Phone:</strong> {selectedInsp.phone ? <a href={`tel:${selectedInsp.phone}`}>{selectedInsp.phone}</a> : '—'}</div>
                                <div><strong>Address:</strong> {selectedInsp.address || '—'}</div>
                                {selectedInsp.referenceSource && <div style={{ marginTop: '6px' }}><strong>Reference:</strong> {selectedInsp.referenceSource}</div>}
                                {selectedInsp.propertyType && <div style={{ marginTop: '6px' }}><strong>Property Type:</strong> {selectedInsp.propertyType}{selectedInsp.numBuildings ? ` · ${selectedInsp.numBuildings} buildings` : ''}{selectedInsp.numFloors ? `, ${selectedInsp.numFloors} floors` : ''}</div>}
                                {selectedInsp.gps ? (
                                    <div className="gps-box" style={{ marginTop: '10px' }}>
                                        <Icons.MapPin />
                                        <span>GPS: {selectedInsp.gps.lat}, {selectedInsp.gps.lng} (±{selectedInsp.gps.accuracy}m)</span>
                                        <a href={`https://maps.google.com/?q=${selectedInsp.gps.lat},${selectedInsp.gps.lng}`} target="_blank" rel="noreferrer"
                                            style={{ marginLeft: 'auto', color: 'var(--primary)', fontSize: '12px' }}>Open Map</a>
                                    </div>
                                ) : <div style={{ color: 'var(--text-muted)', fontSize: '12px', marginTop: '6px' }}>No GPS captured</div>}
                            </div>
                        </div>

                        {/* Site Conditions */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Site Conditions</h3></div>
                            <div className="card-body" style={{ fontSize: '14px' }}>
                                <div><strong>Tank Layout:</strong> {selectedInsp.clustered}</div>
                                <div><strong>Power Available:</strong> {selectedInsp.power}</div>
                                <div><strong>WiFi Available:</strong> {selectedInsp.wifi}</div>
                                <div><strong>Control Room Distance:</strong> {selectedInsp.controlRoomDistance ? selectedInsp.controlRoomDistance + ' meters' : '—'}</div>
                                <div><strong>Pump Automation:</strong> {selectedInsp.pumpAutomation}{selectedInsp.pumpCount ? ` (${selectedInsp.pumpCount} pumps)` : ''}</div>
                            </div>
                        </div>

                        {/* Tanks */}
                        <div className="card" style={{ gridColumn: '1 / -1' }}>
                            <div className="card-header"><h3 className="card-title">Tanks ({selectedInsp.tanks?.length || 0})</h3></div>
                            <div className="table-container">
                                <table>
                                    <thead><tr><th>Label</th><th>Type</th><th>Material</th><th>H/D (ft)</th><th>Capacity</th><th>Wire Routing</th><th>Notes</th><th>Photos</th></tr></thead>
                                    <tbody>
                                        {(selectedInsp.tanks || []).map((t, i) => (
                                            <tr key={i}>
                                                <td><strong>{t.label || `Tank ${i+1}`}</strong></td>
                                                <td>{t.type}</td>
                                                <td>{t.material}</td>
                                                <td>{t.height || '—'}</td>
                                                <td>{t.capacity ? Number(t.capacity).toLocaleString() + ' L' : '—'}</td>
                                                <td>{t.wireRouting || '—'}</td>
                                                <td>{t.wireNotes || '—'}</td>
                                                <td>{t.photos?.length > 0 ? <span style={{ color: 'var(--success)' }}>📷 {t.photos.length}</span> : <span style={{ color: 'var(--text-muted)' }}>—</span>}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Requirements */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Requirements</h3></div>
                            <div className="card-body" style={{ fontSize: '14px' }}>
                                <div><strong>Monitor:</strong> {selectedInsp.monitoring?.join(', ') || '—'}</div>
                                <div style={{ marginTop: '6px' }}><strong>Alerts:</strong> {selectedInsp.alerts?.join(', ') || '—'}</div>
                                {selectedInsp.valveControl && <div style={{ marginTop: '6px' }}><strong>Valve Control:</strong> {selectedInsp.valveControlDesc || 'Yes'}</div>}
                                {selectedInsp.submersiblePumpControl && <div style={{ marginTop: '6px' }}><strong>Submersible Pump:</strong> {selectedInsp.submersiblePumpDesc || 'Yes'}</div>}
