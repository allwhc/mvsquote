        // ============ SYNC ICONS ============
        const SyncIcons = {
            Cloud: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
            Upload: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Download: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Refresh: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
            Check: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
            Alert: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        };

        // ============ LOADING COMPONENT ============
        const LoadingScreen = ({ message }) => (
            <div style={{
                position: 'fixed',
                top: 0, left: 0, right: 0, bottom: 0,
                background: 'linear-gradient(135deg, #1E3A8A 0%, #0F172A 100%)',
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                justifyContent: 'center',
                color: 'white',
                zIndex: 9999
            }}>
                <div style={{
                    width: '60px',
                    height: '60px',
                    border: '4px solid rgba(255,255,255,0.2)',
                    borderTopColor: '#0EA5E9',
                    borderRadius: '50%',
                    animation: 'spin 1s linear infinite',
                    marginBottom: '20px'
                }}></div>
                <div style={{ fontSize: '24px', fontWeight: '700', marginBottom: '8px' }}>MV Solutions</div>
                <div style={{ fontSize: '14px', opacity: 0.8 }}>{message || 'Loading...'}</div>
                <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
            </div>
        );

        // ============ COMPONENT ESTIMATOR ============
        const ComponentEstimator = ({ products, items, bom, subProducts }) => {
            const [selectedProduct, setSelectedProduct] = useState('');
            const [quantity, setQuantity] = useState(1);
            const [productList, setProductList] = useState([]);
            const [componentResults, setComponentResults] = useState([]);
            const [grandTotal, setGrandTotal] = useState(0);
            const [showVendorContact, setShowVendorContact] = useState(true);

            const addProduct = () => {
                if (!selectedProduct || quantity < 1) return;
                const product = products.find(p => p.sku === selectedProduct);
                if (!product) return;

                // Check if already in list
                const existingIndex = productList.findIndex(p => p.sku === selectedProduct);
                if (existingIndex >= 0) {
                    const updated = [...productList];
                    updated[existingIndex].qty += quantity;
                    setProductList(updated);
                } else {
                    setProductList([...productList, { sku: product.sku, name: product.name, qty: quantity }]);
                }
                setSelectedProduct('');
                setQuantity(1);
            };

            const removeProduct = (sku) => {
                setProductList(productList.filter(p => p.sku !== sku));
            };

            // Recursive function to get all components for a product
            const getProductComponents = (productSku, multiplier = 1, visited = new Set()) => {
                if (visited.has(productSku)) return [];
                visited.add(productSku);

                let components = [];

                // Get direct components from BOM
                const directComponents = bom.filter(b => b.productSku === productSku);
                directComponents.forEach(dc => {
                    components.push({
                        code: dc.componentCode,
                        qty: dc.qty * multiplier
                    });
                });

                // Get sub-products and their components recursively
                const subs = subProducts.filter(sp => sp.productSku === productSku);
                subs.forEach(sub => {
                    const subComponents = getProductComponents(sub.subProductSku, sub.qty * multiplier, new Set(visited));
                    components = [...components, ...subComponents];
                });

                return components;
            };

            const calculateComponents = () => {
                if (productList.length === 0) return;

                // Collect all components
                let allComponents = [];
                productList.forEach(p => {
                    const comps = getProductComponents(p.sku, p.qty);
                    allComponents = [...allComponents, ...comps];
                });

                // Group by component code and sum quantities
                const grouped = {};
                allComponents.forEach(comp => {
                    if (grouped[comp.code]) {
                        grouped[comp.code].qty += comp.qty;
                    } else {
                        grouped[comp.code] = { code: comp.code, qty: comp.qty };
                    }
                });

                // Enrich with item details - use primary vendor (first in list)
                const results = Object.values(grouped).map(comp => {
                    const item = items.find(i => i.code === comp.code);
                    const vendors = item?.vendors || parseVendorsGlobal(item?.vendor, item?.vendorAddress) || [];
                    const primary = vendors[0] || { name: '', phone: '', email: '' };
                    return {
                        code: comp.code,
                        name: item?.name || 'Unknown',
                        qty: comp.qty,
                        price: item?.price || 0,
                        total: comp.qty * (item?.price || 0),
                        vendor: primary.name || '-',
                        vendorPhone: primary.phone || '',
                        vendorEmail: primary.email || '',
                        category: item?.category || '-'
                    };
                });

                // Sort by category then name
                results.sort((a, b) => {
                    if (a.category !== b.category) return a.category.localeCompare(b.category);
                    return a.name.localeCompare(b.name);
                });

                setComponentResults(results);
                setGrandTotal(results.reduce((sum, r) => sum + r.total, 0));
            };

            const handlePrint = () => {
                const printWindow = window.open('', '_blank');
                const html = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Component Estimate - MV Solutions</title>
                        <style>
                            body { font-family: Arial, sans-serif; padding: 20px; }
                            h1 { color: #1E3A8A; margin-bottom: 5px; }
                            h2 { color: #333; font-size: 16px; margin-top: 20px; }
                            .date { color: #666; font-size: 12px; margin-bottom: 20px; }
                            table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
                            th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                            th { background: #1E3A8A; color: white; }
                            tr:nth-child(even) { background: #f9f9f9; }
                            .right { text-align: right; }
                            .total-row { font-weight: bold; background: #E8F4FD !important; }
                            .products-list { margin-bottom: 20px; }
                            .products-list li { margin: 5px 0; }
                            a { color: #1E3A8A; text-decoration: none; }
                            a:hover { text-decoration: underline; }
                            @media print { body { padding: 0; } a { color: #1E3A8A; } }
                        </style>
                    </head>
                    <body>
                        <h1>MV SOLUTIONS</h1>
                        <div class="date">Component Estimate - ${new Date().toLocaleDateString('en-IN')}</div>

                        <h2>Products:</h2>
                        <ul class="products-list">
                            ${productList.map(p => `<li><strong>${p.name}</strong> (${p.sku}) × ${p.qty}</li>`).join('')}
                        </ul>

                        <h2>Components Required:</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Component Name</th>
                                    <th>Category</th>
                                    <th class="right">Qty</th>
                                    <th class="right">Unit Price</th>
                                    <th class="right">Total</th>
                                    <th>Vendor</th>
                                    ${showVendorContact ? '<th>Contact</th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
                                ${componentResults.map(c => {
                                    var contactParts = [];
                                    if (c.vendorPhone) contactParts.push(c.vendorPhone);
                                    if (c.vendorEmail) contactParts.push(c.vendorEmail);
                                    var contactCell = contactParts.length > 0 ? contactParts.join('<br>') : '-';
                                    return `
                                    <tr>
                                        <td>${c.code}</td>
                                        <td>${c.name}</td>
                                        <td>${c.category}</td>
                                        <td class="right">${c.qty}</td>
                                        <td class="right">₹${c.price.toLocaleString('en-IN')}</td>
                                        <td class="right">₹${c.total.toLocaleString('en-IN')}</td>
                                        <td>${c.vendor !== '-' ? c.vendor : '-'}</td>
                                        ${showVendorContact ? '<td>' + contactCell + '</td>' : ''}
                                    </tr>`;
                                }).join('')}
                                <tr class="total-row">
                                    <td colspan="5" class="right">GRAND TOTAL:</td>
                                    <td class="right">₹${grandTotal.toLocaleString('en-IN')}</td>
                                    <td colspan="${showVendorContact ? 2 : 1}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </body>
                    </html>
                `;
                printWindow.document.write(html);
                printWindow.document.close();
                printWindow.print();
            };

            // Download PDF with clickable links
            const handleDownloadPDF = () => {
                if (componentResults.length === 0) return;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');

                // Header
                doc.setFillColor(30, 58, 138);
                doc.rect(0, 0, 297, 30, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(18);
                doc.text('MV SOLUTIONS', 15, 14);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(10);
                doc.text('Component Estimate - ' + new Date().toLocaleDateString('en-IN'), 15, 23);

                // Products list
                doc.setTextColor(30, 58, 138);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.text('Products:', 15, 40);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(10);
                doc.setTextColor(50);
                productList.forEach(function(p, i) {
                    doc.text(p.name + ' (' + p.sku + ') x ' + p.qty, 20, 47 + i * 6);
                });

                var tableStartY = 47 + productList.length * 6 + 5;

                // Build table columns based on toggle
                var headRow = ['Code', 'Component', 'Category', 'Qty', 'Unit Price', 'Total', 'Vendor'];
                var colStyles = {
                    0: { cellWidth: 22 },
                    1: { cellWidth: 50 },
                    2: { cellWidth: 28 },
                    3: { halign: 'right', cellWidth: 15 },
                    4: { halign: 'right', cellWidth: 28 },
                    5: { halign: 'right', cellWidth: 28 },
                    6: { cellWidth: 40 }
                };

                if (showVendorContact) {
                    headRow.push('Contact');
                    colStyles[7] = { cellWidth: 55 };
                }

                var bodyData = componentResults.map(function(c) {
                    var row = [
                        c.code,
                        c.name,
                        c.category,
                        c.qty.toString(),
                        formatCurrencyPDF(c.price),
                        formatCurrencyPDF(c.total),
                        c.vendor !== '-' ? c.vendor : '-'
                    ];
                    if (showVendorContact) {
                        var parts = [];
                        if (c.vendorPhone) parts.push(c.vendorPhone);
                        if (c.vendorEmail) parts.push(c.vendorEmail);
                        row.push(parts.length > 0 ? parts.join('\n') : '-');
                    }
                    return row;
                });

                doc.autoTable({
                    startY: tableStartY,
                    head: [headRow],
                    body: bodyData,
                    theme: 'striped',
                    headStyles: { fillColor: [30, 58, 138], fontSize: 8, fontStyle: 'bold' },
                    bodyStyles: { fontSize: 8 },
                    columnStyles: colStyles,
                    didDrawCell: function(data) {
                        // Add clickable links to Contact column
                        if (!showVendorContact) return;
                        var contactColIdx = 7;
                        if (data.section === 'body' && data.column.index === contactColIdx) {
                            var c = componentResults[data.row.index];
                            if (c) {
                                var cellX = data.cell.x + 1;
                                var cellY = data.cell.y + 1;
                                var lineH = data.cell.styles.fontSize * 0.5;
                                if (c.vendorPhone) {
                                    doc.link(cellX, cellY, data.cell.width - 2, lineH + 2, { url: 'tel:' + c.vendorPhone });
                                    cellY += lineH + 3;
                                }
                                if (c.vendorEmail) {
                                    doc.link(cellX, cellY, data.cell.width - 2, lineH + 2, { url: 'mailto:' + c.vendorEmail });
                                }
                            }
                        }
                    }
                });

                // Grand Total row
                var finalY = doc.lastAutoTable.finalY + 8;
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.setTextColor(30, 58, 138);
                doc.text('GRAND TOTAL:', 180, finalY, { align: 'right' });
                doc.setTextColor(16, 185, 129);
                doc.text(formatCurrencyPDF(grandTotal), 220, finalY, { align: 'right' });

                doc.save('component-estimate-' + new Date().toISOString().slice(0, 10) + '.pdf');
            };

            return (
                <div className="page-container">
                    <div className="page-header">
                        <h1 className="page-title"><Icons.Calculator /> Component Estimator</h1>
                        <p className="page-subtitle">Calculate total components needed for multiple products</p>
                    </div>

                    <div className="card" style={{ marginBottom: '20px' }}>
                        <div className="card-header">
                            <h3 className="card-title">Add Products</h3>
                        </div>
                        <div style={{ display: 'flex', gap: '12px', alignItems: 'flex-end', flexWrap: 'wrap' }}>
                            <div className="form-group" style={{ flex: 2, minWidth: '200px', marginBottom: 0 }}>
                                <label className="form-label">Select Product</label>
                                <select
                                    className="form-select"
                                    value={selectedProduct}
                                    onChange={e => setSelectedProduct(e.target.value)}
                                >
                                    <option value="">-- Choose Product --</option>
                                    {products.map(p => (
                                        <option key={p.sku} value={p.sku}>{p.name} ({p.sku})</option>
                                    ))}
                                </select>
                            </div>
                            <div className="form-group" style={{ width: '100px', marginBottom: 0 }}>
                                <label className="form-label">Quantity</label>
                                <input
                                    type="number"
                                    className="form-input"
                                    value={quantity}
                                    onChange={e => setQuantity(Math.max(1, parseInt(e.target.value) || 1))}
                                    min="1"
                                />
                            </div>
                            <button className="btn btn-primary" onClick={addProduct} disabled={!selectedProduct}>
                                <Icons.Plus /> Add
                            </button>
                        </div>

                        {productList.length > 0 && (
                            <div style={{ marginTop: '20px' }}>
                                <div style={{ fontWeight: '600', marginBottom: '10px' }}>Products to Estimate:</div>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                                    {productList.map(p => (
                                        <div key={p.sku} style={{
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '8px',
                                            background: 'var(--bg-light)',
                                            padding: '8px 12px',
                                            borderRadius: '6px',
                                            border: '1px solid var(--border-color)'
                                        }}>
                                            <span><strong>{p.name}</strong> × {p.qty}</span>
                                            <button
                                                className="btn btn-danger btn-sm btn-icon"
                                                onClick={() => removeProduct(p.sku)}
                                                style={{ padding: '4px' }}
                                            >
                                                <Icons.X />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                                <button
                                    className="btn btn-success"
                                    onClick={calculateComponents}
                                    style={{ marginTop: '16px' }}
                                >
                                    <Icons.Calculator /> Calculate Components
                                </button>
                            </div>
                        )}
                    </div>

                    {componentResults.length > 0 && (
                        <div className="card">
                            <div className="card-header">
                                <h3 className="card-title">Components Required ({componentResults.length} items)</h3>
                                <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                                    <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '13px', cursor: 'pointer', color: 'var(--text-secondary)' }}>
                                        <input
                                            type="checkbox"
                                            checked={showVendorContact}
                                            onChange={e => setShowVendorContact(e.target.checked)}
                                            style={{ cursor: 'pointer' }}
                                        />
                                        Vendor Contacts
                                    </label>
                                    <button className="btn btn-secondary" onClick={handlePrint}>
                                        <Icons.Printer /> Print
                                    </button>
                                    <button className="btn btn-primary" onClick={handleDownloadPDF}>
                                        <Icons.Download /> Download PDF
                                    </button>
                                </div>
                            </div>
                            <div className="table-container">
                                <table className="table">
                                    <thead>
                                        <tr>
                                            <th>Code</th>
                                            <th>Component Name</th>
                                            <th>Category</th>
                                            <th style={{ textAlign: 'right' }}>Qty</th>
                                            <th style={{ textAlign: 'right' }}>Unit Price</th>
                                            <th style={{ textAlign: 'right' }}>Total</th>
                                            <th>Vendor</th>
                                            {showVendorContact && <th>Contact</th>}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {componentResults.map((c, idx) => (
                                            <tr key={idx}>
                                                <td><span className="code-badge">{c.code}</span></td>
                                                <td>{c.name}</td>
                                                <td><span className="category-badge">{c.category}</span></td>
                                                <td style={{ textAlign: 'right', fontWeight: '600' }}>{c.qty}</td>
                                                <td style={{ textAlign: 'right' }}>{formatCurrency(c.price)}</td>
                                                <td style={{ textAlign: 'right', fontWeight: '600', color: 'var(--success)' }}>{formatCurrency(c.total)}</td>
                                                <td style={{ fontSize: '13px', fontWeight: '500' }}>{c.vendor !== '-' ? c.vendor : '-'}</td>
                                                {showVendorContact && (
                                                    <td style={{ fontSize: '12px' }}>
                                                        {c.vendorPhone && <div><a href={`tel:${c.vendorPhone}`} style={{ color: 'var(--primary)' }}>{c.vendorPhone}</a></div>}
                                                        {c.vendorEmail && <div><a href={`mailto:${c.vendorEmail}`} style={{ color: 'var(--primary)' }}>{c.vendorEmail}</a></div>}
                                                        {!c.vendorPhone && !c.vendorEmail && '-'}
                                                    </td>
                                                )}
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot>
                                        <tr style={{ background: 'var(--bg-light)', fontWeight: '700' }}>
                                            <td colSpan="5" style={{ textAlign: 'right' }}>GRAND TOTAL:</td>
                                            <td style={{ textAlign: 'right', color: 'var(--primary)', fontSize: '16px' }}>{formatCurrency(grandTotal)}</td>
                                            <td colSpan={showVendorContact ? 2 : 1}></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    )}

                    {productList.length === 0 && componentResults.length === 0 && (
                        <div className="card" style={{ textAlign: 'center', padding: '60px 20px' }}>
                            <Icons.Calculator />
                            <h3 style={{ marginTop: '16px', color: 'var(--text-secondary)' }}>No Products Selected</h3>
                            <p style={{ color: 'var(--text-muted)' }}>Add products above to calculate the components needed</p>
                        </div>
                    )}
                </div>
            );
        };

        // Parse vendor + vendorAddress ;; separated strings into vendors array
        const parseVendorsGlobal = (vendor, vendorAddress) => {
            if (!vendor) return [];
            const names = vendor.split(' ;; ').map(s => s.trim());
            const contacts = (vendorAddress || '').split(' ;; ').map(s => s.trim());
            return names.map((name, i) => {
                const contact = contacts[i] || '';
                if (contact.includes('|')) {
                    const parts = contact.split('|');
                    return { name, phone: parts[0] || '', email: parts[1] || '' };
                }
                if (contact.includes('@')) return { name, phone: '', email: contact };
                return { name: contact ? `${name} (${contact})` : name, phone: '', email: '' };
            });
        };

        // Enrich items loaded from Google Sheets with parsed vendors array
        const enrichItems = (items) => items.map(item => {
            if (item.vendors && item.vendors.length > 0) return item;
            const vendors = parseVendorsGlobal(item.vendor, item.vendorAddress);
            return { ...item, vendors };
        });

        // ============ MAIN APP ============
        const App = () => {
            const [page, setPage] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [products, setProducts] = useState([]);
            const [bom, setBom] = useState([]);
            const [subProducts, setSubProducts] = useState([]);
            const [quotations, setQuotations] = useState([]);
            
            // Loading & Sync states
            const [isLoading, setIsLoading] = useState(true);
            const [loadingMessage, setLoadingMessage] = useState('Connecting to Google Sheets...');
            const [syncStatus, setSyncStatus] = useState('idle');
            const [lastSync, setLastSync] = useState(null);
            const [syncMessage, setSyncMessage] = useState('');

            // Admin section states
            const [adminExpanded, setAdminExpanded] = useState(false);
            const [adminUnlocked, setAdminUnlocked] = useState(isAdminAuthenticated());
            const [adminPassword, setAdminPassword] = useState('');
            const [adminError, setAdminError] = useState('');

            const handleAdminUnlock = async () => {
                try {
                    const inputHash = await hashPassword(adminPassword);
                    if (inputHash === CONFIG.ADMIN_HASH) {
                        setAdminUnlocked(true);
                        setAdminExpanded(true);
                        setAdminAuth(true);
                        setAdminPassword('');
                        setAdminError('');
                    } else {
                        setAdminError('Incorrect password');
                        setAdminPassword('');
                    }
                } catch (err) {
                    setAdminError('Error');
                }
            };

            const handleAdminLock = () => {
                setAdminUnlocked(false);
                setAdminExpanded(false);
                setAdminAuth(false);
                setPage('dashboard');
            };

            // ============ AUTO-LOAD ON STARTUP ============
            useEffect(() => {
                const loadData = async () => {
                    setIsLoading(true);
                    setLoadingMessage('Connecting to Google Sheets...');
                    
                    try {
                        // Try to load from Google Sheets first
                        const response = await fetch(`${CONFIG.API_URL}?action=getAllData`);
                        const result = await response.json();
                        
                        if (result.success && result.data) {
                            setLoadingMessage('Loading data...');

                            if (result.data.items) setItems(enrichItems(result.data.items));
                            if (result.data.products) setProducts(result.data.products);
                            if (result.data.bom) setBom(result.data.bom);
                            if (result.data.subProducts) setSubProducts(result.data.subProducts);
                            if (result.data.quotations) setQuotations(result.data.quotations);
                            
                            setLastSync(new Date().toISOString());
                            setLoadingMessage('Ready!');
                            
                            // Save to localStorage as backup
                            localStorage.setItem('mvs_data_v4', JSON.stringify({
                                items: result.data.items || [],
                                products: result.data.products || [],
                                bom: result.data.bom || [],
                                subProducts: result.data.subProducts || [],
                                quotations: result.data.quotations || [],
                                lastSync: new Date().toISOString()
                            }));
                        } else {
                            // If Google Sheets is empty, try localStorage
                            loadFromLocalStorage();
                        }
                    } catch (error) {
                        console.error('Failed to load from Google Sheets:', error);
                        setLoadingMessage('Offline mode - Loading local data...');
                        loadFromLocalStorage();
                    }
                    
                    setTimeout(() => setIsLoading(false), 500);
                };

                const loadFromLocalStorage = () => {
                    const saved = localStorage.getItem('mvs_data_v4');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.items) setItems(enrichItems(data.items));
                        if (data.products) setProducts(data.products);
                        if (data.bom) setBom(data.bom);
                        if (data.subProducts) setSubProducts(data.subProducts);
                        if (data.quotations) setQuotations(data.quotations);
                        if (data.lastSync) setLastSync(data.lastSync);
                    }
                };

                loadData();
            }, []);

            // Save to localStorage on every change (backup)
            useEffect(() => {
                if (!isLoading && (items.length > 0 || products.length > 0)) {
                    localStorage.setItem('mvs_data_v4', JSON.stringify({ 
                        items, products, bom, subProducts, quotations, lastSync 
                    }));
                }
            }, [items, products, bom, subProducts, quotations, lastSync, isLoading]);

            // ============ GOOGLE SHEETS API FUNCTIONS ============
            
            // Push data TO Google Sheets
            const syncToGoogleSheets = async () => {
                setSyncStatus('syncing');
                setSyncMessage('Uploading to Google Sheets...');

                try {
                    const payload = {
                        action: 'syncAll',
                        items: items.map(item => {
                            // Build ;; separated vendor and contact strings
                            const vendors = item.vendors || [];
                            const vendorStr = vendors.map(v => v.name).join(' ;; ') || item.vendor || '';
                            const contactStr = vendors.map(v => `${v.phone || ''}|${v.email || ''}`).join(' ;; ') || item.vendorAddress || '';
                            return {
                                code: item.code,
                                name: item.name,
                                price: item.price,
                                category: item.category || 'Electronics',
                                vendor: vendorStr,
                                vendorAddress: contactStr
                            };
                        }),
                        products: products.map(p => {
                            const makingCost = calculateMakingCost(p, items, products, bom, subProducts);
                            return {
                                sku: p.sku,
                                name: p.name,
                                category: p.category,
                                sellingPrice: p.sellingPrice || getSellingPrice(p, makingCost),
                                mrp: p.mrp || getMRP(p, makingCost),
                                d2cRate: p.d2cRate !== undefined ? p.d2cRate : 3,
                                amazonRate: p.amazonRate !== undefined ? p.amazonRate : 12,
                                flipkartRate: p.flipkartRate !== undefined ? p.flipkartRate : 11,
                                dealerRate: p.dealerRate !== undefined ? p.dealerRate : 500
                            };
                        }),
                        bom,
                        subProducts,
                        quotations
                    };

                    console.log('Syncing items:', payload.items);

                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    console.log('Sync response:', result);

                    if (result.success) {
                        const now = new Date().toISOString();
                        setLastSync(now);
                        setSyncStatus('success');
                        setSyncMessage('All data synced to Google Sheets!');
                    } else {
                        throw new Error(result.error || 'Sync failed');
                    }

                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 3000);

                } catch (error) {
                    console.error('Sync error:', error);
                    setSyncStatus('error');
                    setSyncMessage('Sync failed: ' + error.message);

                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 5000);
                }
            };

            // Pull data FROM Google Sheets
            const loadFromGoogleSheets = async () => {
                setSyncStatus('syncing');
                setSyncMessage('Loading from Google Sheets...');
                
                try {
                    const response = await fetch(`${CONFIG.API_URL}?action=getAllData`);
                    const result = await response.json();
                    
                    if (result.success && result.data) {
                        if (result.data.items) setItems(enrichItems(result.data.items));
                        if (result.data.products) setProducts(result.data.products);
                        if (result.data.bom) setBom(result.data.bom);
                        if (result.data.subProducts) setSubProducts(result.data.subProducts);
                        if (result.data.quotations) setQuotations(result.data.quotations);

                        const now = new Date().toISOString();
                        setLastSync(now);
                        setSyncStatus('success');
                        setSyncMessage('Data loaded from Google Sheets!');
                    } else {
                        setSyncStatus('success');
                        setSyncMessage('No data in Google Sheets yet.');
                    }
                    
                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 3000);

                } catch (error) {
                    console.error('Load error:', error);
                    setSyncStatus('error');
                    setSyncMessage('Failed to load. Check internet or API URL.');
                    
                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 5000);
                }
            };

            const formatLastSync = () => {
                if (!lastSync) return 'Never synced';
                const date = new Date(lastSync);
                return date.toLocaleString('en-IN', { 
                    day: '2-digit', 
                    month: 'short', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
            };

            // Show loading screen while fetching data
            if (isLoading) {
                return <LoadingScreen message={loadingMessage} />;
            }

            const renderPage = () => {
                switch (page) {
                    case 'dashboard': return <Dashboard items={items} products={products} quotations={quotations} bom={bom} subProducts={subProducts} />;
                    case 'items': return <ItemsMaster items={items} setItems={setItems} />;
                    case 'products': return <ProductsPage products={products} setProducts={setProducts} items={items} bom={bom} setBom={setBom} subProducts={subProducts} setSubProducts={setSubProducts} />;
                    case 'quotation': return <QuotationBuilder products={products} items={items} quotations={quotations} setQuotations={setQuotations} bom={bom} subProducts={subProducts} />;
                    case 'documents': return <SavedDocuments quotations={quotations} setQuotations={setQuotations} products={products} items={items} bom={bom} subProducts={subProducts} />;
                    case 'estimator': return <ComponentEstimator products={products} items={items} bom={bom} subProducts={subProducts} />;
                    default: return <Dashboard items={items} products={products} quotations={quotations} bom={bom} subProducts={subProducts} />;
                }
            };

            return (
                <div className="app">
                    <nav className="sidebar">
                        <div className="logo">
                            <div className="logo-icon">MV</div>
                            <div className="logo-text">MV Solutions<small>Quotation System</small></div>
                        </div>

                        <div className="nav">
                            {/* Public Section - Always visible */}
                            <div className={`nav-item ${page === 'dashboard' ? 'active' : ''}`} onClick={() => setPage('dashboard')}>
                                <Icons.Dashboard /> Product Catalog
                            </div>
                            <div className={`nav-item ${page === 'quotation' ? 'active' : ''}`} onClick={() => setPage('quotation')}>
                                <Icons.Quote /> Create Quotation
                            </div>

                            {/* Admin Section - Password Protected */}
                            <div className="nav-divider"></div>
                            <div
                                className="nav-label"
                                style={{
                                    cursor: 'pointer',
                                    display: 'flex',
                                    justifyContent: 'space-between',
                                    alignItems: 'center',
                                    userSelect: 'none'
                                }}
                                onClick={() => adminUnlocked && setAdminExpanded(!adminExpanded)}
                            >
                                <span>Admin Panel {adminUnlocked ? (adminExpanded ? '▼' : '▶') : '🔒'}</span>
                                {adminUnlocked && (
                                    <span
                                        onClick={(e) => { e.stopPropagation(); handleAdminLock(); }}
                                        style={{ fontSize: '10px', cursor: 'pointer', opacity: 0.7 }}
                                        title="Lock Admin"
                                    >Lock</span>
                                )}
                            </div>

                            {!adminUnlocked && (
                                <div style={{ padding: '8px 14px' }}>
                                    <input
                                        type="password"
                                        placeholder="Enter password..."
                                        value={adminPassword}
                                        onChange={e => setAdminPassword(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && handleAdminUnlock()}
                                        style={{
                                            width: '100%',
                                            padding: '8px 10px',
                                            border: '1px solid rgba(255,255,255,0.2)',
                                            borderRadius: '4px',
                                            background: 'rgba(255,255,255,0.1)',
                                            color: 'white',
                                            fontSize: '12px'
                                        }}
                                    />
                                    {adminError && (
                                        <div style={{ color: '#EF4444', fontSize: '11px', marginTop: '4px' }}>{adminError}</div>
                                    )}
                                    <button
                                        onClick={handleAdminUnlock}
                                        style={{
                                            width: '100%',
                                            marginTop: '6px',
                                            padding: '6px',
                                            background: 'var(--secondary)',
                                            border: 'none',
                                            borderRadius: '4px',
                                            color: 'white',
                                            fontSize: '12px',
                                            cursor: 'pointer'
                                        }}
                                    >Unlock</button>
                                </div>
                            )}

                            {adminUnlocked && adminExpanded && (
                                <>
                                    <div className={`nav-item ${page === 'items' ? 'active' : ''}`} onClick={() => setPage('items')}>
                                        <Icons.Items /> Items Master
                                    </div>
                                    <div className={`nav-item ${page === 'products' ? 'active' : ''}`} onClick={() => setPage('products')}>
                                        <Icons.Products /> Products
                                    </div>
                                    <div className={`nav-item ${page === 'estimator' ? 'active' : ''}`} onClick={() => setPage('estimator')}>
                                        <Icons.Calculator /> Estimator
                                    </div>
                                    <div className={`nav-item ${page === 'documents' ? 'active' : ''}`} onClick={() => setPage('documents')}>
                                        <Icons.History /> Saved Documents
                                    </div>
                                </>
                            )}

                            {/* Cloud Sync - Visible to all */}
                            <div className="nav-divider"></div>
                            <div className="nav-label">Cloud Sync</div>

                            <div
                                className="nav-item"
                                onClick={syncToGoogleSheets}
                                style={{
                                    background: syncStatus === 'syncing' ? 'rgba(59, 130, 246, 0.2)' :
                                               syncStatus === 'success' ? 'rgba(16, 185, 129, 0.2)' :
                                               syncStatus === 'error' ? 'rgba(239, 68, 68, 0.2)' : '',
                                    pointerEvents: syncStatus === 'syncing' ? 'none' : 'auto'
                                }}
                            >
                                {syncStatus === 'syncing' ? <SyncIcons.Refresh /> : <SyncIcons.Upload />}
                                {syncStatus === 'syncing' ? 'Syncing...' : 'Push to Cloud'}
                            </div>

                            <div
                                className="nav-item"
                                onClick={loadFromGoogleSheets}
                                style={{ pointerEvents: syncStatus === 'syncing' ? 'none' : 'auto' }}
                            >
                                <SyncIcons.Download /> Load from Cloud
                            </div>

                            {/* Sync Status - Visible to all */}
                            <div style={{
                                padding: '12px 14px',
                                fontSize: '11px',
                                color: 'rgba(255,255,255,0.5)',
                                borderTop: '1px solid rgba(255,255,255,0.1)',
                                marginTop: '8px'
                            }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
                                    <span style={{
                                        width: '8px',
                                        height: '8px',
                                        borderRadius: '50%',
                                        background: syncStatus === 'success' ? '#10B981' :
                                                   syncStatus === 'error' ? '#EF4444' :
                                                   syncStatus === 'syncing' ? '#3B82F6' : '#6B7280'
                                    }}></span>
                                    {syncStatus === 'syncing' ? 'Syncing...' :
                                     syncStatus === 'success' ? 'Synced!' :
                                     syncStatus === 'error' ? 'Sync Failed' : 'Ready'}
                                </div>
                                <div>Last: {formatLastSync()}</div>
                            </div>

                            {/* Sync Message Toast */}
                            {syncMessage && (
                                <div style={{
                                    padding: '10px 14px',
                                    margin: '8px',
                                    borderRadius: '8px',
                                    fontSize: '12px',
                                    background: syncStatus === 'success' ? 'rgba(16, 185, 129, 0.2)' :
                                               syncStatus === 'error' ? 'rgba(239, 68, 68, 0.2)' :
                                               'rgba(59, 130, 246, 0.2)',
                                    color: 'white'
                                }}>
                                    {syncMessage}
                                </div>
                            )}
                        </div>
                    </nav>

                    <main className="main">
                        {renderPage()}
                    </main>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
