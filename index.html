                const overdue = filteredTasks.filter(t => isOverdue(t));
                const inProgress = filteredTasks.filter(t => !isOverdue(t) && t.status === 'In Progress');
                const done = filteredTasks.filter(t => t.status === 'Done');
                const blocked = filteredTasks.filter(t => t.status === 'Blocked');
                return { overdue, inProgress, done, blocked };
            }, [filteredTasks, filter]);

            const renderTaskCard = (task) => {
                const latestUpdate = task.updates && task.updates.length > 0 ? task.updates[task.updates.length - 1] : null;
                const overdue = isOverdue(task);
                return (
                    <div
                        key={task.id}
                        className={`task-card priority-${(task.priority || 'medium').toLowerCase()}${overdue ? ' overdue' : ''}`}
                        onClick={() => { setSelectedTask(task); setDetailStatus(task.status); setLessonText(task.lesson || ''); setOutcomeText(task.outcome || ''); setView('detail'); }}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                            <div style={{ fontWeight: 700, fontSize: 15, flex: 1 }}>{task.title}</div>
                            <span className={`task-badge ${getPriorityClass(task.priority)}`} style={{ marginLeft: 8 }}>{task.priority}</span>
                        </div>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 8 }}>
                            {task.assignedTo && <span className="task-badge" style={{ background: '#EEF2FF', color: '#4338CA' }}>{task.assignedTo}</span>}
                            <span className={`task-badge ${getStatusClass(task.status)}`}>{task.status}</span>
                            {task.targetDate && <span className="task-badge" style={{ background: overdue ? '#FEE2E2' : '#F3F4F6', color: overdue ? '#991B1B' : '#374151' }}>Due {fmtShortDate(task.targetDate)}</span>}
                            {task.extensions && task.extensions.length > 0 && <span className="task-badge" style={{ background: '#FFFBEB', color: '#92400E' }}>+{task.extensions.length} ext</span>}
                        </div>
                        {latestUpdate && <div style={{ fontSize: 12, color: 'var(--text-muted)', fontStyle: 'italic', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>"{latestUpdate.text}"</div>}
                    </div>
                );
            };

            // ---- Board View ----
            const renderBoardView = () => {
                return (
                    <div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                            <div>
                                <h1 className="page-title">Team Tasks</h1>
                                <p className="page-subtitle">Track work across the team</p>
                            </div>
                            <button className="btn btn-primary" onClick={() => setView('form')}>+ New Task</button>
                        </div>
                        <div className="filter-tabs">
                            {[['all','All'],['my','My Tasks'],['overdue','Overdue'],['week','This Week']].map(([k,l]) => (
                                <div key={k} className={`filter-tab${filter === k ? ' active' : ''}`} onClick={() => setFilter(k)}>{l}</div>
                            ))}
                        </div>

                        {loading ? (
                            <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>Loading tasks…</div>
                        ) : filter === 'week' && weekGroups ? (
                            <div>
                                {weekGroups.overdue.length > 0 && <div className="meeting-group"><div className="meeting-group-title">⚠️ Overdue</div>{weekGroups.overdue.map(renderTaskCard)}</div>}
                                {weekGroups.inProgress.length > 0 && <div className="meeting-group"><div className="meeting-group-title">🔄 In Progress</div>{weekGroups.inProgress.map(renderTaskCard)}</div>}
                                {weekGroups.done.length > 0 && <div className="meeting-group"><div className="meeting-group-title">✅ Done This Week</div>{weekGroups.done.map(renderTaskCard)}</div>}
                                {weekGroups.blocked.length > 0 && <div className="meeting-group"><div className="meeting-group-title">🚫 Blocked</div>{weekGroups.blocked.map(renderTaskCard)}</div>}
                                {weekGroups.overdue.length === 0 && weekGroups.inProgress.length === 0 && weekGroups.done.length === 0 && weekGroups.blocked.length === 0 && (
                                    <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>No tasks for this week</div>
                                )}
                            </div>
                        ) : filteredTasks.length === 0 ? (
                            <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>
                                <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
                                <div>No tasks found</div>
                            </div>
                        ) : (
                            filteredTasks.map(renderTaskCard)
                        )}

                        {/* Team Members Section */}
                        <div className="members-section">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', marginBottom: membersOpen ? 12 : 0 }} onClick={() => setMembersOpen(!membersOpen)}>
                                <span style={{ fontWeight: 700, fontSize: 14 }}>Team Members ({members.length})</span>
                                <span style={{ fontSize: 18 }}>{membersOpen ? '▲' : '▼'}</span>
                            </div>
                            {membersOpen && (
                                <div>
                                    <div style={{ marginBottom: 10 }}>{members.map(m => (
                                        <span key={m.id} className="member-chip">
                                            {m.name}{m.role ? ` · ${m.role}` : ''}
                                            <span style={{ cursor: 'pointer', marginLeft: 4, color: '#991B1B' }} onClick={async () => {
                                                if (!confirm(`Remove ${m.name}?`)) return;
                                                await FirebaseTasks.deleteMember(m.id);
                                                const updated = members.filter(x => x.id !== m.id);
                                                setMembers(updated);
                                                localStorage.setItem('mvs_team_members', JSON.stringify(updated));
                                            }}>×</span>
                                        </span>
                                    ))}</div>
                                    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                                        <input className="form-input" placeholder="Name" value={newMemberName} onChange={e => setNewMemberName(e.target.value)} style={{ flex: '1 1 120px', minWidth: 0 }} />
                                        <input className="form-input" placeholder="Role (optional)" value={newMemberRole} onChange={e => setNewMemberRole(e.target.value)} style={{ flex: '1 1 120px', minWidth: 0 }} />
                                        <button className="btn btn-primary" onClick={async () => {
                                            if (!newMemberName.trim()) return;
                                            const id = await FirebaseTasks.addMember(newMemberName.trim(), newMemberRole.trim());
                                            if (id) {
                                                const updated = [...members, { id, name: newMemberName.trim(), role: newMemberRole.trim() }];
                                                setMembers(updated);
                                                localStorage.setItem('mvs_team_members', JSON.stringify(updated));
                                                setNewMemberName(''); setNewMemberRole('');
                                            }
                                        }}>Add</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ---- Form View ----
            const renderFormView = () => (
                <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
                        <button className="btn btn-secondary" onClick={() => setView('board')}>← Back</button>
                        <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700 }}>New Task</h2>
                    </div>
                    <div className="card" style={{ padding: 20 }}>
                        <div className="form-group">
                            <label className="form-label">Title *</label>
                            <input className="form-input" value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="Task title" />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Description</label>
                            <textarea className="form-input" rows={3} value={form.description} onChange={e => setForm({...form, description: e.target.value})} placeholder="What needs to be done?" style={{ resize: 'vertical' }} />
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                            <div className="form-group">
                                <label className="form-label">Assigned To</label>
                                <select className="form-input" value={form.assignedTo} onChange={e => setForm({...form, assignedTo: e.target.value})}>
                                    <option value="">— Select —</option>
                                    {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Assigned By</label>
                                <select className="form-input" value={form.assignedBy} onChange={e => setForm({...form, assignedBy: e.target.value})}>
                                    <option value="">— Select —</option>
                                    {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="form-group">
                            <label className="form-label">Target Date *</label>
                            <input type="date" className="form-input" value={form.targetDate} onChange={e => setForm({...form, targetDate: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Priority</label>
                            <div className="priority-tap-row">
                                {['Low','Medium','High','Urgent'].map(p => (
                                    <div key={p} className={`priority-tap task-badge ${getPriorityClass(p)}${form.priority === p ? ' selected' : ''}`} onClick={() => setForm({...form, priority: p})}>{p}</div>
                                ))}
                            </div>
                        </div>
                        <div className="form-group">
                            <label className="form-label">Status</label>
                            <select className="form-input" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                {['Open','In Progress','Done','Blocked'].map(s => <option key={s}>{s}</option>)}
                            </select>
                        </div>
                        <button className="btn btn-primary" style={{ width: '100%', marginTop: 8 }} disabled={saving || !form.title.trim() || !form.targetDate} onClick={async () => {
                            setSaving(true);
                            const newTask = { ...form, extensions: [], updates: [], lesson: '', outcome: '' };
                            const id = await FirebaseTasks.addTask(newTask);
                            if (id) {
                                const created = { id, ...newTask, createdAt: new Date().toISOString() };
                                setTasks(prev => [created, ...prev]);
                                setForm({ title: '', description: '', assignedTo: '', assignedBy: '', targetDate: '', priority: 'Medium', status: 'Open' });
                                setView('board');
                            }
                            setSaving(false);
                        }}>{saving ? 'Saving…' : 'Save Task'}</button>
                    </div>
                </div>
            );

            // ---- Detail View ----
            const renderDetailView = () => {
                if (!selectedTask) return null;
                const task = tasks.find(t => t.id === selectedTask.id) || selectedTask;
                const overdue = isOverdue(task);

                const saveStatus = async (newStatus) => {
                    setDetailStatus(newStatus);
                    await FirebaseTasks.updateTask(task.id, { status: newStatus });
                    setTasks(prev => prev.map(t => t.id === task.id ? { ...t, status: newStatus } : t));
                };

                const extendDate = async () => {
                    const newDate = prompt('New target date (YYYY-MM-DD):');
                    if (!newDate) return;
                    const reason = prompt('Reason for extension:');
                    if (!reason) return;
                    const ext = { from: task.targetDate, to: newDate, reason, at: new Date().toISOString() };
                    const extensions = [...(task.extensions || []), ext];
                    await FirebaseTasks.updateTask(task.id, { targetDate: newDate, extensions });
                    setTasks(prev => prev.map(t => t.id === task.id ? { ...t, targetDate: newDate, extensions } : t));
                    setSelectedTask(prev => ({ ...prev, targetDate: newDate, extensions }));
                };

                const addNote = async () => {
                    if (!noteText.trim()) return;
                    const note = { text: noteText.trim(), by: myName || 'Unknown', at: new Date().toISOString() };
                    const updates = [...(task.updates || []), note];
                    await FirebaseTasks.updateTask(task.id, { updates });
                    setTasks(prev => prev.map(t => t.id === task.id ? { ...t, updates } : t));
                    setSelectedTask(prev => ({ ...prev, updates }));
                    setNoteText('');
                };

                const saveLessonOutcome = async () => {
                    await FirebaseTasks.updateTask(task.id, { lesson: lessonText, outcome: outcomeText });
                    setTasks(prev => prev.map(t => t.id === task.id ? { ...t, lesson: lessonText, outcome: outcomeText } : t));
                };

                const deleteTask = async () => {
                    const pwd = prompt('Enter admin password to delete this task:');
                    if (pwd !== 'admin123') { alert('Wrong password'); return; }
                    if (!confirm('Delete this task permanently?')) return;
                    await FirebaseTasks.deleteTask(task.id);
                    setTasks(prev => prev.filter(t => t.id !== task.id));
                    setView('board');
                };

                return (
                    <div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                            <button className="btn btn-secondary" onClick={() => setView('board')}>← Back</button>
                            <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, flex: 1 }}>{task.title}</h2>
                        </div>

                        <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
                                <span className={`task-badge ${getPriorityClass(task.priority)}`}>{task.priority}</span>
                                <span className={`task-badge ${getStatusClass(detailStatus)}`}>{detailStatus}</span>
                                {overdue && <span className="task-badge priority-urgent">Overdue</span>}
                            </div>

                            {task.description && <p style={{ color: 'var(--text-secondary)', marginBottom: 12, fontSize: 14 }}>{task.description}</p>}

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, fontSize: 13, marginBottom: 16 }}>
                                <div><span style={{ color: 'var(--text-muted)' }}>Assigned To:</span> <strong>{task.assignedTo || '—'}</strong></div>
                                <div><span style={{ color: 'var(--text-muted)' }}>Assigned By:</span> <strong>{task.assignedBy || '—'}</strong></div>
                                <div><span style={{ color: 'var(--text-muted)' }}>Due Date:</span> <strong style={{ color: overdue ? '#EF4444' : 'inherit' }}>{fmtShortDate(task.targetDate)}</strong></div>
                                <div><span style={{ color: 'var(--text-muted)' }}>Created:</span> <strong>{task.createdAt ? fmtShortDate(task.createdAt) : '—'}</strong></div>
                            </div>

                            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
                                <label style={{ fontSize: 13, fontWeight: 600 }}>Status:</label>
                                <select className="form-input" style={{ width: 'auto', padding: '6px 10px' }} value={detailStatus} onChange={e => saveStatus(e.target.value)}>
                                    {['Open','In Progress','Done','Blocked'].map(s => <option key={s}>{s}</option>)}
                                </select>
                                <button className="btn btn-secondary" style={{ padding: '6px 14px', fontSize: 13 }} onClick={extendDate}>Extend Date</button>
                            </div>
                        </div>

                        {task.extensions && task.extensions.length > 0 && (
                            <div className="card" style={{ padding: 16, marginBottom: 16 }}>
                                <div style={{ fontWeight: 700, marginBottom: 10 }}>Date Extensions ({task.extensions.length})</div>
                                {task.extensions.map((ext, i) => (
                                    <div key={i} className="ext-entry">
                                        <strong>{fmtShortDate(ext.from)} → {fmtShortDate(ext.to)}</strong>: {ext.reason}
                                        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{ext.at ? formatDate(ext.at) : ''}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {detailStatus === 'Done' && (
                            <div className="card" style={{ padding: 16, marginBottom: 16, background: '#F0FDF4' }}>
                                <div style={{ fontWeight: 700, marginBottom: 10, color: '#065F46' }}>Closure Notes</div>
                                <div className="form-group">
                                    <label className="form-label">Lesson Learned</label>
                                    <textarea className="form-input" rows={2} value={lessonText} onChange={e => setLessonText(e.target.value)} placeholder="What did we learn?" style={{ resize: 'vertical' }} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Outcome</label>
                                    <textarea className="form-input" rows={2} value={outcomeText} onChange={e => setOutcomeText(e.target.value)} placeholder="What was achieved?" style={{ resize: 'vertical' }} />
                                </div>
                                <button className="btn btn-primary" style={{ padding: '8px 20px' }} onClick={saveLessonOutcome}>Save Closure Notes</button>
                            </div>
                        )}

                        <div className="card" style={{ padding: 16, marginBottom: 16 }}>
                            <div style={{ fontWeight: 700, marginBottom: 12 }}>Updates / Notes</div>
                            <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                                <input className="form-input" placeholder="Add a note…" value={noteText} onChange={e => setNoteText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') addNote(); }} style={{ flex: 1 }} />
                                <button className="btn btn-primary" style={{ padding: '8px 16px' }} onClick={addNote}>Add</button>
                            </div>
                            {task.updates && task.updates.length > 0 ? (
                                [...task.updates].reverse().map((u, i) => (
                                    <div key={i} className="update-entry">
                                        <div>{u.text}</div>
                                        <div className="update-meta">{u.by} · {u.at ? formatDate(u.at) : ''}</div>
                                    </div>
                                ))
                            ) : (
                                <div style={{ color: 'var(--text-muted)', fontSize: 13 }}>No updates yet</div>
                            )}
                        </div>

                        <div style={{ textAlign: 'right', paddingBottom: 24 }}>
                            <button className="btn" style={{ background: '#FEE2E2', color: '#991B1B', border: 'none' }} onClick={deleteTask}>Delete Task</button>
                        </div>
                    </div>
                );
            };

            return (
                <div>
                    {view === 'board' && renderBoardView()}
                    {view === 'form' && renderFormView()}
                    {view === 'detail' && renderDetailView()}
                </div>
            );
        };

        // ============ MAIN APP ============
        const App = () => {
            const [page, setPage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [items, setItems] = useState([]);
            const [products, setProducts] = useState([]);
            const [bom, setBom] = useState([]);
            const [subProducts, setSubProducts] = useState([]);
            const [quotations, setQuotations] = useState([]);
            
            // Loading & Sync states
            const [isLoading, setIsLoading] = useState(true);
            const [loadingMessage, setLoadingMessage] = useState('Connecting to Google Sheets...');
            const [syncStatus, setSyncStatus] = useState('idle');
            const [lastSync, setLastSync] = useState(null);
            const [syncMessage, setSyncMessage] = useState('');

            // Admin section states
            const [adminExpanded, setAdminExpanded] = useState(false);
            const [adminUnlocked, setAdminUnlocked] = useState(isAdminAuthenticated());
            const [adminPassword, setAdminPassword] = useState('');
            const [adminError, setAdminError] = useState('');

            const handleAdminUnlock = async () => {
                try {
                    const inputHash = await hashPassword(adminPassword);
                    if (inputHash === CONFIG.ADMIN_HASH) {
                        setAdminUnlocked(true);
                        setAdminExpanded(true);
                        setAdminAuth(true);
                        setAdminPassword('');
                        setAdminError('');
                    } else {
                        setAdminError('Incorrect password');
                        setAdminPassword('');
                    }
                } catch (err) {
                    setAdminError('Error');
                }
            };

            const handleAdminLock = () => {
                setAdminUnlocked(false);
                setAdminExpanded(false);
                setAdminAuth(false);
                setPage('dashboard');
            };

            // ============ AUTO-LOAD ON STARTUP ============
            useEffect(() => {
                const loadData = async () => {
                    setIsLoading(true);
                    setLoadingMessage('Connecting to Google Sheets...');
                    
                    try {
                        // Try to load from Google Sheets first
                        const response = await fetch(`${CONFIG.API_URL}?action=getAllData`);
                        const result = await response.json();
                        
                        if (result.success && result.data) {
                            setLoadingMessage('Loading data...');

                            if (result.data.items) setItems(enrichItems(result.data.items));
                            if (result.data.products) setProducts(result.data.products);
                            if (result.data.bom) setBom(result.data.bom);
                            if (result.data.subProducts) setSubProducts(result.data.subProducts);

                            // Load quotations from Firebase (tamper-proof source of truth)
                            setLoadingMessage('Loading quotations from Firebase...');
                            const firebaseQuotations = await FirebaseQuotations.getAllQuotations();
                            if (firebaseQuotations && firebaseQuotations.length > 0) {
                                setQuotations(firebaseQuotations);
                            } else if (result.data.quotations) {
                                setQuotations(result.data.quotations);
                            }

                            setLastSync(new Date().toISOString());
                            setLoadingMessage('Ready!');

                            // Save to localStorage as backup
                            localStorage.setItem('mvs_data_v4', JSON.stringify({
                                items: result.data.items || [],
                                products: result.data.products || [],
                                bom: result.data.bom || [],
                                subProducts: result.data.subProducts || [],
                                quotations: firebaseQuotations || result.data.quotations || [],
                                lastSync: new Date().toISOString()
                            }));
                        } else {
                            // If Google Sheets is empty, try localStorage
                            loadFromLocalStorage();
                        }
                    } catch (error) {
                        console.error('Failed to load from Google Sheets:', error);
                        setLoadingMessage('Offline mode - Loading local data...');
                        loadFromLocalStorage();
                    }
                    
                    setTimeout(() => setIsLoading(false), 500);
                };

                const loadFromLocalStorage = () => {
                    const saved = localStorage.getItem('mvs_data_v4');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.items) setItems(enrichItems(data.items));
                        if (data.products) setProducts(data.products);
                        if (data.bom) setBom(data.bom);
                        if (data.subProducts) setSubProducts(data.subProducts);
                        if (data.quotations) setQuotations(data.quotations);
                        if (data.lastSync) setLastSync(data.lastSync);
                    }
                };

                loadData();
            }, []);

            // Save to localStorage on every change (backup)
            useEffect(() => {
                if (!isLoading && (items.length > 0 || products.length > 0)) {
                    localStorage.setItem('mvs_data_v4', JSON.stringify({ 
                        items, products, bom, subProducts, quotations, lastSync 
                    }));
                }
            }, [items, products, bom, subProducts, quotations, lastSync, isLoading]);

            // ============ GOOGLE SHEETS API FUNCTIONS ============
            
            // Push data TO Google Sheets
            const syncToGoogleSheets = async () => {
                setSyncStatus('syncing');
                setSyncMessage('Uploading to Google Sheets...');

                try {
                    const payload = {
                        action: 'syncAll',
                        items: items.map(item => {
                            // Build ;; separated vendor and contact strings
                            const vendors = item.vendors || [];
                            const vendorStr = vendors.map(v => v.name).join(' ;; ') || item.vendor || '';
                            const contactStr = vendors.map(v => `${v.phone || ''}|${v.email || ''}`).join(' ;; ') || item.vendorAddress || '';
                            return {
                                code: item.code,
                                name: item.name,
                                price: item.price,
                                category: item.category || 'Electronics',
                                vendor: vendorStr,
                                vendorAddress: contactStr
                            };
                        }),
                        products: products.map(p => {
                            const makingCost = calculateMakingCost(p, items, products, bom, subProducts);
                            return {
                                sku: p.sku,
                                name: p.name,
                                category: p.category,
                                sellingPrice: p.sellingPrice || getSellingPrice(p, makingCost),
                                mrp: p.mrp || getMRP(p, makingCost),
                                d2cRate: p.d2cRate !== undefined ? p.d2cRate : 3,
                                amazonRate: p.amazonRate !== undefined ? p.amazonRate : 12,
                                flipkartRate: p.flipkartRate !== undefined ? p.flipkartRate : 11,
                                dealerRate: p.dealerRate !== undefined ? p.dealerRate : 500
                            };
                        }),
                        bom,
                        subProducts,
                        quotations
                    };

                    console.log('Syncing items:', payload.items);

                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    console.log('Sync response:', result);

                    if (result.success) {
                        const now = new Date().toISOString();
                        setLastSync(now);
                        setSyncStatus('success');
                        setSyncMessage('All data synced to Google Sheets!');
                    } else {
                        throw new Error(result.error || 'Sync failed');
                    }

                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 3000);

                } catch (error) {
                    console.error('Sync error:', error);
                    setSyncStatus('error');
                    setSyncMessage('Sync failed: ' + error.message);

                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 5000);
                }
            };

            // Pull data FROM Google Sheets
            const loadFromGoogleSheets = async () => {
                setSyncStatus('syncing');
                setSyncMessage('Loading from Google Sheets...');
                
                try {
                    const response = await fetch(`${CONFIG.API_URL}?action=getAllData`);
                    const result = await response.json();
                    
                    if (result.success && result.data) {
                        if (result.data.items) setItems(enrichItems(result.data.items));
                        if (result.data.products) setProducts(result.data.products);
                        if (result.data.bom) setBom(result.data.bom);
                        if (result.data.subProducts) setSubProducts(result.data.subProducts);

                        // Load quotations from Firebase (tamper-proof source)
                        const firebaseQuotations = await FirebaseQuotations.getAllQuotations();
                        if (firebaseQuotations && firebaseQuotations.length > 0) {
                            setQuotations(firebaseQuotations);
                        } else if (result.data.quotations) {
                            setQuotations(result.data.quotations);
                        }

                        const now = new Date().toISOString();
                        setLastSync(now);
                        setSyncStatus('success');
                        setSyncMessage('Data loaded from Google Sheets + Firebase!');
                    } else {
                        // Still try Firebase for quotations even if GSheets is empty
                        const firebaseQuotations = await FirebaseQuotations.getAllQuotations();
                        if (firebaseQuotations && firebaseQuotations.length > 0) {
                            setQuotations(firebaseQuotations);
                        }
                        setSyncStatus('success');
                        setSyncMessage('No data in Google Sheets yet.');
                    }
                    
                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 3000);

                } catch (error) {
                    console.error('Load error:', error);
                    setSyncStatus('error');
                    setSyncMessage('Failed to load. Check internet or API URL.');
                    
                    setTimeout(() => {
                        setSyncStatus('idle');
                        setSyncMessage('');
                    }, 5000);
                }
            };

            const formatLastSync = () => {
                if (!lastSync) return 'Never synced';
                const date = new Date(lastSync);
                return date.toLocaleString('en-IN', { 
                    day: '2-digit', 
                    month: 'short', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
            };

            // Show loading screen while fetching data
            if (isLoading) {
                return <LoadingScreen message={loadingMessage} />;
            }

            const navigate = (p) => { setPage(p); setSidebarOpen(false); };

            const renderPage = () => {
                switch (page) {
                    case 'dashboard': return <Dashboard items={items} products={products} quotations={quotations} bom={bom} subProducts={subProducts} />;
                    case 'items': return <ItemsMaster items={items} setItems={setItems} />;
                    case 'products': return <ProductsPage products={products} setProducts={setProducts} items={items} bom={bom} setBom={setBom} subProducts={subProducts} setSubProducts={setSubProducts} />;
                    case 'quotation': return <QuotationBuilder products={products} items={items} quotations={quotations} setQuotations={setQuotations} bom={bom} subProducts={subProducts} />;
                    case 'documents': return <SavedDocuments quotations={quotations} setQuotations={setQuotations} products={products} items={items} bom={bom} subProducts={subProducts} />;
                    case 'estimator': return <ComponentEstimator products={products} items={items} bom={bom} subProducts={subProducts} />;
                    case 'inventory': return <InventoryManagement items={items} products={products} bom={bom} subProducts={subProducts} />;
                    case 'inspection': return <SiteInspection products={products} />;
                    case 'tasks': return <TeamTasks />;
                    case 'projects': return <Projects />;
                    default: return <Dashboard items={items} products={products} quotations={quotations} bom={bom} subProducts={subProducts} />;
                }
            };

            return (
                <div className="app">
                    <button className="hamburger-btn" onClick={() => setSidebarOpen(true)}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <div className={`sidebar-backdrop ${sidebarOpen ? 'active' : ''}`} onClick={() => setSidebarOpen(false)}></div>
                    <nav className={`sidebar ${sidebarOpen ? 'sidebar-open' : ''}`}>
                        <div className="logo">
                            <div className="logo-icon">MV</div>
                            <div className="logo-text">MV Solutions<small>Quotation System</small></div>
                        </div>

                        <div className="nav">
                            {/* Public Section - Always visible */}
                            <div className={`nav-item ${page === 'dashboard' ? 'active' : ''}`} onClick={() => navigate('dashboard')}>
                                <Icons.Dashboard /> Product Catalog
                            </div>
                            <div className={`nav-item ${page === 'quotation' ? 'active' : ''}`} onClick={() => navigate('quotation')}>
                                <Icons.Quote /> Create Quotation
                            </div>
                            <div className={`nav-item ${page === 'inventory' ? 'active' : ''}`} onClick={() => navigate('inventory')}>
                                <Icons.Inventory /> Inventory
                            </div>
                            <div className={`nav-item ${page === 'inspection' ? 'active' : ''}`} onClick={() => navigate('inspection')}>
                                <Icons.Clipboard /> Site Inspections
                            </div>
                            <div className={`nav-item ${page === 'tasks' ? 'active' : ''}`} onClick={() => navigate('tasks')}>
                                <Icons.CheckList /> Team Tasks
                            </div>
                            <div className={`nav-item ${page === 'projects' ? 'active' : ''}`} onClick={() => navigate('projects')}>
                                <Icons.Folder /> Projects
                            </div>

                            {/* Admin Section - Password Protected */}
                            <div className="nav-divider"></div>
                            <div
                                className="nav-label"
                                style={{
                                    cursor: 'pointer',
                                    display: 'flex',
                                    justifyContent: 'space-between',
                                    alignItems: 'center',
                                    userSelect: 'none'
                                }}
                                onClick={() => adminUnlocked && setAdminExpanded(!adminExpanded)}
                            >
                                <span>Admin Panel {adminUnlocked ? (adminExpanded ? '▼' : '▶') : '🔒'}</span>
                                {adminUnlocked && (
                                    <span
                                        onClick={(e) => { e.stopPropagation(); handleAdminLock(); }}
                                        style={{ fontSize: '10px', cursor: 'pointer', opacity: 0.7 }}
                                        title="Lock Admin"
                                    >Lock</span>
                                )}
                            </div>

                            {!adminUnlocked && (
                                <div style={{ padding: '8px 14px' }}>
                                    <input
                                        type="password"
                                        placeholder="Enter password..."
                                        value={adminPassword}
                                        onChange={e => setAdminPassword(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && handleAdminUnlock()}
                                        style={{
                                            width: '100%',
                                            padding: '8px 10px',
                                            border: '1px solid rgba(255,255,255,0.2)',
                                            borderRadius: '4px',
                                            background: 'rgba(255,255,255,0.1)',
                                            color: 'white',
                                            fontSize: '12px'
                                        }}
                                    />
                                    {adminError && (
                                        <div style={{ color: '#EF4444', fontSize: '11px', marginTop: '4px' }}>{adminError}</div>
                                    )}
                                    <button
                                        onClick={handleAdminUnlock}
                                        style={{
                                            width: '100%',
                                            marginTop: '6px',
                                            padding: '6px',
                                            background: 'var(--secondary)',
                                            border: 'none',
                                            borderRadius: '4px',
                                            color: 'white',
                                            fontSize: '12px',
                                            cursor: 'pointer'
                                        }}
                                    >Unlock</button>
                                </div>
                            )}

                            {adminUnlocked && adminExpanded && (
                                <>
                                    <div className={`nav-item ${page === 'items' ? 'active' : ''}`} onClick={() => navigate('items')}>
                                        <Icons.Items /> Items Master
                                    </div>
                                    <div className={`nav-item ${page === 'products' ? 'active' : ''}`} onClick={() => navigate('products')}>
                                        <Icons.Products /> Products
                                    </div>
                                    <div className={`nav-item ${page === 'estimator' ? 'active' : ''}`} onClick={() => navigate('estimator')}>
                                        <Icons.Calculator /> Estimator
                                    </div>
                                    <div className={`nav-item ${page === 'documents' ? 'active' : ''}`} onClick={() => navigate('documents')}>
                                        <Icons.History /> Saved Documents
                                    </div>
                                </>
                            )}

                            {/* Cloud Sync - Visible to all */}
                            <div className="nav-divider"></div>
                            <div className="nav-label">Cloud Sync</div>

                            <div
                                className="nav-item"
                                onClick={syncToGoogleSheets}
                                style={{
                                    background: syncStatus === 'syncing' ? 'rgba(59, 130, 246, 0.2)' :
                                               syncStatus === 'success' ? 'rgba(16, 185, 129, 0.2)' :
                                               syncStatus === 'error' ? 'rgba(239, 68, 68, 0.2)' : '',
                                    pointerEvents: syncStatus === 'syncing' ? 'none' : 'auto'
                                }}
                            >
                                {syncStatus === 'syncing' ? <SyncIcons.Refresh /> : <SyncIcons.Upload />}
                                {syncStatus === 'syncing' ? 'Syncing...' : 'Push to Cloud'}
                            </div>

                            <div
                                className="nav-item"
                                onClick={loadFromGoogleSheets}
                                style={{ pointerEvents: syncStatus === 'syncing' ? 'none' : 'auto' }}
                            >
                                <SyncIcons.Download /> Load from Cloud
                            </div>

                            {/* Sync Status - Visible to all */}
                            <div style={{
                                padding: '12px 14px',
                                fontSize: '11px',
                                color: 'rgba(255,255,255,0.5)',
                                borderTop: '1px solid rgba(255,255,255,0.1)',
                                marginTop: '8px'
                            }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
                                    <span style={{
                                        width: '8px',
                                        height: '8px',
                                        borderRadius: '50%',
                                        background: syncStatus === 'success' ? '#10B981' :
                                                   syncStatus === 'error' ? '#EF4444' :
                                                   syncStatus === 'syncing' ? '#3B82F6' : '#6B7280'
                                    }}></span>
                                    {syncStatus === 'syncing' ? 'Syncing...' :
                                     syncStatus === 'success' ? 'Synced!' :
                                     syncStatus === 'error' ? 'Sync Failed' : 'Ready'}
                                </div>
                                <div>Last: {formatLastSync()}</div>
                            </div>

                            {/* Sync Message Toast */}
                            {syncMessage && (
                                <div style={{
                                    padding: '10px 14px',
                                    margin: '8px',
                                    borderRadius: '8px',
                                    fontSize: '12px',
                                    background: syncStatus === 'success' ? 'rgba(16, 185, 129, 0.2)' :
                                               syncStatus === 'error' ? 'rgba(239, 68, 68, 0.2)' :
                                               'rgba(59, 130, 246, 0.2)',
                                    color: 'white'
                                }}>
                                    {syncMessage}
                                </div>
                            )}
                        </div>
                    </nav>

                    <main className="main">
                        {renderPage()}
                    </main>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
