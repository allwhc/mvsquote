                                {selectedInsp.singlePhaseMotorControl && <div style={{ marginTop: '6px' }}><strong>Single Phase Motor:</strong> {selectedInsp.singlePhaseMotorDesc || 'Yes'}</div>}
                            </div>
                        </div>

                        {/* Suggested Products */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Suggested Products</h3></div>
                            <div className="card-body">
                                {selectedInsp.suggestedProducts?.length > 0 ? (
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                        {selectedInsp.suggestedProducts.map(sku => <span key={sku} className="code-badge">{sku}</span>)}
                                    </div>
                                ) : <span style={{ color: 'var(--text-muted)', fontSize: '13px' }}>None suggested</span>}
                            </div>
                        </div>

                        {selectedInsp.notes && (
                            <div className="card" style={{ gridColumn: '1 / -1' }}>
                                <div className="card-header"><h3 className="card-title">Notes</h3></div>
                                <div className="card-body" style={{ fontSize: '14px' }}>{selectedInsp.notes}</div>
                            </div>
                        )}
                        {selectedInsp.siteExtraDetails && (
                            <div className="card" style={{ gridColumn: '1 / -1' }}>
                                <div className="card-header"><h3 className="card-title">Additional Site Details</h3></div>
                                <div className="card-body" style={{ fontSize: '14px' }}>{selectedInsp.siteExtraDetails}</div>
                            </div>
                        )}
                        {(selectedInsp.nextAction || selectedInsp.nextFollowupDate) && (
                            <div className="card" style={{ gridColumn: '1 / -1', background: '#EFF6FF', borderColor: '#BFDBFE' }}>
                                <div className="card-header"><h3 className="card-title">Next Steps</h3></div>
                                <div className="card-body" style={{ fontSize: '14px', display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                                    {selectedInsp.nextAction && <div><strong>Document Required:</strong> {selectedInsp.nextAction}</div>}
                                    {selectedInsp.nextFollowupDate && <div><strong>Follow-up Date:</strong> {new Date(selectedInsp.nextFollowupDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            // ---- RENDER: FORM ----
            return (
                <div>
                    <div className="page-header">
                        <div>
                            <button className="btn btn-secondary btn-sm" onClick={handleCancel} style={{ marginBottom: '8px' }}>← Cancel</button>
                            <h1 className="page-title">New Site Inspection</h1>
                            {draftSaved && <span style={{ fontSize: '11px', color: 'var(--success)', marginLeft: '8px' }}>✓ Draft auto-saved</span>}
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            <button className="btn btn-secondary btn-sm" onClick={handleManualSaveDraft}>💾 Save Draft</button>
                            {step === STEPS.length - 1 && (
                                <button className="btn btn-success" onClick={handleSave} disabled={saving}>
                                    {saving ? 'Submitting...' : '🚀 Submit to Firebase'}
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Step indicator */}
                    <div className="insp-steps">
                        {STEPS.map((s, i) => (
                            <div key={s} className={`insp-step ${i === step ? 'active' : i < step ? 'done' : ''}`}
                                onClick={() => setStep(i)}>
                                <span className="insp-step-num">{i < step ? '✓' : i + 1}</span>
                                {s}
                            </div>
                        ))}
                    </div>

                    <div className="card">
                        <div className="card-body">

                        {/* STEP 0: Customer Info */}
                        {step === 0 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Customer & Site Info</h3>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Customer Name <span>*</span></label>
                                        <input className="form-input" value={form.customerName} onChange={e => setForm(f => ({ ...f, customerName: e.target.value }))} placeholder="e.g., Sharma Industries" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Contact Person on Site</label>
                                        <input className="form-input" value={form.contactPerson} onChange={e => setForm(f => ({ ...f, contactPerson: e.target.value }))} placeholder="Name of person at site" />
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Phone</label>
                                        <input type="tel" className="form-input" value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} placeholder="+91 98765 43210" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Inspected By <span>*</span></label>
                                        <input className="form-input" value={form.inspectedBy} onChange={e => setForm(f => ({ ...f, inspectedBy: e.target.value }))} placeholder="Technician name" />
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">How Did They Hear About Us?</label>
                                    <div className="checklist-row">
                                        {['Friend / Referral', 'Google Search', 'WhatsApp Ad', 'ChatGPT / AI Tools', 'Social Media', 'Exhibition / Event', 'Existing Customer', 'Other'].map(src => (
                                            <div key={src} className={`checklist-item ${form.referenceSource === src ? 'checked' : ''}`}
                                                onClick={() => setForm(f => ({ ...f, referenceSource: src }))}>
                                                {form.referenceSource === src ? '✓ ' : ''}{src}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Site Address</label>
                                    <input className="form-input" value={form.address} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} placeholder="Full site address" />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">GPS Location</label>
                                    {form.gps ? (
                                        <div className="gps-box">
                                            <Icons.MapPin />
                                            <span>Lat: {form.gps.lat}, Lng: {form.gps.lng} (±{form.gps.accuracy}m accuracy)</span>
                                            <button className="btn btn-secondary btn-sm" style={{ marginLeft: 'auto' }} onClick={() => setForm(f => ({ ...f, gps: null }))}>Clear</button>
                                        </div>
                                    ) : (
                                        <div className="gps-box no-gps">
                                            <Icons.MapPin />
                                            <span style={{ color: '#92400E' }}>GPS not captured yet</span>
                                            <button className="btn btn-primary btn-sm" style={{ marginLeft: 'auto' }} onClick={captureGPS}>📍 Capture GPS</button>
                                        </div>
                                    )}
                                </div>
                                {/* Site photos */}
                                <div className="form-group">
                                    <label className="form-label">Site Overview Photos</label>
                                    <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '8px' }}>
                                        <button className="photo-btn" onClick={() => triggerCamera(photo => setForm(f => ({ ...f, sitePhotos: [...(f.sitePhotos || []), photo] })))}>
                                            <Icons.Camera /> Take Photo
                                        </button>
                                        {(form.sitePhotos || []).map((p, i) => (
                                            <span key={i} className="photo-record" style={{ cursor: 'pointer' }} onClick={() => setForm(f => ({ ...f, sitePhotos: f.sitePhotos.filter((_, x) => x !== i) }))}>
                                                📷 {p.filename} ✕
                                            </span>
                                        ))}
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Photos stay on your phone. Tap a badge to remove it.</div>
                                </div>
                            </div>
                        )}

                        {/* STEP 1: Tanks */}
                        {step === 1 && (
                            <div>
                                <div className="form-group">
                                    <label className="form-label">Property Type</label>
                                    <div className="checklist-row">
                                        {['Housing Society', 'Bungalow', 'Building', 'Chawl', 'Industrial', 'Other'].map(pt => (
                                            <div key={pt} className={`checklist-item ${form.propertyType === pt ? 'checked' : ''}`}
                                                onClick={() => setForm(f => ({ ...f, propertyType: pt }))}>
                                                {form.propertyType === pt ? '✓ ' : ''}{pt}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {['Housing Society', 'Building', 'Chawl'].includes(form.propertyType) && (
                                    <div className="form-row" style={{ marginBottom: '16px' }}>
                                        <div className="form-group" style={{ marginBottom: 0 }}>
                                            <label className="form-label">Number of Buildings / Wings</label>
                                            <input type="number" className="form-input" value={form.numBuildings} onChange={e => setForm(f => ({ ...f, numBuildings: e.target.value }))} placeholder="e.g., 6" min="1" />
                                        </div>
                                        <div className="form-group" style={{ marginBottom: 0 }}>
                                            <label className="form-label">Floors per Building</label>
                                            <input type="number" className="form-input" value={form.numFloors} onChange={e => setForm(f => ({ ...f, numFloors: e.target.value }))} placeholder="e.g., 12" min="1" />
                                        </div>
                                    </div>
                                )}
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                                    <h3 style={{ color: 'var(--primary)' }}>Tanks ({form.tanks.length})</h3>
                                    <button className="btn btn-secondary btn-sm" onClick={addTank}><Icons.Plus /> Add Tank</button>
                                </div>
                                {form.tanks.map((tank, idx) => (
                                    <div key={idx} className="tank-card">
                                        <div className="tank-card-header">
                                            <span className="tank-card-label">{tank.label || `Tank ${idx + 1}`}</span>
                                            {form.tanks.length > 1 && (
                                                <button className="btn btn-danger btn-sm btn-icon" onClick={() => removeTank(idx)}><Icons.X /></button>
                                            )}
                                        </div>
                                        <div className="tank-grid" style={{ marginBottom: '10px' }}>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Label</label>
                                                <input className="form-input" value={tank.label} onChange={e => updateTank(idx, 'label', e.target.value)} placeholder="e.g., OH-1, UG-3" />
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Type</label>
                                                <select className="form-select" value={tank.type} onChange={e => updateTank(idx, 'type', e.target.value)}>
                                                    {TANK_TYPES.map(t => <option key={t}>{t}</option>)}
                                                </select>
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Material</label>
                                                <select className="form-select" value={tank.material} onChange={e => updateTank(idx, 'material', e.target.value)}>
                                                    {TANK_MATERIALS.map(m => <option key={m}>{m}</option>)}
                                                </select>
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Height/Depth (ft)</label>
                                                <input type="number" className="form-input" value={tank.height} onChange={e => updateTank(idx, 'height', e.target.value)} placeholder="e.g., 8" />
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Capacity (Litres)</label>
                                                <input type="number" className="form-input" value={tank.capacity} onChange={e => updateTank(idx, 'capacity', e.target.value)} placeholder="e.g., 5000" />
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Tank Photos</label>
                                                <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '6px' }}>
                                                    <button className="photo-btn" style={{ padding: '6px 10px', fontSize: '12px' }} onClick={() => addTankPhoto(idx)}>
                                                        <Icons.Camera /> Add Photo
                                                    </button>
                                                    {(tank.photos || []).map((p, pi) => (
                                                        <span key={pi} className="photo-record" style={{ cursor: 'pointer' }} onClick={() => {
                                                            setForm(f => {
                                                                const tanks = [...f.tanks];
                                                                tanks[idx] = { ...tanks[idx], photos: tanks[idx].photos.filter((_, x) => x !== pi) };
                                                                return { ...f, tanks };
                                                            });
                                                        }}>📷 {p.filename} ✕</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="form-row" style={{ marginTop: '8px' }}>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Wire Routing Possible?</label>
                                                <select className="form-select" value={tank.wireRouting} onChange={e => updateTank(idx, 'wireRouting', e.target.value)}>
                                                    <option value="">Select</option>
                                                    <option>Yes — Easy Access</option>
                                                    <option>Yes — Conduit Required</option>
                                                    <option>Partial — Some Challenges</option>
                                                    <option>No — Wireless Only</option>
                                                </select>
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Wire Routing Notes</label>
                                                <input className="form-input" value={tank.wireNotes} onChange={e => updateTank(idx, 'wireNotes', e.target.value)} placeholder="e.g., 20m cable, 2 bends needed" />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                <button className="btn btn-secondary" style={{ width: '100%' }} onClick={addTank}><Icons.Plus /> Add Another Tank</button>
                            </div>
                        )}

                        {/* STEP 2: Site Conditions */}
                        {step === 2 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Site Conditions</h3>
                                <div className="form-group">
                                    <label className="form-label">Tank Layout</label>
                                    <select className="form-select" value={form.clustered} onChange={e => setForm(f => ({ ...f, clustered: e.target.value }))}>
                                        <option>Clustered (&lt;50m)</option>
                                        <option>Spread (50-200m)</option>
                                        <option>Far Apart (&gt;200m)</option>
                                    </select>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Power Available Near Tanks?</label>
                                        <select className="form-select" value={form.power} onChange={e => setForm(f => ({ ...f, power: e.target.value }))}>
                                            <option>Yes</option><option>No</option><option>Partial</option>
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">WiFi / Internet Available?</label>
                                        <select className="form-select" value={form.wifi} onChange={e => setForm(f => ({ ...f, wifi: e.target.value }))}>
                                            <option>Yes</option><option>No</option><option>Can Arrange</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Distance to Control Room (meters)</label>
                                        <input type="number" className="form-input" value={form.controlRoomDistance} onChange={e => setForm(f => ({ ...f, controlRoomDistance: e.target.value }))} placeholder="e.g., 50" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Pump Automation Needed?</label>
                                        <select className="form-select" value={form.pumpAutomation} onChange={e => setForm(f => ({ ...f, pumpAutomation: e.target.value }))}>
                                            <option>No</option><option>Yes</option><option>Future</option>
                                        </select>
                                    </div>
                                </div>
                                {form.pumpAutomation === 'Yes' && (
                                    <div className="form-group">
                                        <label className="form-label">Number of Pumps</label>
                                        <input type="number" className="form-input" value={form.pumpCount} onChange={e => setForm(f => ({ ...f, pumpCount: e.target.value }))} placeholder="e.g., 4" style={{ maxWidth: '150px' }} />
                                    </div>
                                )}
                                <div className="form-group">
                                    <label className="form-label">Site Condition Photos</label>
                                    <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '8px' }}>
                                        <button className="photo-btn" onClick={() => triggerCamera(photo => setForm(f => ({ ...f, siteConditionPhotos: [...(f.siteConditionPhotos || []), photo] })))}>
                                            <Icons.Camera /> Take Photo
                                        </button>
                                        {(form.siteConditionPhotos || []).map((p, i) => (
                                            <span key={i} className="photo-record" style={{ cursor: 'pointer' }} onClick={() => setForm(f => ({ ...f, siteConditionPhotos: f.siteConditionPhotos.filter((_, x) => x !== i) }))}>
                                                📷 {p.filename} ✕
                                            </span>
                                        ))}
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Photos stay on your phone. Tap a photo badge to remove it.</div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Additional Site Details</label>
                                    <textarea className="form-textarea" rows="3" value={form.siteExtraDetails} onChange={e => setForm(f => ({ ...f, siteExtraDetails: e.target.value }))} placeholder="e.g., Rooftop access via external staircase, corrosive environment near tank 3, CCTV room nearby, conduit already in place..." />
                                </div>
                            </div>
                        )}

                        {/* STEP 3: Requirements */}
                        {step === 3 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Monitoring & Control Requirements</h3>
                                <div className="form-group">
                                    <label className="form-label">What to Monitor?</label>
                                    <div className="checklist-row">
                                        {MONITORING_OPTIONS.map(opt => (
                                            <div key={opt} className={`checklist-item ${form.monitoring.includes(opt) ? 'checked' : ''}`}
                                                onClick={() => toggleCheck('monitoring', opt)}>
                                                {form.monitoring.includes(opt) ? '✓ ' : ''}{opt}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Alerts Required?</label>
                                    <div className="checklist-row">
                                        {ALERT_OPTIONS.map(opt => (
                                            <div key={opt} className={`checklist-item ${form.alerts.includes(opt) ? 'checked' : ''}`}
                                                onClick={() => toggleCheck('alerts', opt)}>
                                                {form.alerts.includes(opt) ? '✓ ' : ''}{opt}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label" style={{ marginBottom: '10px' }}>Control Requirements</label>
                                    {[
                                        { key: 'valveControl', descKey: 'valveControlDesc', label: 'Valve Control', placeholder: 'e.g., 4 motorised ball valves, 2 inch' },
                                        { key: 'submersiblePumpControl', descKey: 'submersiblePumpDesc', label: 'Submersible Pump Control', placeholder: 'e.g., 2 pumps, 1HP each, 3-phase' },
                                        { key: 'singlePhaseMotorControl', descKey: 'singlePhaseMotorDesc', label: 'Single Phase Motor Control', placeholder: 'e.g., 3 motors, 0.5HP, star-delta starter needed' },
                                    ].map(ctrl => (
                                        <div key={ctrl.key} style={{ background: 'var(--bg)', borderRadius: '8px', padding: '12px', marginBottom: '10px' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer', fontWeight: 600, fontSize: '14px' }}>
                                                <input type="checkbox" checked={form[ctrl.key]} onChange={e => setForm(f => ({ ...f, [ctrl.key]: e.target.checked }))} style={{ width: '18px', height: '18px' }} />
                                                {ctrl.label}
                                            </label>
                                            {form[ctrl.key] && (
                                                <input className="form-input" style={{ marginTop: '8px' }} value={form[ctrl.descKey]} onChange={e => setForm(f => ({ ...f, [ctrl.descKey]: e.target.value }))} placeholder={ctrl.placeholder} />
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* STEP 4: Recommendation */}
                        {step === 4 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Technician Recommendations</h3>
                                <div className="form-group">
                                    <label className="form-label">Notes / Observations</label>
                                    <textarea className="form-textarea" rows="4" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="e.g., Tanks on rooftop, cable tray needed, corrosive environment near tank 3..." />
                                </div>
                                <div className="form-row">
                                    <div className="form-group" style={{ marginBottom: 0 }}>
                                        <label className="form-label">Next Document Required</label>
                                        <select className="form-select" value={form.nextAction} onChange={e => setForm(f => ({ ...f, nextAction: e.target.value }))}>
                                            <option value="">— Select —</option>
                                            <option>Presentation</option>
                                            <option>Quotation</option>
                                            <option>Revised Quotation</option>
                                            <option>Proposal</option>
                                            <option>Demo / POC</option>
                                            <option>Site Survey Report</option>
                                            <option>Purchase Order Expected</option>
                                            <option>Follow-up Call Only</option>
                                        </select>
                                    </div>
                                    <div className="form-group" style={{ marginBottom: 0 }}>
                                        <label className="form-label">Next Follow-up Date</label>
                                        <input type="date" className="form-input" value={form.nextFollowupDate} onChange={e => setForm(f => ({ ...f, nextFollowupDate: e.target.value }))} />
                                    </div>
                                </div>
                                {products.length > 0 && (
                                    <div className="form-group">
                                        <label className="form-label">Suggested Products <span style={{ fontWeight: 400, color: 'var(--text-muted)', fontSize: '12px' }}>(optional — tap to select)</span></label>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '6px' }}>
                                            {products.map(p => (
                                                <div key={p.sku} className={`checklist-item ${(form.suggestedProducts || []).includes(p.sku) ? 'checked' : ''}`}
                                                    onClick={() => toggleProduct(p.sku)}>
                                                    {(form.suggestedProducts || []).includes(p.sku) ? '✓ ' : ''}{p.sku} – {p.name}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        </div>
                    </div>

                    {/* Navigation */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '16px' }}>
                        <button className="btn btn-secondary" onClick={() => step > 0 ? setStep(step - 1) : handleCancel()}>
                            ← {step === 0 ? 'Cancel' : 'Back'}
                        </button>
                        {step < STEPS.length - 1 ? (
                            <button className="btn btn-primary" onClick={() => setStep(step + 1)}>
                                Next →
                            </button>
                        ) : (
                            <button className="btn btn-success" onClick={handleSave} disabled={saving}>
                                {saving ? 'Submitting...' : '🚀 Submit to Firebase'}
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // ============ PROJECTS ============
        const Projects = () => {
            const [projects, setProjects] = useState([]);
            const [view, setView] = useState('list'); // 'list' | 'form' | 'detail'
            const [selectedProject, setSelectedProject] = useState(null);
            const [projectTasks, setProjectTasks] = useState([]);
            const [filter, setFilter] = useState('all');
            const [members, setMembers] = useState(() => JSON.parse(localStorage.getItem('mvs_team_members') || '[]'));
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [showTaskForm, setShowTaskForm] = useState(false);
            const [expandedTaskId, setExpandedTaskId] = useState(null);
            const [noteText, setNoteText] = useState('');
            const [projNoteText, setProjNoteText] = useState('');
            const [extendDate, setExtendDate] = useState('');
            const [extendReason, setExtendReason] = useState('');
            const [showExtendForm, setShowExtendForm] = useState(null);
            const myName = localStorage.getItem('mvs_my_name') || '';

            const emptyProject = {
                title: '', description: '', category: 'Sales Lead',
                status: 'Active', priority: 'Medium',
                responsiblePerson: '', teamMembers: [],
                startDate: new Date().toISOString().split('T')[0],
                targetDate: '', goal: '', linkedInspectionId: '',
                projectNotes: []
            };
            const emptyProjectTask = {
                projectId: '', title: '', assignedTo: '', assignedBy: myName,
                targetDate: '', priority: 'Medium', status: 'Open',
                extensions: [], updates: [], lesson: '', outcome: ''
            };

            const [form, setForm] = useState(emptyProject);
            const [editingId, setEditingId] = useState(null);
            const [taskForm, setTaskForm] = useState(emptyProjectTask);

            const CATEGORIES = ['Sales Lead','Installation','Internal','Product Development','Service','Other'];
            const STATUSES = ['Planning','Active','On Hold','Completed'];
            const PRIORITIES = ['Low','Medium','High','Urgent'];
            const TASK_STATUSES = ['Open','In Progress','Completed','Blocked'];

            useEffect(() => { loadProjects(); }, []);

            const loadProjects = async () => {
                setLoading(true);
                const data = await FirebaseProjects.getProjects();
                setProjects(data);
                // cache members from firebase team_members if not already cached
                try {
                    const snap = await db.collection('team_members').orderBy('name').get();
                    const m = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (m.length) {
                        setMembers(m);
                        localStorage.setItem('mvs_team_members', JSON.stringify(m));
                    }
                } catch(e) {}
                setLoading(false);
            };

            const loadProjectTasks = async (projectId) => {
                const tasks = await FirebaseProjects.getProjectTasks(projectId);
                setProjectTasks(tasks);
            };

            const openDetail = (project) => {
                setSelectedProject(project);
                setView('detail');
                loadProjectTasks(project.firebaseId);
                setExpandedTaskId(null);
                setShowTaskForm(false);
                setNoteText('');
                setProjNoteText('');
            };

            const openForm = (project = null) => {
                if (project) {
                    setForm({ ...emptyProject, ...project });
                    setEditingId(project.firebaseId);
                } else {
                    setForm(emptyProject);
                    setEditingId(null);
                }
                setView('form');
            };

            const saveProject = async () => {
                if (!form.title.trim()) { alert('Title is required'); return; }
                setSaving(true);
                const data = { ...form };
                delete data.firebaseId;
                if (editingId) {
                    await FirebaseProjects.updateProject(editingId, data);
                    await loadProjects();
                    // refresh selectedProject if in detail
                    if (selectedProject && selectedProject.firebaseId === editingId) {
                        const updated = { ...data, firebaseId: editingId };
                        setSelectedProject(updated);
                        setView('detail');
                    } else {
                        setView('list');
                    }
                } else {
                    await FirebaseProjects.addProject(data);
                    await loadProjects();
                    setView('list');
                }
                setSaving(false);
            };

            const deleteProject = async (project) => {
                const pw = prompt('Enter admin password to delete this project:');
                if (pw !== 'admin123') { alert('Incorrect password'); return; }
                if (!confirm(`Delete project "${project.title}" and all its tasks?`)) return;
                setSaving(true);
                // delete all project tasks first
                const tasks = await FirebaseProjects.getProjectTasks(project.firebaseId);
                for (const t of tasks) { await FirebaseProjects.deleteProjectTask(t.firebaseId); }
                await FirebaseProjects.deleteProject(project.firebaseId);
                await loadProjects();
                setView('list');
                setSaving(false);
            };

            const saveTask = async () => {
                if (!taskForm.title.trim()) { alert('Task title required'); return; }
                setSaving(true);
                const data = { ...taskForm, projectId: selectedProject.firebaseId };
                delete data.firebaseId;
                await FirebaseProjects.addProjectTask(data);
                await loadProjectTasks(selectedProject.firebaseId);
                setTaskForm({ ...emptyProjectTask, projectId: selectedProject.firebaseId });
                setShowTaskForm(false);
                setSaving(false);
            };

            const updateTaskStatus = async (task, newStatus) => {
                await FirebaseProjects.updateProjectTask(task.firebaseId, { status: newStatus });
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const addTaskNote = async (task) => {
                if (!noteText.trim()) return;
                const updates = [...(task.updates || []), { text: noteText, by: myName, at: new Date().toISOString() }];
                await FirebaseProjects.updateProjectTask(task.firebaseId, { updates });
                setNoteText('');
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const extendTaskDate = async (task) => {
                if (!extendDate) { alert('Select a new target date'); return; }
                const extensions = [...(task.extensions || []), { from: task.targetDate, to: extendDate, reason: extendReason, at: new Date().toISOString(), by: myName }];
                await FirebaseProjects.updateProjectTask(task.firebaseId, { targetDate: extendDate, extensions });
                setExtendDate(''); setExtendReason(''); setShowExtendForm(null);
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const deleteTask = async (task) => {
                if (!confirm('Delete this task?')) return;
                await FirebaseProjects.deleteProjectTask(task.firebaseId);
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const addProjectNote = async () => {
                if (!projNoteText.trim()) return;
                const notes = [...(selectedProject.projectNotes || []), { text: projNoteText, by: myName, at: new Date().toISOString() }];
                await FirebaseProjects.updateProject(selectedProject.firebaseId, { projectNotes: notes });
                const updated = { ...selectedProject, projectNotes: notes };
                setSelectedProject(updated);
                setProjects(prev => prev.map(p => p.firebaseId === updated.firebaseId ? updated : p));
                setProjNoteText('');
            };

            const priorityColor = (p) => ({ Low: '#9CA3AF', Medium: '#3B82F6', High: '#F97316', Urgent: '#EF4444' }[p] || '#9CA3AF');
            const statusColor = (s) => ({ Planning: '#8B5CF6', Active: '#10B981', 'On Hold': '#F59E0B', Completed: '#6B7280' }[s] || '#6B7280');
            const taskStatusColor = (s) => ({ Open: '#3B82F6', 'In Progress': '#F59E0B', Completed: '#10B981', Blocked: '#EF4444' }[s] || '#6B7280');

            const isOverdue = (date) => date && new Date(date) < new Date() && true;
            const daysRemaining = (date) => {
                if (!date) return null;
                const diff = Math.ceil((new Date(date) - new Date()) / 86400000);
                return diff;
            };

            const filteredProjects = useMemo(() => {
                if (filter === 'all') return projects;
                if (filter === 'active') return projects.filter(p => p.status === 'Active');
                if (filter === 'completed') return projects.filter(p => p.status === 'Completed');
                if (filter === 'onhold') return projects.filter(p => p.status === 'On Hold');
                return projects;
            }, [projects, filter]);

            // — List View —
            const renderListView = () => (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Projects</h1>
                        <button className="btn btn-primary" onClick={() => openForm()}>+ New Project</button>
                    </div>
                    <div style={{display:'flex', gap:'8px', marginBottom:'16px', flexWrap:'wrap'}}>
                        {[['all','All'],['active','Active'],['onhold','On Hold'],['completed','Completed']].map(([k,l]) => (
                            <button key={k} className={`btn btn-sm ${filter===k ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setFilter(k)}>{l}</button>
                        ))}
                    </div>
                    {loading ? <div style={{textAlign:'center',padding:'40px',color:'var(--text-secondary)'}}>Loading...</div> :
                        filteredProjects.length === 0 ? <div style={{textAlign:'center',padding:'40px',color:'var(--text-secondary)'}}>No projects found. Create one!</div> :
                        filteredProjects.map(p => {
                            const days = daysRemaining(p.targetDate);
                            return (
                                <div key={p.firebaseId} className={`project-card priority-${(p.priority||'medium').toLowerCase()}`} onClick={() => openDetail(p)}>
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'6px'}}>
                                        <div style={{fontWeight:700, fontSize:'15px'}}>{p.title}</div>
                                        <div style={{display:'flex', gap:'4px', flexWrap:'wrap', justifyContent:'flex-end'}}>
                                            <span className="status-badge" style={{background: statusColor(p.status)+'22', color: statusColor(p.status), fontSize:'11px'}}>{p.status}</span>
                                            <span className="status-badge" style={{background: priorityColor(p.priority)+'22', color: priorityColor(p.priority), fontSize:'11px'}}>{p.priority}</span>
                                            <span className="code-badge" style={{fontSize:'11px'}}>{p.category}</span>
                                        </div>
                                    </div>
                                    {p.goal && <div style={{fontSize:'12px', fontStyle:'italic', color:'var(--text-secondary)', marginBottom:'6px'}}>{p.goal}</div>}
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:'13px', color:'var(--text-secondary)'}}>
                                        <span>{p.responsiblePerson || 'Unassigned'}</span>
                                        {p.targetDate && <span style={{color: days !== null && days < 0 ? '#EF4444' : days !== null && days <= 3 ? '#F97316' : 'inherit'}}>
                                            {days !== null && days < 0 ? `${Math.abs(days)}d overdue` : days !== null ? `${days}d left` : ''} · {formatDate(p.targetDate)}
                                        </span>}
                                    </div>
                                </div>
                            );
                        })
                    }
                </div>
            );

            // — Form View —
            const renderFormView = () => (
                <div>
                    <div className="page-header">
                        <button className="btn btn-secondary btn-sm" onClick={() => setView(editingId && selectedProject ? 'detail' : 'list')}>← Back</button>
                        <h1 className="page-title">{editingId ? 'Edit Project' : 'New Project'}</h1>
                    </div>
                    <div className="card">
                        <div className="card-body">
                            <div className="form-group">
                                <label className="form-label">Title *</label>
                                <input className="form-input" value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="Project title" />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Category</label>
                                <div className="priority-tap-row">
                                    {CATEGORIES.map(c => (
                                        <span key={c} className={`priority-tap${form.category===c?' selected':''}`}
                                            style={{background: form.category===c?'#EEF2FF':'#F3F4F6', color: form.category===c?'#4338CA':'#6B7280'}}
                                            onClick={() => setForm({...form, category: c})}>{c}</span>
                                    ))}
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Priority</label>
                                <div className="priority-tap-row">
                                    {PRIORITIES.map(p => (
                                        <span key={p} className={`priority-tap${form.priority===p?' selected':''}`}
                                            style={{color: priorityColor(p), background: form.priority===p ? priorityColor(p)+'22' : '#F3F4F6'}}
                                            onClick={() => setForm({...form, priority: p})}>{p}</span>
                                    ))}
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Status</label>
                                <div className="priority-tap-row">
                                    {STATUSES.map(s => (
                                        <span key={s} className={`priority-tap${form.status===s?' selected':''}`}
                                            style={{color: statusColor(s), background: form.status===s ? statusColor(s)+'22' : '#F3F4F6'}}
                                            onClick={() => setForm({...form, status: s})}>{s}</span>
                                    ))}
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Goal / Objective</label>
                                <input className="form-input" value={form.goal} onChange={e => setForm({...form, goal: e.target.value})} placeholder="What does completing this project achieve?" />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Description</label>
                                <textarea className="form-textarea" rows={3} value={form.description} onChange={e => setForm({...form, description: e.target.value})} placeholder="Project details..." />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Responsible Person</label>
                                <select className="form-select" value={form.responsiblePerson} onChange={e => setForm({...form, responsiblePerson: e.target.value})}>
                                    <option value="">-- Select --</option>
                                    {members.map(m => <option key={m.id||m.name} value={m.name}>{m.name}</option>)}
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Team Members</label>
                                <div style={{display:'flex', flexWrap:'wrap', gap:'6px'}}>
                                    {members.map(m => {
                                        const sel = (form.teamMembers||[]).includes(m.name);
                                        return (
                                            <span key={m.id||m.name}
                                                style={{padding:'6px 12px', borderRadius:'20px', fontSize:'13px', cursor:'pointer', background: sel?'#EEF2FF':'#F3F4F6', color: sel?'#4338CA':'#6B7280', border: sel?'2px solid #4338CA':'2px solid transparent', fontWeight: sel?600:400}}
                                                onClick={() => {
                                                    const cur = form.teamMembers||[];
                                                    setForm({...form, teamMembers: sel ? cur.filter(x=>x!==m.name) : [...cur, m.name]});
                                                }}>{m.name}</span>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">Start Date</label>
                                    <input type="date" className="form-input" value={form.startDate} onChange={e => setForm({...form, startDate: e.target.value})} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Target Date</label>
                                    <input type="date" className="form-input" value={form.targetDate} onChange={e => setForm({...form, targetDate: e.target.value})} />
                                </div>
                            </div>
                            <div style={{display:'flex', gap:'8px', marginTop:'8px'}}>
                                <button className="btn btn-primary" onClick={saveProject} disabled={saving}>{saving ? 'Saving...' : 'Save Project'}</button>
                                <button className="btn btn-secondary" onClick={() => setView(editingId && selectedProject ? 'detail' : 'list')}>Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // — Detail View —
            const renderDetailView = () => {
                if (!selectedProject) return null;
                const total = projectTasks.length;
                const done = projectTasks.filter(t => t.status === 'Completed').length;
                const overdueTasks = projectTasks.filter(t => t.status !== 'Completed' && t.targetDate && new Date(t.targetDate) < new Date()).length;
                const pct = total > 0 ? Math.round((done/total)*100) : 0;
                return (
                    <div>
                        <div className="page-header">
                            <button className="btn btn-secondary btn-sm" onClick={() => setView('list')}>← Back</button>
                            <div style={{display:'flex', gap:'8px'}}>
                                <button className="btn btn-secondary btn-sm" onClick={() => openForm(selectedProject)}>✏️ Edit</button>
                                <button className="btn btn-danger btn-sm" onClick={() => deleteProject(selectedProject)} disabled={saving}>Delete</button>
                            </div>
                        </div>

                        {/* Project Info Card */}
                        <div className="card" style={{marginBottom:'16px'}}>
                            <div className="card-body">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:'8px'}}>
                                    <div>
                                        <h2 style={{margin:0, fontSize:'20px'}}>{selectedProject.title}</h2>
                                        {selectedProject.goal && <div style={{fontSize:'13px', fontStyle:'italic', color:'var(--text-secondary)', marginTop:'4px'}}>{selectedProject.goal}</div>}
                                    </div>
                                    <div style={{display:'flex', gap:'4px', flexWrap:'wrap'}}>
                                        <span className="status-badge" style={{background: statusColor(selectedProject.status)+'22', color: statusColor(selectedProject.status)}}>{selectedProject.status}</span>
                                        <span className="status-badge" style={{background: priorityColor(selectedProject.priority)+'22', color: priorityColor(selectedProject.priority)}}>{selectedProject.priority}</span>
                                        <span className="code-badge">{selectedProject.category}</span>
                                    </div>
                                </div>
                                {selectedProject.description && <p style={{marginTop:'12px', fontSize:'14px', color:'var(--text-secondary)'}}>{selectedProject.description}</p>}
                                <div style={{display:'flex', gap:'16px', flexWrap:'wrap', fontSize:'13px', marginTop:'12px'}}>
                                    {selectedProject.responsiblePerson && <span><b>Owner:</b> {selectedProject.responsiblePerson}</span>}
                                    {selectedProject.teamMembers && selectedProject.teamMembers.length > 0 && <span><b>Team:</b> {selectedProject.teamMembers.join(', ')}</span>}
                                    {selectedProject.startDate && <span><b>Start:</b> {formatDate(selectedProject.startDate)}</span>}
                                    {selectedProject.targetDate && <span><b>Target:</b> {formatDate(selectedProject.targetDate)}</span>}
                                </div>
                                {/* Progress summary */}
                                <div style={{display:'flex', gap:'8px', marginTop:'12px', flexWrap:'wrap'}}>
                                    <span style={{padding:'4px 10px', borderRadius:'20px', fontSize:'12px', background:'#EEF2FF', color:'#4338CA', fontWeight:600}}>{total} tasks</span>
                                    <span style={{padding:'4px 10px', borderRadius:'20px', fontSize:'12px', background:'#D1FAE5', color:'#065F46', fontWeight:600}}>{done} done</span>
                                    {overdueTasks > 0 && <span style={{padding:'4px 10px', borderRadius:'20px', fontSize:'12px', background:'#FEE2E2', color:'#991B1B', fontWeight:600}}>{overdueTasks} overdue</span>}
                                </div>
                                {total > 0 && (
                                    <div className="progress-bar-wrap" style={{marginTop:'12px'}}>
                                        <div className="progress-bar-fill" style={{width: pct+'%'}} />
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Tasks Section */}
                        <div className="card" style={{marginBottom:'16px'}}>
                            <div className="card-header" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <span className="card-title">Tasks</span>
                                <button className="btn btn-primary btn-sm" onClick={() => { setShowTaskForm(!showTaskForm); setTaskForm({...emptyProjectTask, projectId: selectedProject.firebaseId}); }}>+ Add Task</button>
                            </div>
                            <div className="card-body">
                                {/* Inline Add Task Form */}
                                {showTaskForm && (
                                    <div style={{background:'var(--bg)', border:'1px solid var(--border)', borderRadius:'8px', padding:'16px', marginBottom:'16px'}}>
                                        <h4 style={{margin:'0 0 12px'}}>New Task</h4>
                                        <div className="form-group">
                                            <label className="form-label">Title *</label>
                                            <input className="form-input" value={taskForm.title} onChange={e => setTaskForm({...taskForm, title: e.target.value})} placeholder="Task title" />
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label className="form-label">Assigned To</label>
                                                <select className="form-select" value={taskForm.assignedTo} onChange={e => setTaskForm({...taskForm, assignedTo: e.target.value})}>
                                                    <option value="">-- Select --</option>
                                                    {members.map(m => <option key={m.id||m.name} value={m.name}>{m.name}</option>)}
                                                </select>
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Assigned By</label>
                                                <select className="form-select" value={taskForm.assignedBy} onChange={e => setTaskForm({...taskForm, assignedBy: e.target.value})}>
                                                    <option value="">-- Select --</option>
                                                    {members.map(m => <option key={m.id||m.name} value={m.name}>{m.name}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label className="form-label">Target Date</label>
                                                <input type="date" className="form-input" value={taskForm.targetDate} onChange={e => setTaskForm({...taskForm, targetDate: e.target.value})} />
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Priority</label>
                                                <select className="form-select" value={taskForm.priority} onChange={e => setTaskForm({...taskForm, priority: e.target.value})}>
                                                    {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div style={{display:'flex', gap:'8px'}}>
                                            <button className="btn btn-primary btn-sm" onClick={saveTask} disabled={saving}>{saving?'Saving...':'Save Task'}</button>
                                            <button className="btn btn-secondary btn-sm" onClick={() => setShowTaskForm(false)}>Cancel</button>
                                        </div>
                                    </div>
                                )}

                                {/* Task List */}
                                {projectTasks.length === 0 ? <div style={{textAlign:'center', padding:'24px', color:'var(--text-secondary)'}}>No tasks yet. Add one above!</div> :
                                    projectTasks.map(task => {
                                        const over = task.status !== 'Completed' && task.targetDate && new Date(task.targetDate) < new Date();
                                        const isExpanded = expandedTaskId === task.firebaseId;
                                        return (
                                            <div key={task.firebaseId}>
                                                <div className={`proj-task-row${over?' overdue':''}`} onClick={() => { setExpandedTaskId(isExpanded ? null : task.firebaseId); setNoteText(''); setShowExtendForm(null); }}>
                                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'4px'}}>
                                                        <div style={{fontWeight:600}}>{task.title}</div>
                                                        <div style={{display:'flex', gap:'4px', flexWrap:'wrap'}}>
                                                            <span className="status-badge" style={{background: taskStatusColor(task.status)+'22', color: taskStatusColor(task.status), fontSize:'11px'}}>{task.status}</span>
                                                            <span className="status-badge" style={{background: priorityColor(task.priority)+'22', color: priorityColor(task.priority), fontSize:'11px'}}>{task.priority}</span>
                                                        </div>
                                                    </div>
                                                    <div style={{fontSize:'12px', color:'var(--text-secondary)', marginTop:'4px', display:'flex', gap:'12px', flexWrap:'wrap'}}>
                                                        {task.assignedTo && <span>👤 {task.assignedTo}</span>}
                                                        {task.targetDate && <span style={{color: over?'#EF4444':'inherit'}}>📅 {formatDate(task.targetDate)}{over?' (overdue)':''}</span>}
                                                    </div>
                                                </div>
                                                {isExpanded && (
                                                    <div className="proj-task-expanded">
                                                        {/* Status Change */}
                                                        <div style={{marginBottom:'12px', display:'flex', gap:'8px', alignItems:'center', flexWrap:'wrap'}}>
                                                            <label style={{fontSize:'13px', fontWeight:600}}>Status:</label>
                                                            {TASK_STATUSES.map(s => (
                                                                <span key={s} onClick={() => updateTaskStatus(task, s)}
                                                                    style={{padding:'4px 10px', borderRadius:'20px', fontSize:'12px', cursor:'pointer', background: task.status===s ? taskStatusColor(s)+'22' : '#F3F4F6', color: task.status===s ? taskStatusColor(s) : '#6B7280', fontWeight: task.status===s ? 700 : 400, border: task.status===s ? `2px solid ${taskStatusColor(s)}` : '2px solid transparent'}}>
                                                                    {s}
                                                                </span>
                                                            ))}
                                                            <button className="btn btn-danger btn-sm" style={{marginLeft:'auto'}} onClick={() => deleteTask(task)}>Delete</button>
                                                        </div>

                                                        {/* Extensions history */}
                                                        {task.extensions && task.extensions.length > 0 && (
                                                            <div style={{marginBottom:'12px'}}>
                                                                <div style={{fontSize:'12px', fontWeight:700, color:'var(--text-secondary)', marginBottom:'4px'}}>Date Extensions</div>
                                                                {task.extensions.map((ex, i) => (
                                                                    <div key={i} style={{fontSize:'12px', color:'var(--text-secondary)', padding:'4px 0'}}>
                                                                        {formatDate(ex.from)} → {formatDate(ex.to)}{ex.reason ? ` · ${ex.reason}` : ''} <span style={{color:'#9CA3AF'}}>by {ex.by}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}

                                                        {/* Extend Date */}
                                                        {showExtendForm === task.firebaseId ? (
                                                            <div style={{background:'white', border:'1px solid var(--border)', borderRadius:'8px', padding:'12px', marginBottom:'12px'}}>
                                                                <div style={{fontSize:'13px', fontWeight:600, marginBottom:'8px'}}>Extend Target Date</div>
                                                                <div className="form-row">
                                                                    <div className="form-group">
                                                                        <label className="form-label">New Date</label>
                                                                        <input type="date" className="form-input" value={extendDate} onChange={e => setExtendDate(e.target.value)} />
                                                                    </div>
                                                                    <div className="form-group">
                                                                        <label className="form-label">Reason</label>
                                                                        <input className="form-input" value={extendReason} onChange={e => setExtendReason(e.target.value)} placeholder="Why extending?" />
                                                                    </div>
                                                                </div>
                                                                <div style={{display:'flex', gap:'8px'}}>
                                                                    <button className="btn btn-primary btn-sm" onClick={() => extendTaskDate(task)}>Save Extension</button>
                                                                    <button className="btn btn-secondary btn-sm" onClick={() => setShowExtendForm(null)}>Cancel</button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <button className="btn btn-secondary btn-sm" style={{marginBottom:'12px'}} onClick={() => { setShowExtendForm(task.firebaseId); setExtendDate(''); setExtendReason(''); }}>📅 Extend Date</button>
                                                        )}

                                                        {/* Notes / Updates Thread */}
                                                        <div style={{marginBottom:'8px', fontSize:'12px', fontWeight:700, color:'var(--text-secondary)'}}>Notes & Updates</div>
                                                        {(task.updates||[]).length === 0 ? <div style={{fontSize:'12px', color:'var(--text-secondary)', marginBottom:'8px'}}>No notes yet.</div> :
                                                            [...(task.updates||[])].reverse().map((u, i) => (
                                                                <div key={i} className="note-entry">
                                                                    <div>{u.text}</div>
                                                                    <div style={{color:'#9CA3AF', marginTop:'2px'}}>{u.by} · {u.at ? new Date(u.at).toLocaleString() : ''}</div>
                                                                </div>
                                                            ))
                                                        }
                                                        <div style={{display:'flex', gap:'8px', marginTop:'8px'}}>
                                                            <input className="form-input" style={{flex:1}} value={expandedTaskId === task.firebaseId ? noteText : ''} onChange={e => setNoteText(e.target.value)} placeholder="Add a note..." />
                                                            <button className="btn btn-primary btn-sm" onClick={() => addTaskNote(task)}>Add</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })
                                }
                            </div>
                        </div>

                        {/* Project Notes Section */}
                        <div className="card">
                            <div className="card-header">
                                <span className="card-title">Project Notes</span>
                            </div>
                            <div className="card-body">
                                <div style={{display:'flex', gap:'8px', marginBottom:'12px'}}>
                                    <input className="form-input" style={{flex:1}} value={projNoteText} onChange={e => setProjNoteText(e.target.value)} placeholder="Add a project-level note..." />
                                    <button className="btn btn-primary btn-sm" onClick={addProjectNote}>Add</button>
                                </div>
                                {(selectedProject.projectNotes||[]).length === 0 ? <div style={{fontSize:'13px', color:'var(--text-secondary)'}}>No notes yet.</div> :
                                    [...(selectedProject.projectNotes||[])].reverse().map((n, i) => (
                                        <div key={i} className="note-entry">
                                            <div>{n.text}</div>
                                            <div style={{color:'#9CA3AF', marginTop:'2px'}}>{n.by} · {n.at ? new Date(n.at).toLocaleString() : ''}</div>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    </div>
                );
            };

            if (view === 'form') return <div className="page">{renderFormView()}</div>;
            if (view === 'detail') return <div className="page">{renderDetailView()}</div>;
            return <div className="page">{renderListView()}</div>;
        };

        // ============ TEAM TASKS ============
        const TeamTasks = () => {
            const [members, setMembers] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [view, setView] = useState('board'); // 'board' | 'form' | 'detail'
            const [selectedTask, setSelectedTask] = useState(null);
            const [filter, setFilter] = useState('all');
            const [myName, setMyName] = useState(() => localStorage.getItem('mvs_my_name') || '');
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [membersOpen, setMembersOpen] = useState(false);
            const [newMemberName, setNewMemberName] = useState('');
            const [newMemberRole, setNewMemberRole] = useState('');

            // Form state
            const [form, setForm] = useState({
                title: '', description: '', assignedTo: '', assignedBy: '',
                targetDate: '', priority: 'Medium', status: 'Open'
            });

            // Detail view state
            const [noteText, setNoteText] = useState('');
            const [lessonText, setLessonText] = useState('');
            const [outcomeText, setOutcomeText] = useState('');
            const [detailStatus, setDetailStatus] = useState('');

            const today = new Date(); today.setHours(0,0,0,0);

            useEffect(() => {
                if (!myName) {
                    const n = prompt('Your name (used for task attribution):');
                    if (n && n.trim()) {
                        localStorage.setItem('mvs_my_name', n.trim());
                        setMyName(n.trim());
                    }
                }
                loadData();
            }, []);

            const loadData = async () => {
                setLoading(true);
                const cachedMembers = localStorage.getItem('mvs_team_members');
                if (cachedMembers) setMembers(JSON.parse(cachedMembers));
                const [m, t] = await Promise.all([FirebaseTasks.getMembers(), FirebaseTasks.getTasks()]);
                setMembers(m);
                localStorage.setItem('mvs_team_members', JSON.stringify(m));
                setTasks(t);
                setLoading(false);
            };

            const isOverdue = (task) => {
                if (!task.targetDate || task.status === 'Done') return false;
                const due = new Date(task.targetDate); due.setHours(0,0,0,0);
                return due < today;
            };

            const isThisWeek = (task) => {
                const start = new Date(today); start.setDate(today.getDate() - today.getDay());
                const end = new Date(start); end.setDate(start.getDate() + 6);
                const checkDate = (d) => { if (!d) return false; const dt = new Date(d); dt.setHours(0,0,0,0); return dt >= start && dt <= end; };
                const updatedThisWeek = (task.updates || []).some(u => checkDate(u.at));
                const completedThisWeek = task.status === 'Done' && checkDate(task.targetDate);
                return checkDate(task.targetDate) || updatedThisWeek || completedThisWeek;
            };

            const filteredTasks = useMemo(() => {
                let list = [...tasks];
                if (filter === 'my') list = list.filter(t => t.assignedTo === myName);
                if (filter === 'overdue') list = list.filter(t => isOverdue(t));
                if (filter === 'week') list = list.filter(t => isThisWeek(t));
                return list;
            }, [tasks, filter, myName]);

            const getPriorityClass = (p) => {
                if (p === 'Urgent') return 'priority-urgent';
                if (p === 'High') return 'priority-high';
                if (p === 'Medium') return 'priority-medium';
                return 'priority-low';
            };

            const getStatusClass = (s) => {
                if (s === 'Done') return 'status-done';
                if (s === 'In Progress') return 'status-inprogress';
                if (s === 'Blocked') return 'status-blocked';
                return 'status-open';
            };

            const fmtShortDate = (d) => {
                if (!d) return '—';
                try {
                    const dt = new Date(d);
                    return dt.getDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()];
                } catch { return d; }
            };

            const weekGroups = useMemo(() => {
                if (filter !== 'week') return null;
