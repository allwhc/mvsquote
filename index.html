    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ============ CONFIGURATION ============
        const CONFIG = {
            API_URL: 'https://script.google.com/macros/s/AKfycbwELzpLlHpISfD85tW3aKFGqGF15iAvgYIHU2a8SbVMW9GACHRLF_EO_-lvWGbepMUUDg/exec',

                name: 'MV SOLUTIONS',
                tagline: 'Parent Company of Senseflow.in & ThermoAmp.com',
                address: 'MVS Lab, Shri Bungalow Road No 37, Gorai 2, Borivali',
                city: 'Mumbai, Maharashtra 400091',
                email: 'solutionsmv11@gmail.com',
                phone: '+91 8097412355',
                gst: '27ALDPJ5310J1ZA'
            },
            GST_RATE: 18,
            DEFAULT_SELLING_MARGIN: 100, // 100% profit = 2x making cost
            DEFAULT_MRP_MARGIN: 150,     // 150% profit = 2.5x making cost
            ITEM_CATEGORIES: ['Electronics', 'Mechanical', 'Sensors', 'Cables & Wires', 'Enclosure', 'PCB', 'Packaging', 'Hardware', 'Other'],
            // Password hash (SHA-256 of actual password) - Change this hash by running: 
            // crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_PASSWORD')).then(h => console.log(Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('')))
            ADMIN_HASH: 'ef92b778bafe771e89245b89ecbc08a44a4e166c06659911881f383d4473e94f' // Default: "password123"
        };

        // ============ NO HARDCODED DATA - Loads from Google Sheets ============
        const INITIAL_ITEMS = [];
        const INITIAL_PRODUCTS = [];
        const INITIAL_BOM = [];
        const INITIAL_SUB_PRODUCTS = [];

        // ============ HELPER FUNCTIONS ============
        const formatCurrency = (num) => '₹' + Number(num || 0).toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        
        // PDF-safe currency format (jsPDF doesn't support ₹ symbol)
        const formatCurrencyPDF = (num) => 'Rs. ' + Number(num || 0).toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

        // ============ PASSWORD UTILITIES ============
        // Hash password using SHA-256 (async)
        const hashPassword = async (password) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        // Admin authentication
        const isAdminAuthenticated = () => {
            return sessionStorage.getItem('adminAuth') === 'true';
        };

        // Set admin authentication
        const setAdminAuth = (value) => {
            if (value) {
                sessionStorage.setItem('adminAuth', 'true');
            } else {
                sessionStorage.removeItem('adminAuth');
            }
        };

        // Check for circular dependency
        const hasCircularDependency = (productSku, subProductSku, subProducts, visited = new Set()) => {
            if (productSku === subProductSku) return true;
            if (visited.has(subProductSku)) return false;
            
            visited.add(subProductSku);
            
            // Get sub-products of the sub-product
            const childSubProducts = subProducts.filter(sp => sp.productSku === subProductSku);
            for (const child of childSubProducts) {
                if (hasCircularDependency(productSku, child.subProductSku, subProducts, visited)) {
                    return true;
                }
            }
            
            return false;
        };

        // Get all dependencies for a product (for circular check)
        const getAllDependencies = (productSku, subProducts, deps = new Set()) => {
            const directSubs = subProducts.filter(sp => sp.productSku === productSku);
            for (const sub of directSubs) {
                if (!deps.has(sub.subProductSku)) {
                    deps.add(sub.subProductSku);
                    getAllDependencies(sub.subProductSku, subProducts, deps);
                }
            }
            return deps;
        };
        
        // Calculate making cost using relational data (with circular dependency protection)
        const calculateMakingCost = (product, items, allProducts, bom, subProducts, visited = new Set()) => {
            // Circular dependency protection
            if (visited.has(product.sku)) {
                console.warn(`Circular dependency detected for ${product.sku}`);
                return 0;
            }
            visited.add(product.sku);
            
            let total = 0;
            
            // Get BOM entries for this product (components)
            const productBom = bom.filter(b => b.productSku === product.sku);
            productBom.forEach(bomItem => {
                const item = items.find(i => i.code === bomItem.componentCode);
                if (item) {
                    total += item.price * bomItem.qty;
                }
            });
            
            // Get sub-products for this product (with qty support)
            const productSubProducts = subProducts.filter(sp => sp.productSku === product.sku);
            productSubProducts.forEach(sp => {
                const subProduct = allProducts.find(p => p.sku === sp.subProductSku);
                if (subProduct) {
                    const subCost = calculateMakingCost(subProduct, items, allProducts, bom, subProducts, new Set(visited));
                    total += subCost * (sp.qty || 1);
                }
            });
            
            return total;
        };

        // Get BOM as array for a product (for display in UI)
        const getProductBom = (productSku, bom) => {
            return bom.filter(b => b.productSku === productSku).map(b => ({
                code: b.componentCode,
                qty: b.qty
            }));
        };

        // Get sub-products for a product (with qty)
        const getProductSubProducts = (productSku, subProducts) => {
            return subProducts.filter(sp => sp.productSku === productSku).map(sp => ({
                sku: sp.subProductSku,
                qty: sp.qty || 1
            }));
        };

        const generateDocNumber = (prefix, count) => {

        // ============ MODAL COMPONENT ============

        // ============ PASSWORD GATE COMPONENT ============
        const PasswordGate = ({ children, title }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(isAdminAuthenticated());
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                setError('');
                
                try {
                    const inputHash = await hashPassword(password);
                    if (inputHash === CONFIG.ADMIN_HASH) {
                        setAdminAuth(true);
                        setIsAuthenticated(true);
                    } else {
                        setError('Incorrect password');
                        setPassword('');
                    }
                } catch (err) {
                    setError('Authentication error');
                }
                setIsLoading(false);
            };

            if (isAuthenticated) {
                return children;
            }

            return (
                <div style={{
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    minHeight: '60vh',
                    padding: '40px'
                }}>
                    <div style={{
                        background: 'white',
                        borderRadius: '16px',
                        padding: '40px',
                        boxShadow: 'var(--shadow-lg)',
                        maxWidth: '400px',
                        width: '100%',
                        textAlign: 'center'
                    }}>
                        <div style={{
                            width: '60px',
                            height: '60px',
                            background: 'linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%)',

                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            margin: '0 auto 20px',
                            color: 'white'
                        }}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="28" height="28">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </div>
                        
                        <h2 style={{ marginBottom: '8px', color: 'var(--text)' }}>Admin Access Required</h2>
                        <p style={{ color: 'var(--text-muted)', marginBottom: '24px', fontSize: '14px' }}>
                            Enter password to access {title}
                        </p>
                        
                        <form onSubmit={handleSubmit}>
                            <input
                                type="password"
                                className="form-input"
                                placeholder="Enter admin password"
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                style={{ marginBottom: '16px', textAlign: 'center' }}
                                autoFocus
                            />
                            
                            {error && (
                                <div style={{
                                    background: '#FEE2E2',

                            <button

                                className="btn btn-primary"

                            >
                                {isLoading ? 'Verifying...' : 'Unlock'}
                            </button>
                        </form>
                        
                        <p style={{ marginTop: '20px', fontSize: '12px', color: 'var(--text-muted)' }}>
                            🔒 This section contains sensitive pricing data

                    </div>
                </div>
            );
        };

        // ============ SEARCHABLE SELECT COMPONENT ============
        const SearchableSelect = ({ options, value, onChange, placeholder, renderOption, disabled = false }) => {
            const [search, setSearch] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const wrapperRef = useRef(null);

            // Close dropdown when clicking outside
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const filteredOptions = options.filter(opt => {
                const searchLower = search.toLowerCase();
                const label = renderOption ? renderOption(opt) : opt.label || opt.name || opt.code || opt.sku || '';
                return label.toLowerCase().includes(searchLower);
            });

            const selectedOption = options.find(opt => {
                const optValue = opt.value || opt.code || opt.sku;
                return optValue === value;
            });

            const getLabel = (opt) => {
                if (renderOption) return renderOption(opt);
                return opt.label || opt.name || opt.code || opt.sku || '';
            };

            return (
                <div ref={wrapperRef} style={{ position: 'relative', flex: 1 }}>
                    <div 
                        className="form-input"
                        onClick={() => !disabled && setIsOpen(!isOpen)}
                        style={{ 
                            cursor: disabled ? 'not-allowed' : 'pointer',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            opacity: disabled ? 0.6 : 1
                        }}
                    >
                        <span style={{ color: selectedOption ? 'var(--text)' : 'var(--text-muted)' }}>
                            {selectedOption ? getLabel(selectedOption) : placeholder}
                        </span>
                        <span style={{ fontSize: '10px' }}>▼</span>
                    </div>
                    
                    {isOpen && (
                        <div style={{
                            position: 'absolute',
                            top: '100%',
                            left: 0,
                            right: 0,
                            background: 'white',
                            border: '1px solid var(--border)',
                            borderRadius: '8px',
                            boxShadow: 'var(--shadow-lg)',
                            zIndex: 1000,
                            maxHeight: '250px',
                            overflow: 'hidden'
                        }}>
                            <div style={{ padding: '8px', borderBottom: '1px solid var(--border)' }}>
                                <input
                                    type="text"
                                    className="form-input"
                                    placeholder="Search..."
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    onClick={e => e.stopPropagation()}
                                    autoFocus
                                    style={{ marginBottom: 0 }}
                                />
                            </div>
                            <div style={{ maxHeight: '200px', overflowY: 'auto' }}>
                                {filteredOptions.length === 0 ? (
                                    <div style={{ padding: '12px', textAlign: 'center', color: 'var(--text-muted)' }}>
                                        No results found
                                    </div>
                                ) : (
                                    filteredOptions.map((opt, idx) => {
                                        const optValue = opt.value || opt.code || opt.sku;
                                        return (
                                            <div
                                                key={optValue || idx}
                                                onClick={() => {
                                                    onChange(optValue);
                                                    setIsOpen(false);
                                                    setSearch('');
                                                }}
                                                style={{
                                                    padding: '10px 12px',
                                                    cursor: 'pointer',
                                                    background: optValue === value ? 'var(--primary-lighter)' : 'white',
                                                    borderBottom: '1px solid var(--border)',
                                                    fontSize: '13px',
                                                    transition: 'background 0.15s'
                                                }}
                                                onMouseEnter={e => e.target.style.background = 'var(--bg)'}
                                                onMouseLeave={e => e.target.style.background = optValue === value ? 'var(--primary-lighter)' : 'white'}
                                            >
                                                {getLabel(opt)}
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============ DASHBOARD ============
        const Dashboard = ({ items, products, quotations, bom, subProducts }) => {
            const totalProducts = products.length;
            const [searchQuery, setSearchQuery] = useState('');

            // Sort products: Kits category first, then alphabetically by category
            const sortedProducts = [...products].sort((a, b) => {
                // Kits first
                if (a.category === 'Kits' && b.category !== 'Kits') return -1;
                if (b.category === 'Kits' && a.category !== 'Kits') return 1;
                // Then by category
                if (a.category !== b.category) return a.category.localeCompare(b.category);
                // Then by name
                return a.name.localeCompare(b.name);
            });

            // Filter by search
            const filteredProducts = sortedProducts.filter(p =>
                p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.sku.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.category.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
                <div>
                    <div className="page-header">
                        <div>
                            <h1 className="page-title">Product Catalog</h1>
                            <p className="page-subtitle">All products with selling prices</p>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <div className="search-box">
                                <Icons.Search />
                                <input
                                    type="text"
                                    placeholder="Search products..."
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <span style={{ color: 'var(--text-muted)', fontSize: '14px' }}>{filteredProducts.length} products</span>
                        </div>
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>SKU</th>
                                        <th>Product Name</th>
                                        <th>Category</th>
                                        <th style={{ textAlign: 'right' }}>Selling Price</th>
                                        <th style={{ textAlign: 'right' }}>MRP</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredProducts.map(p => {
                                        const makingCost = calculateMakingCost(p, items, products, bom, subProducts);
                                        const sellingPrice = getSellingPrice(p, makingCost);
                                        const mrp = getMRP(p, makingCost);
                                        return (
                                            <tr key={p.sku}>
                                                <td><span className="code-badge">{p.sku}</span></td>
                                                <td style={{ fontWeight: '500' }}>{p.name}</td>
                                                <td><span className={`category-badge ${getCategoryClass(p.category)}`}>{p.category}</span></td>
                                                <td style={{ textAlign: 'right', fontWeight: '600', color: 'var(--success)' }}>{formatCurrency(sellingPrice)}</td>
                                                <td style={{ textAlign: 'right', color: 'var(--text-secondary)' }}>{formatCurrency(mrp)}</td>

        };

        // ============ ITEMS MASTER ============
        const ItemsMaster = ({ items, setItems }) => {
            const [search, setSearch] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [formData, setFormData] = useState({
                code: '',
                name: '',
                price: '',
                category: 'Electronics',
                vendors: [{ name: '', phone: '', email: '' }]
            });

            const filteredItems = items.filter(item => {
                const matchesSearch = 
                    item.code.toLowerCase().includes(search.toLowerCase()) ||
                    item.name.toLowerCase().includes(search.toLowerCase()) ||
                    (item.vendor || '').toLowerCase().includes(search.toLowerCase());
                const matchesCategory = !categoryFilter || item.category === categoryFilter;
                return matchesSearch && matchesCategory;
            });

            const resetForm = () => {
                setFormData({
                    code: '',
                    name: '',
                    price: '',
                    category: 'Electronics',
                    vendors: [{ name: '', phone: '', email: '' }]
                });
                setEditItem(null);
            };

            // Generate unique code based on prefix
            const generateCode = (prefix) => {
                // Find all codes with this prefix
                const regex = new RegExp(`^${prefix}(\\d+)$`, 'i');
                const numbers = items
                    .map(item => {
                        const match = item.code.match(regex);
                        return match ? parseInt(match[1], 10) : 0;
                    })
                    .filter(n => n > 0);

                const nextNum = numbers.length > 0 ? Math.max(...numbers) + 1 : 1;
                return prefix.toUpperCase() + nextNum;
            };

            // Get unique prefixes from existing items
            const getExistingPrefixes = () => {
                const prefixes = new Set();
                items.forEach(item => {
                    const match = item.code.match(/^([A-Za-z]+)/);
                    if (match) prefixes.add(match[1].toUpperCase());
                });
                return Array.from(prefixes).sort();
            };

            // Real-time validation helpers
            const isPhoneValid = (phone) => {
                if (!phone || phone.trim() === '') return true; // empty is ok
                var clean = phone.replace(/[\s\-\(\)]/g, '');
                return /^(\+91)?\d{10}$/.test(clean);
            };

            const isEmailValid = (email) => {
                if (!email || email.trim() === '') return true; // empty is ok
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            };

            // Check if entire form has valid vendor contacts
            const hasVendorErrors = formData.vendors.some(function(v) {
                return (v.phone && !isPhoneValid(v.phone)) || (v.email && !isEmailValid(v.email));
            });

            const handleSubmit = () => {
                if (!formData.code || !formData.name || !formData.price) {
                    alert('Please fill all required fields: Code, Name, and Price');
                    return;
                }

                // Check for duplicate code (only when adding new item)
                if (!editItem && items.some(item => item.code.toUpperCase() === formData.code.toUpperCase())) {
                    alert(`Item code "${formData.code}" already exists! Delete the existing item first or use a different code.`);
                    return;
                }

                // Block submit if vendor contacts are invalid
                if (hasVendorErrors) {
                    alert('Please fix the invalid phone numbers or email addresses (highlighted in red) before saving.');
                    return;
                }

                // Filter out empty vendor rows
                const activeVendors = formData.vendors.filter(v => v.name || v.phone || v.email);

                // Build ;; separated strings for Google Sheet storage
                const vendorStr = activeVendors.map(v => v.name).join(' ;; ');
                const vendorAddressStr = activeVendors.map(v => `${v.phone}|${v.email}`).join(' ;; ');

                const itemData = {
                    code: formData.code,
                    name: formData.name,
                    price: Number(formData.price),
                    category: formData.category,
                    vendor: vendorStr,
                    vendorAddress: vendorAddressStr,
                    vendors: activeVendors
                };

                if (editItem) {
                    setItems(items.map(item => item.code === editItem.code ? itemData : item));
                } else {
                    setItems([...items, itemData]);
                }
                setShowModal(false);
                resetForm();
            };

            // Parse vendor + vendorAddress into vendors array
            const parseVendors = (vendor, vendorAddress, vendorsArr) => {
                // If already has vendors array, use it
                if (vendorsArr && vendorsArr.length > 0) return vendorsArr;

                if (!vendor) return [{ name: '', phone: '', email: '' }];

                const names = vendor.split(' ;; ').map(s => s.trim());
                const contacts = (vendorAddress || '').split(' ;; ').map(s => s.trim());

                return names.map((name, i) => {
                    const contact = contacts[i] || '';
                    if (contact.includes('|')) {
                        const parts = contact.split('|');
                        return { name, phone: parts[0] || '', email: parts[1] || '' };
                    }
                    if (contact.includes('@')) return { name, phone: '', email: contact };
                    // Legacy data - put old address into name
                    return { name: contact ? `${name} (${contact})` : name, phone: '', email: '' };
                });
            };

            const handleEdit = (item) => {
                setEditItem(item);
                const vendors = parseVendors(item.vendor, item.vendorAddress, item.vendors);
                setFormData({
                    ...item,
                    price: item.price.toString(),
                    category: item.category || 'Electronics',
                    vendors: vendors.length > 0 ? vendors : [{ name: '', phone: '', email: '' }]
                });
                setShowModal(true);
            };

            const handleDelete = (code) => {
                if (confirm('Delete this item? Products using it will be affected.')) {
                    setItems(items.filter(item => item.code !== code));
                }
            };

            const getItemCategoryClass = (cat) => {
                const map = {
                    'Electronics': 'blue',
                    'Mechanical': 'orange',
                    'Sensors': 'green',
                    'Cables & Wires': 'purple',
                    'Enclosure': 'teal',
                    'PCB': 'red',
                    'Packaging': 'yellow',
                    'Hardware': 'gray',
                    'Other': 'default'
                };
                return map[cat] || 'default';
            };

            return (
                <PasswordGate title="Items Master">
                    <div>
                        <div className="page-header">
                            <div>
                                <h1 className="page-title">Items Master</h1>
                                <p className="page-subtitle">Manage components with vendor details - changes auto-update product costs</p>
                            </div>
                            <button className="btn btn-primary" onClick={() => { resetForm(); setShowModal(true); }}>
                                <Icons.Plus /> Add Item
                            </button>
                        </div>

                        <div className="card">
                            <div className="card-header" style={{ flexWrap: 'wrap', gap: '12px' }}>
                                <div className="search-box">
                                    <Icons.Search />
                                    <input type="text" placeholder="Search items, vendors..." value={search} onChange={e => setSearch(e.target.value)} />
                                </div>
                                <select 
                                    className="form-select" 
                                    value={categoryFilter} 
                                    onChange={e => setCategoryFilter(e.target.value)}
                                    style={{ width: 'auto', minWidth: '150px' }}
                                >

        // ============ PROFIT CALCULATOR ============
        const ProfitCalculator = ({ sellingPrice, makingCost, compact = false, productRates = null, onRatesChange = null }) => {
            // Default rates: D2C 3%, Amazon 12%, Flipkart 11%, Dealer ₹500
            const defaultRates = { d2c: 3, amazon: 12, flipkart: 11, dealer: 500 };
            const [fees, setFees] = useState(productRates || defaultRates);
            const [showFeeEditor, setShowFeeEditor] = useState(false);

            // Update fees when productRates prop changes
            React.useEffect(() => {
                if (productRates) {
                    setFees(productRates);
                }
            }, [productRates]);

            const handleFeeChange = (key, value) => {
                const newFees = { ...fees, [key]: Number(value) };
                setFees(newFees);
                if (onRatesChange) {
                    onRatesChange(newFees);
                }
            };

            const gstRate = CONFIG.GST_RATE || 18;
            const price = Number(sellingPrice) || 0;
            const cost = Number(makingCost) || 0;

            if (price <= 0) {
                return (
                    <div style={{
                        padding: '16px',
                        background: 'var(--bg-light)',
                        borderRadius: '8px',
                        textAlign: 'center',
                        color: 'var(--text-muted)',
                        fontSize: '13px'
                    }}>
                        Enter a selling price to see profit breakdown across platforms
                    </div>
                );
            }

            const calculatePlatform = (platformFee, isFixed = false) => {
                const gstAmount = Math.round(price - (price / (1 + gstRate / 100)));
                const afterGst = price - gstAmount;
                const feeAmount = isFixed ? platformFee : Math.round(afterGst * (platformFee / 100));
                const youReceive = afterGst - feeAmount;
                const profit = youReceive - cost;
                const margin = cost > 0 ? Math.round((profit / cost) * 100) : 0;

                return { gstAmount, afterGst, feeAmount, youReceive, profit, margin };
            };

            const platforms = [
                { name: 'D2C', key: 'd2c', ...calculatePlatform(fees.d2c), feePercent: fees.d2c },
                { name: 'Amazon', key: 'amazon', ...calculatePlatform(fees.amazon), feePercent: fees.amazon },
                { name: 'Flipkart', key: 'flipkart', ...calculatePlatform(fees.flipkart), feePercent: fees.flipkart },
                { name: 'Dealer', key: 'dealer', ...calculatePlatform(fees.dealer, true), feeFixed: fees.dealer }
            ];

            const cellStyle = { padding: compact ? '6px 8px' : '10px 12px', textAlign: 'right', fontSize: compact ? '12px' : '13px' };
            const headerStyle = { ...cellStyle, background: 'var(--primary)', color: 'white', fontWeight: '600' };
            const labelStyle = { ...cellStyle, textAlign: 'left', fontWeight: '500', background: 'var(--bg-light)' };

            return (
                <div style={{
                    border: '1px solid var(--border-color)',
                    borderRadius: '8px',
                    overflow: 'hidden',
                    marginTop: compact ? '12px' : '0'
                }}>
                    <div style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        padding: '10px 12px',
                        background: 'var(--primary)',
                        color: 'white'
                    }}>
                        <span style={{ fontWeight: '600', fontSize: '14px' }}>Profit Calculator</span>
                        <button
                            onClick={() => setShowFeeEditor(!showFeeEditor)}
                            style={{
                                background: 'rgba(255,255,255,0.2)',
                                border: 'none',
                                padding: '4px 10px',
                                borderRadius: '4px',
                                color: 'white',
                                cursor: 'pointer',
                                fontSize: '12px'
                            }}
                        >
                            {showFeeEditor ? 'Hide' : 'Edit'} Fees
                        </button>
                    </div>

                    {showFeeEditor && (
                        <div style={{
                            padding: '12px',
                            background: '#FEF3C7',
                            display: 'flex',
                            gap: '12px',
                            flexWrap: 'wrap',
                            borderBottom: '1px solid var(--border-color)'
                        }}>
                            <div style={{ fontSize: '12px' }}>
                                <label style={{ fontWeight: '500' }}>D2C %</label>
                                <input type="number" value={fees.d2c} onChange={e => handleFeeChange('d2c', e.target.value)}
                                    style={{ width: '60px', marginLeft: '6px', padding: '4px' }} />
                            </div>
                            <div style={{ fontSize: '12px' }}>
                                <label style={{ fontWeight: '500' }}>Amazon %</label>
                                <input type="number" value={fees.amazon} onChange={e => handleFeeChange('amazon', e.target.value)}
                                    style={{ width: '60px', marginLeft: '6px', padding: '4px' }} />
                            </div>
                            <div style={{ fontSize: '12px' }}>
                                <label style={{ fontWeight: '500' }}>Flipkart %</label>
                                <input type="number" value={fees.flipkart} onChange={e => handleFeeChange('flipkart', e.target.value)}
                                    style={{ width: '60px', marginLeft: '6px', padding: '4px' }} />
                            </div>
                            <div style={{ fontSize: '12px' }}>
                                <label style={{ fontWeight: '500' }}>Dealer ₹</label>
                                <input type="number" value={fees.dealer} onChange={e => handleFeeChange('dealer', e.target.value)}
                                    style={{ width: '70px', marginLeft: '6px', padding: '4px' }} />
                            </div>
                        </div>
                    )}

                    <div style={{ overflowX: 'auto' }}>
                        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                            <thead>
                                <tr>
                                    <th style={{ ...headerStyle, textAlign: 'left' }}>Item</th>
                                    {platforms.map(p => <th key={p.key} style={headerStyle}>{p.name}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style={labelStyle}>Selling Price</td>
                                    {platforms.map(p => <td key={p.key} style={cellStyle}>{formatCurrency(price)}</td>)}
                                </tr>
                                <tr style={{ background: '#FEE2E2' }}>
                                    <td style={labelStyle}>GST {gstRate}%</td>
                                    {platforms.map(p => <td key={p.key} style={{ ...cellStyle, color: '#DC2626' }}>-{formatCurrency(p.gstAmount)}</td>)}
                                </tr>
                                <tr>
                                    <td style={labelStyle}>After GST</td>
                                    {platforms.map(p => <td key={p.key} style={cellStyle}>{formatCurrency(p.afterGst)}</td>)}
                                </tr>
                                <tr style={{ background: '#FEF3C7' }}>
                                    <td style={labelStyle}>Platform Fee</td>
                                    {platforms.map(p => (
                                        <td key={p.key} style={{ ...cellStyle, color: '#D97706' }}>
                                            -{formatCurrency(p.feeAmount)} {p.feePercent ? `(${p.feePercent}%)` : '(fixed)'}
                                        </td>
                                    ))}
                                </tr>
                                <tr style={{ background: '#DBEAFE' }}>
                                    <td style={{ ...labelStyle, fontWeight: '600' }}>You Receive</td>
                                    {platforms.map(p => <td key={p.key} style={{ ...cellStyle, fontWeight: '600', color: '#1D4ED8' }}>{formatCurrency(p.youReceive)}</td>)}
                                </tr>
                                <tr style={{ background: '#FEE2E2' }}>
                                    <td style={labelStyle}>Making Cost</td>
                                    {platforms.map(p => <td key={p.key} style={{ ...cellStyle, color: '#DC2626' }}>-{formatCurrency(cost)}</td>)}
                                </tr>
                                <tr style={{ background: cost > 0 ? '#D1FAE5' : 'var(--bg-light)' }}>
                                    <td style={{ ...labelStyle, fontWeight: '700' }}>PROFIT</td>
                                    {platforms.map(p => (
                                        <td key={p.key} style={{
                                            ...cellStyle,
                                            fontWeight: '700',
                                            color: p.profit >= 0 ? '#059669' : '#DC2626',
                                            fontSize: compact ? '13px' : '14px'
                                        }}>
                                            {p.profit >= 0 ? '' : '-'}{formatCurrency(Math.abs(p.profit))}
                                        </td>
                                    ))}
                                </tr>
                                <tr style={{ background: 'var(--bg-light)' }}>
                                    <td style={{ ...labelStyle, fontWeight: '600' }}>Margin %</td>
                                    {platforms.map(p => (
                                        <td key={p.key} style={{
                                            ...cellStyle,
                                            fontWeight: '600',
                                            color: p.margin >= 30 ? '#059669' : p.margin >= 20 ? '#D97706' : '#DC2626'
                                        }}>
                                            {p.margin}%
                                        </td>
                                    ))}
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div style={{
                        padding: '8px 12px',
                        background: '#F0F9FF',
                        fontSize: '11px',
                        color: '#0369A1',
                        borderTop: '1px solid var(--border-color)'
                    }}>
                        💡 Selling price should be inclusive of GST. Platform fees are deducted from post-GST amount.
                    </div>
                </div>
            );
        };

        // ============ PRODUCTS PAGE ============
        const ProductsPage = ({ products, setProducts, items, bom, setBom, subProducts, setSubProducts }) => {
            const [search, setSearch] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [editProduct, setEditProduct] = useState(null);
            const [formData, setFormData] = useState({
                sku: '', name: '', category: 'SenseFlow',
                formBom: [], // Components from Items
                formSubProducts: [], // Sub-products from Products
                sellingPrice: '',
                mrp: '',
                d2cRate: 3,
                amazonRate: 12,
                flipkartRate: 11,
                dealerRate: 500
            });
            const [selectedItem, setSelectedItem] = useState('');
            const [itemQty, setItemQty] = useState(1);
            const [selectedSubProduct, setSelectedSubProduct] = useState('');
            const [subProductQty, setSubProductQty] = useState(1);
            const [circularError, setCircularError] = useState('');
            const [expandedProduct, setExpandedProduct] = useState(null);

            const categories = ['SenseFlow', 'ThermoAmp', 'Controllers', 'Sensors', 'Accessories'];

            const filteredProducts = products.filter(p =>
                p.sku.toLowerCase().includes(search.toLowerCase()) ||
                p.name.toLowerCase().includes(search.toLowerCase()) ||
                p.category.toLowerCase().includes(search.toLowerCase())
            );

            // Calculate form making cost including sub-products
            const calculateFormMakingCost = () => {
                // Cost from components
                let total = formData.formBom.reduce((sum, bomItem) => {
                    const item = items.find(i => i.code === bomItem.code);
                    return sum + (item ? item.price * bomItem.qty : 0);
                }, 0);

                // Cost from sub-products
                formData.formSubProducts.forEach(sp => {
                    const subProduct = products.find(p => p.sku === sp.sku);
                    if (subProduct) {
                        const subCost = calculateMakingCost(subProduct, items, products, bom, subProducts);
                        total += subCost * sp.qty;
                    }
                });

                return total;
            };

            const formMakingCost = calculateFormMakingCost();
            const defaultSellingPrice = Math.round(formMakingCost * (1 + CONFIG.DEFAULT_SELLING_MARGIN / 100));
            const defaultMRP = Math.round(formMakingCost * (1 + CONFIG.DEFAULT_MRP_MARGIN / 100));

            // Add component to BOM
            const addBomItem = () => {
                if (!selectedItem || itemQty < 1) return;
                const existing = formData.formBom.find(b => b.code === selectedItem);
                if (existing) {
                    setFormData({
                        ...formData,
                        formBom: formData.formBom.map(b => b.code === selectedItem ? { ...b, qty: b.qty + itemQty } : b)
                    });
                } else {
                    setFormData({
                        ...formData,
                        formBom: [...formData.formBom, { code: selectedItem, qty: itemQty }]
                    });
                }
                setSelectedItem('');
                setItemQty(1);
            };

            // Add sub-product with circular dependency check
            const addSubProduct = () => {
                if (!selectedSubProduct || subProductQty < 1) return;
                setCircularError('');

                // Can't add self
                if (selectedSubProduct === formData.sku) {
                    setCircularError('Cannot add a product to itself!');
                    return;
                }

                // Check for circular dependency
                // Build temporary subProducts list to check
                const tempSubProducts = [
                    ...subProducts.filter(sp => sp.productSku !== formData.sku),
                    ...formData.formSubProducts.map(sp => ({ productSku: formData.sku, subProductSku: sp.sku, qty: sp.qty })),
                    { productSku: formData.sku, subProductSku: selectedSubProduct, qty: subProductQty }
                ];

                if (hasCircularDependency(formData.sku, selectedSubProduct, tempSubProducts)) {
                    setCircularError(`Circular dependency detected! ${selectedSubProduct} already contains ${formData.sku} directly or indirectly.`);
                    return;
                }

                const existing = formData.formSubProducts.find(sp => sp.sku === selectedSubProduct);
                if (existing) {
                    setFormData({
                        ...formData,
                        formSubProducts: formData.formSubProducts.map(sp => 
                            sp.sku === selectedSubProduct ? { ...sp, qty: sp.qty + subProductQty } : sp
                        )
                    });
                } else {
                    setFormData({
                        ...formData,
                        formSubProducts: [...formData.formSubProducts, { sku: selectedSubProduct, qty: subProductQty }]
                    });
                }
                setSelectedSubProduct('');
                setSubProductQty(1);
            };

            const removeBomItem = (code) => {
                setFormData({
                    ...formData,
                    formBom: formData.formBom.filter(b => b.code !== code)
                });
            };

            const removeSubProduct = (sku) => {
                setFormData({
                    ...formData,
                    formSubProducts: formData.formSubProducts.filter(sp => sp.sku !== sku)
                });
            };

            const handleSubmit = () => {
                if (!formData.sku || !formData.name || (formData.formBom.length === 0 && formData.formSubProducts.length === 0)) {
                    alert('Please fill SKU, Name and add at least one component or sub-product');
                    return;
                }

                // Check for duplicate SKU (only when adding new product)
                if (!editProduct && products.some(p => p.sku.toUpperCase() === formData.sku.toUpperCase())) {
                    alert(`Product SKU "${formData.sku}" already exists! Delete the existing product first or use a different SKU.`);
                    return;
                }

                const productData = {
                    sku: formData.sku,
                    name: formData.name,
                    category: formData.category,
                    sellingPrice: formData.sellingPrice ? Number(formData.sellingPrice) : defaultSellingPrice,
                    mrp: formData.mrp ? Number(formData.mrp) : defaultMRP,
                    d2cRate: formData.d2cRate,
                    amazonRate: formData.amazonRate,
                    flipkartRate: formData.flipkartRate,
                    dealerRate: formData.dealerRate
                };

                // Update/Add product
                if (editProduct) {
                    setProducts(products.map(p => p.sku === editProduct.sku ? productData : p));
                } else {
                    setProducts([...products, productData]);
                }

                // Update BOM (remove old entries for this product, add new ones)
                const otherBomEntries = bom.filter(b => b.productSku !== formData.sku);
                const newBomEntries = formData.formBom.map(b => ({
                    productSku: formData.sku,
                    componentCode: b.code,
                    qty: b.qty
                }));
                setBom([...otherBomEntries, ...newBomEntries]);

                // Update Sub-Products (remove old entries for this product, add new ones)
                const otherSubProductEntries = subProducts.filter(sp => sp.productSku !== formData.sku);
                const newSubProductEntries = formData.formSubProducts.map(sp => ({
                    productSku: formData.sku,
                    subProductSku: sp.sku,
                    qty: sp.qty
                }));
                setSubProducts([...otherSubProductEntries, ...newSubProductEntries]);

                setShowModal(false);
                resetForm();
            };

            const resetForm = () => {
                setFormData({ sku: '', name: '', category: 'SenseFlow', formBom: [], formSubProducts: [], sellingPrice: '', mrp: '', d2cRate: 3, amazonRate: 12, flipkartRate: 11, dealerRate: 500 });
                setEditProduct(null);
                setCircularError('');
            };

            // Category to prefix mapping
            const getCategoryPrefix = (category) => {
                const prefixMap = {
                    'SenseFlow': 'SF',
                    'Ambience': 'AMB',
                    'ThermoAmp': 'TA',
                    'Controllers': 'CTL',
                    'Sensors': 'SEN',
                    'Accessories': 'ACC'
                };
                return prefixMap[category] || category.substring(0, 3).toUpperCase();
            };

            // Generate unique SKU based on category
            const generateSKU = (category) => {
                const prefix = getCategoryPrefix(category);
                const regex = new RegExp(`^${prefix}(\\d+)$`, 'i');
                const numbers = products
                    .map(p => {
                        const match = p.sku.match(regex);
                        return match ? parseInt(match[1], 10) : 0;
                    })
                    .filter(n => n > 0);

                const nextNum = numbers.length > 0 ? Math.max(...numbers) + 1 : 1;
                return prefix + nextNum;
            };

            const handleEdit = (product) => {
                setEditProduct(product);
                // Load BOM from the bom array
                const productBom = bom.filter(b => b.productSku === product.sku).map(b => ({
                    code: b.componentCode,
                    qty: b.qty
                }));
                // Load Sub-Products from the subProducts array
                const productSubs = subProducts.filter(sp => sp.productSku === product.sku).map(sp => ({
                    sku: sp.subProductSku,
                    qty: sp.qty
                }));
                setFormData({
                    sku: product.sku,
                    name: product.name,
                    category: product.category,
                    formBom: productBom,
                    formSubProducts: productSubs,
                    sellingPrice: product.sellingPrice || '',
                    mrp: product.mrp || '',
                    d2cRate: product.d2cRate !== undefined ? product.d2cRate : 3,
                    amazonRate: product.amazonRate !== undefined ? product.amazonRate : 12,
                    flipkartRate: product.flipkartRate !== undefined ? product.flipkartRate : 11,
                    dealerRate: product.dealerRate !== undefined ? product.dealerRate : 500
                });
                setCircularError('');
                setShowModal(true);
            };

            const handleDelete = (sku) => {
                if (confirm('Delete this product?')) {
                    setProducts(products.filter(p => p.sku !== sku));
                    // Also remove BOM entries for this product
                    setBom(bom.filter(b => b.productSku !== sku));
                    // Remove from sub products if referenced (as parent or child)
                    setSubProducts(subProducts.filter(sp => sp.productSku !== sku && sp.subProductSku !== sku));
                }
            };

            const handleDuplicate = (product) => {
                // Load BOM from the bom array
                const productBom = bom.filter(b => b.productSku === product.sku).map(b => ({
                    code: b.componentCode,
                    qty: b.qty
                }));
                // Load Sub-Products from the subProducts array
                const productSubs = subProducts.filter(sp => sp.productSku === product.sku).map(sp => ({
                    sku: sp.subProductSku,
                    qty: sp.qty
                }));
                // Set form with copied data - SKU empty so user must enter new one
                setEditProduct(null); // Not editing, creating new
                setFormData({
                    sku: '', // User must enter new SKU
                    name: 'Copy of ' + product.name,
                    category: product.category,
                    formBom: productBom,
                    formSubProducts: productSubs,
                    sellingPrice: product.sellingPrice || '',
                    mrp: product.mrp || '',
                    d2cRate: product.d2cRate !== undefined ? product.d2cRate : 3,
                    amazonRate: product.amazonRate !== undefined ? product.amazonRate : 12,
                    flipkartRate: product.flipkartRate !== undefined ? product.flipkartRate : 11,
                    dealerRate: product.dealerRate !== undefined ? product.dealerRate : 500
                });
                setCircularError('');
                setShowModal(true);
            };

            return (
                <PasswordGate title="Products">
                    <div>
                        <div className="page-header">
                            <div>
                                <h1 className="page-title">Products</h1>
                                <p className="page-subtitle">Products with BOM - costs auto-update when component prices change</p>
                        </div>
                        <button className="btn btn-primary" onClick={() => { resetForm(); setShowModal(true); }}>
                            <Icons.Plus /> Add Product
                        </button>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <div className="search-box">
                                <Icons.Search />
                                <input type="text" placeholder="Search products..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <span style={{ color: 'var(--text-muted)', fontSize: '14px' }}>{filteredProducts.length} products</span>
                        </div>
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>SKU</th>
                                        <th>Product Name</th>
                                        <th>Category</th>
                                        <th>Making Cost</th>
                                        <th>Selling Price</th>
                                        <th>MRP</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredProducts.map(p => {
                                        const makingCost = calculateMakingCost(p, items, products, bom, subProducts);
                                        const sellingPrice = getSellingPrice(p, makingCost);
                                        const mrp = getMRP(p, makingCost);
                                        const profitPercent = makingCost > 0 ? Math.round(((sellingPrice - makingCost) / makingCost) * 100) : 0;
                                        const isExpanded = expandedProduct === p.sku;
                                        return (
                                            <React.Fragment key={p.sku}>
                                                <tr style={{ cursor: 'pointer' }} onClick={() => setExpandedProduct(isExpanded ? null : p.sku)}>
                                                    <td>
                                                        <span style={{ marginRight: '8px', color: 'var(--text-muted)' }}>{isExpanded ? '▼' : '▶'}</span>
                                                        <span className="code-badge">{p.sku}</span>
                                                    </td>
                                                    <td>{p.name}</td>
                                                    <td><span className={`category-badge ${getCategoryClass(p.category)}`}>{p.category}</span></td>
                                                    <td className="price">{formatCurrency(makingCost)}</td>
                                                    <td>
                                                        <span className="price green">{formatCurrency(sellingPrice)}</span>
                                                        {makingCost > 0 && <span className={`profit-indicator ${getProfitClass(makingCost, sellingPrice)}`}>{profitPercent}%</span>}
                                                    </td>
                                                    <td className="price">{formatCurrency(mrp)}</td>
                                                    <td className="actions" onClick={e => e.stopPropagation()}>
                                                        <button className="btn btn-secondary btn-sm btn-icon" onClick={() => handleDuplicate(p)} title="Duplicate"><Icons.Copy /></button>
                                                        <button className="btn btn-secondary btn-sm btn-icon" onClick={() => handleEdit(p)} title="Edit"><Icons.Edit /></button>
                                                        <button className="btn btn-danger btn-sm btn-icon" onClick={() => handleDelete(p.sku)} title="Delete"><Icons.Trash /></button>
                                                    </td>
                                                </tr>
                                                {isExpanded && (
                                                    <tr>
                                                        <td colSpan="7" style={{ padding: '16px', background: '#F8FAFC' }}>
                                                            <ProfitCalculator
                                                                sellingPrice={sellingPrice}
                                                                makingCost={makingCost}
                                                                productRates={{
                                                                    d2c: p.d2cRate !== undefined ? p.d2cRate : 3,
                                                                    amazon: p.amazonRate !== undefined ? p.amazonRate : 12,
                                                                    flipkart: p.flipkartRate !== undefined ? p.flipkartRate : 11,
                                                                    dealer: p.dealerRate !== undefined ? p.dealerRate : 500
                                                                }}
                                                                onRatesChange={(newRates) => {
                                                                    const updatedProduct = {
                                                                        ...p,
                                                                        d2cRate: newRates.d2c,
                                                                        amazonRate: newRates.amazon,
                                                                        flipkartRate: newRates.flipkart,
                                                                        dealerRate: newRates.dealer
                                                                    };
                                                                    setProducts(products.map(prod => prod.sku === p.sku ? updatedProduct : prod));
                                                                }}
                                                            />
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <Modal
                        isOpen={showModal}
                        onClose={() => { setShowModal(false); resetForm(); }}
                        title={editProduct ? 'Edit Product' : 'Add New Product'}
                        size="large"
                        footer={
                            <>
                                <button className="btn btn-secondary" onClick={() => { setShowModal(false); resetForm(); }}>Cancel</button>
                                <button className="btn btn-primary" onClick={handleSubmit}>{editProduct ? 'Update' : 'Add'} Product</button>
                            </>
                        }
                    >
                        <div className="form-row">
                            <div className="form-group">
                                <label className="form-label">SKU Code <span>*</span></label>
                                <div style={{ display: 'flex', gap: '8px' }}>
                                    <input type="text" className="form-input" placeholder="e.g., SF16" value={formData.sku} onChange={e => setFormData({ ...formData, sku: e.target.value.toUpperCase() })} disabled={!!editProduct} style={{ flex: 1 }} />
                                    {!editProduct && (
                                        <button
                                            type="button"
                                            className="btn btn-secondary btn-sm"
                                            onClick={() => setFormData({ ...formData, sku: generateSKU(formData.category) })}
                                            style={{ whiteSpace: 'nowrap' }}
                                        >
                                            Generate
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Category <span>*</span></label>
                                <select className="form-select" value={formData.category} onChange={e => setFormData({ ...formData, category: e.target.value })}>
                                    {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="form-group">
                            <label className="form-label">Product Name <span>*</span></label>
                            <input type="text" className="form-input" placeholder="e.g., New Product Name" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} />
                        </div>

                        {/* BOM Section - Components */}
                        <div className="bom-section">
                            <div className="bom-header">
                                <span className="bom-title">📦 Components (from Items)</span>
                            </div>

                            <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', alignItems: 'flex-end' }}>
                                <div style={{ flex: 1 }}>
                                    <SearchableSelect
                                        options={items}
                                        value={selectedItem}
                                        onChange={setSelectedItem}
                                        placeholder="Search components..."
                                        renderOption={(item) => `${item.code} - ${item.name} (${formatCurrency(item.price)})`}
                                    />
                                </div>
                                <input type="number" className="form-input" style={{ width: '70px' }} placeholder="Qty" value={itemQty} min="1" onChange={e => setItemQty(Number(e.target.value))} />
                                <button className="btn btn-primary btn-sm" onClick={addBomItem}><Icons.Plus /></button>
                            </div>

                            {formData.formBom.length === 0 ? (
                                <div className="empty-state" style={{ padding: '16px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
                                    No components added yet
                                </div>
                            ) : (
                                <>
                                    {formData.formBom.map(bomItem => {
                                        const item = items.find(i => i.code === bomItem.code);
                                        return (
                                            <div className="bom-item" key={bomItem.code}>
                                                <span className="bom-item-name"><span className="code-badge">{bomItem.code}</span> {item?.name || 'Unknown'}</span>
                                                <span style={{ textAlign: 'center' }}>{bomItem.qty}</span>
                                                <span className="price">{formatCurrency(item?.price || 0)}</span>
                                                <span className="price green">{formatCurrency((item?.price || 0) * bomItem.qty)}</span>
                                                <button className="btn btn-danger btn-sm btn-icon" onClick={() => removeBomItem(bomItem.code)}><Icons.X /></button>
                                            </div>
                                        );
                                    })}
                                </>
                            )}
                        </div>

                        {/* Sub-Products Section */}
                        <div className="bom-section" style={{ marginTop: '16px' }}>
                            <div className="bom-header">
                                <span className="bom-title">🔗 Sub-Products (from Products)</span>
                            </div>

                            <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', alignItems: 'flex-end' }}>
                                <div style={{ flex: 1 }}>
                                    <SearchableSelect
                                        options={products.filter(p => p.sku !== formData.sku)} // Exclude self
                                        value={selectedSubProduct}
                                        onChange={setSelectedSubProduct}
                                        placeholder="Search products..."
                                        renderOption={(p) => {
                                            const cost = calculateMakingCost(p, items, products, bom, subProducts);
                                            return `${p.sku} - ${p.name} (${formatCurrency(cost)})`;
                                        }}
                                    />
                                </div>
                                <input type="number" className="form-input" style={{ width: '70px' }} placeholder="Qty" value={subProductQty} min="1" onChange={e => setSubProductQty(Number(e.target.value))} />
                                <button className="btn btn-primary btn-sm" onClick={addSubProduct}><Icons.Plus /></button>
                            </div>

                            {circularError && (
                                <div style={{ background: '#FEE2E2', color: '#991B1B', padding: '10px 12px', borderRadius: '6px', marginBottom: '12px', fontSize: '13px' }}>
                                    ⚠️ {circularError}
                                </div>
                            )}

                            {formData.formSubProducts.length === 0 ? (
                                <div className="empty-state" style={{ padding: '16px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
                                    No sub-products added yet
                                </div>
                            ) : (
                                <>
                                    {formData.formSubProducts.map(sp => {
                                        const product = products.find(p => p.sku === sp.sku);
                                        const cost = product ? calculateMakingCost(product, items, products, bom, subProducts) : 0;
                                        return (
                                            <div className="bom-item" key={sp.sku}>
                                                <span className="bom-item-name"><span className="code-badge">{sp.sku}</span> {product?.name || 'Unknown'}</span>
                                                <span style={{ textAlign: 'center' }}>{sp.qty}</span>
                                                <span className="price">{formatCurrency(cost)}</span>
                                                <span className="price green">{formatCurrency(cost * sp.qty)}</span>
                                                <button className="btn btn-danger btn-sm btn-icon" onClick={() => removeSubProduct(sp.sku)}><Icons.X /></button>
                                            </div>
                                        );
                                    })}
                                </>
                            )}
                        </div>

                        {/* Total Making Cost */}
                        <div className="bom-total" style={{ marginTop: '16px' }}>
                            <span>Total Making Cost (Components + Sub-Products)</span>
                            <span className="price" style={{ fontSize: '16px' }}>{formatCurrency(formMakingCost)}</span>
                        </div>

                        {/* Pricing Section */}
                        <div className="price-summary">
                            <div className="price-row">
                                <span className="label">Making Cost</span>
                                <span className="value">{formatCurrency(formMakingCost)}</span>
                            </div>
                            <div className="form-row" style={{ marginTop: '12px' }}>
                                <div className="form-group" style={{ marginBottom: 0 }}>
                                    <label className="form-label">Selling Price (Default: {formatCurrency(defaultSellingPrice)} = 100%)</label>
                                    <input type="number" className="form-input" placeholder={defaultSellingPrice} value={formData.sellingPrice} onChange={e => setFormData({ ...formData, sellingPrice: e.target.value })} />
                                </div>
                                <div className="form-group" style={{ marginBottom: 0 }}>
                                    <label className="form-label">MRP (Default: {formatCurrency(defaultMRP)} = 150%)</label>
                                    <input type="number" className="form-input" placeholder={defaultMRP} value={formData.mrp} onChange={e => setFormData({ ...formData, mrp: e.target.value })} />
                                </div>
                            </div>
                            {/* Profit Calculator */}
                            <ProfitCalculator
                                sellingPrice={formData.sellingPrice || defaultSellingPrice}
                                makingCost={formMakingCost}
                                compact={true}
                                productRates={{
                                    d2c: formData.d2cRate,
                                    amazon: formData.amazonRate,
                                    flipkart: formData.flipkartRate,
                                    dealer: formData.dealerRate
                                }}
                                onRatesChange={(newRates) => setFormData({
                                    ...formData,
                                    d2cRate: newRates.d2c,
                                    amazonRate: newRates.amazon,
                                    flipkartRate: newRates.flipkart,
                                    dealerRate: newRates.dealer
                                })}
                            />
                        </div>
                    </Modal>
                </div>
            </PasswordGate>
            );
        };

        // ============ QUOTATION BUILDER ============
        const QuotationBuilder = ({ products, items, quotations, setQuotations, bom, subProducts }) => {
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            const [quoteItems, setQuoteItems] = useState([]);
            const [notes, setNotes] = useState('');
            const [selectedProduct, setSelectedProduct] = useState('');

            const addItem = () => {
                if (!selectedProduct) return;
                const product = products.find(p => p.sku === selectedProduct);
                if (!product) return;

                const makingCost = calculateMakingCost(product, items, products, bom, subProducts);
                const mrp = getMRP(product, makingCost);
                const sellingPrice = getSellingPrice(product, makingCost);

                const existingIndex = quoteItems.findIndex(i => i.sku === product.sku);
                if (existingIndex >= 0) {
                    const updated = [...quoteItems];
                    updated[existingIndex].qty += 1;
                    setQuoteItems(updated);
                } else {
                    setQuoteItems([...quoteItems, {
                        sku: product.sku,
                        name: product.name,
                        mrp: mrp,
                        minPrice: sellingPrice,
                        qty: 1,
                        discount: 0
                    }]);
                }
                setSelectedProduct('');
            };

            const updateItem = (index, field, value) => {
                const updated = [...quoteItems];
                updated[index][field] = Number(value);
                setQuoteItems(updated);
            };

            const removeItem = (index) => {
                setQuoteItems(quoteItems.filter((_, i) => i !== index));
            };

            const calculateNetPrice = (item) => {
                return Math.round(item.mrp * (1 - item.discount / 100));
            };

            const subtotal = quoteItems.reduce((sum, item) => {
                return sum + (calculateNetPrice(item) * item.qty);
            }, 0);

            const gst = calculateGST(subtotal);
            const grandTotal = subtotal + gst;

            // Check if any item is below selling price
            const hasWarning = quoteItems.some(item => calculateNetPrice(item) < item.minPrice);

            const generatePDF = (type = 'quotation') => {
                if (!customer.name || quoteItems.length === 0) {
                    alert('Please add customer name and at least one product');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Header
                doc.setFillColor(30, 58, 138);
                doc.rect(0, 0, 210, 45, 'F');

                doc.setTextColor(255, 255, 255);
                doc.setFontSize(22);
                doc.setFont('helvetica', 'bold');
                doc.text(CONFIG.COMPANY.name, 15, 18);

                doc.setFontSize(10);
                doc.setFont('helvetica', 'italic');
                doc.text(CONFIG.COMPANY.tagline, 15, 26);

                doc.setFont('helvetica', 'normal');
                doc.text(`${CONFIG.COMPANY.address} | ${CONFIG.COMPANY.city}`, 15, 34);
                doc.text(`Email: ${CONFIG.COMPANY.email} | Phone: ${CONFIG.COMPANY.phone} | GSTIN: ${CONFIG.COMPANY.gst}`, 15, 41);

                // Document Info
                const docNumber = generateDocNumber(type === 'quotation' ? 'QT' : 'INV', quotations.length);
                const today = new Date().toLocaleDateString('en-IN');

                doc.setTextColor(30, 58, 138);
                doc.setFontSize(18);
