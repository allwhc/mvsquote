                                    <td style={labelStyle}>Making Cost</td>
                                    {platforms.map(p => <td key={p.key} style={{ ...cellStyle, color: '#DC2626' }}>-{formatCurrency(cost)}</td>)}
                                </tr>
                                <tr style={{ background: cost > 0 ? '#D1FAE5' : 'var(--bg-light)' }}>
                                    <td style={{ ...labelStyle, fontWeight: '700' }}>PROFIT</td>
                                    {platforms.map(p => (
                                        <td key={p.key} style={{
                                            ...cellStyle,
                                            fontWeight: '700',
                                            color: p.profit >= 0 ? '#059669' : '#DC2626',
                                            fontSize: compact ? '13px' : '14px'
                                        }}>
                                            {p.profit >= 0 ? '' : '-'}{formatCurrency(Math.abs(p.profit))}
                                        </td>
                                    ))}
                                </tr>
                                <tr style={{ background: 'var(--bg-light)' }}>
                                    <td style={{ ...labelStyle, fontWeight: '600' }}>Margin %</td>
                                    {platforms.map(p => (
                                        <td key={p.key} style={{
                                            ...cellStyle,
                                            fontWeight: '600',
                                            color: p.margin >= 30 ? '#059669' : p.margin >= 20 ? '#D97706' : '#DC2626'
                                        }}>
                                            {p.margin}%
                                        </td>
                                    ))}
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div style={{
                        padding: '8px 12px',
                        background: '#F0F9FF',
                        fontSize: '11px',
                        color: '#0369A1',
                        borderTop: '1px solid var(--border-color)'
                    }}>
                        💡 Selling price should be inclusive of GST. Platform fees are deducted from post-GST amount.
                    </div>
                </div>
            );
        };

        // ============ PRODUCTS PAGE ============
        const ProductsPage = ({ products, setProducts, items, bom, setBom, subProducts, setSubProducts }) => {
            const [search, setSearch] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [editProduct, setEditProduct] = useState(null);
            const [formData, setFormData] = useState({
                sku: '', name: '', category: 'SenseFlow',
                formBom: [], // Components from Items
                formSubProducts: [], // Sub-products from Products
                sellingPrice: '',
                mrp: '',
                d2cRate: 3,
                amazonRate: 12,
                flipkartRate: 11,
                dealerRate: 500
            });
            const [selectedItem, setSelectedItem] = useState('');
            const [itemQty, setItemQty] = useState(1);
            const [selectedSubProduct, setSelectedSubProduct] = useState('');
            const [subProductQty, setSubProductQty] = useState(1);
            const [circularError, setCircularError] = useState('');
            const [expandedProduct, setExpandedProduct] = useState(null);

            const categories = ['SenseFlow', 'ThermoAmp', 'Controllers', 'Sensors', 'Accessories'];

            const filteredProducts = products.filter(p =>
                p.sku.toLowerCase().includes(search.toLowerCase()) ||
                p.name.toLowerCase().includes(search.toLowerCase()) ||
                p.category.toLowerCase().includes(search.toLowerCase())
            );

            // Calculate form making cost including sub-products
            const calculateFormMakingCost = () => {
                // Cost from components
                let total = formData.formBom.reduce((sum, bomItem) => {
                    const item = items.find(i => i.code === bomItem.code);
                    return sum + (item ? item.price * bomItem.qty : 0);
                }, 0);

                // Cost from sub-products
                formData.formSubProducts.forEach(sp => {
                    const subProduct = products.find(p => p.sku === sp.sku);
                    if (subProduct) {
                        const subCost = calculateMakingCost(subProduct, items, products, bom, subProducts);
                        total += subCost * sp.qty;
                    }
                });

                return total;
            };

            const formMakingCost = calculateFormMakingCost();
            const defaultSellingPrice = Math.round(formMakingCost * (1 + CONFIG.DEFAULT_SELLING_MARGIN / 100));
            const defaultMRP = Math.round(formMakingCost * (1 + CONFIG.DEFAULT_MRP_MARGIN / 100));

            // Add component to BOM
            const addBomItem = () => {
                if (!selectedItem || itemQty < 1) return;
                const existing = formData.formBom.find(b => b.code === selectedItem);
                if (existing) {
                    setFormData({
                        ...formData,
                        formBom: formData.formBom.map(b => b.code === selectedItem ? { ...b, qty: b.qty + itemQty } : b)
                    });
                } else {
                    setFormData({
                        ...formData,
                        formBom: [...formData.formBom, { code: selectedItem, qty: itemQty }]
                    });
                }
                setSelectedItem('');
                setItemQty(1);
            };

            // Add sub-product with circular dependency check
            const addSubProduct = () => {
                if (!selectedSubProduct || subProductQty < 1) return;
                setCircularError('');

                // Can't add self
                if (selectedSubProduct === formData.sku) {
                    setCircularError('Cannot add a product to itself!');
                    return;
                }

                // Check for circular dependency
                // Build temporary subProducts list to check
                const tempSubProducts = [
                    ...subProducts.filter(sp => sp.productSku !== formData.sku),
                    ...formData.formSubProducts.map(sp => ({ productSku: formData.sku, subProductSku: sp.sku, qty: sp.qty })),
                    { productSku: formData.sku, subProductSku: selectedSubProduct, qty: subProductQty }
                ];

                if (hasCircularDependency(formData.sku, selectedSubProduct, tempSubProducts)) {
                    setCircularError(`Circular dependency detected! ${selectedSubProduct} already contains ${formData.sku} directly or indirectly.`);
                    return;
                }

                const existing = formData.formSubProducts.find(sp => sp.sku === selectedSubProduct);
                if (existing) {
                    setFormData({
                        ...formData,
                        formSubProducts: formData.formSubProducts.map(sp => 
                            sp.sku === selectedSubProduct ? { ...sp, qty: sp.qty + subProductQty } : sp
                        )
                    });
                } else {
                    setFormData({
                        ...formData,
                        formSubProducts: [...formData.formSubProducts, { sku: selectedSubProduct, qty: subProductQty }]
                    });
                }
                setSelectedSubProduct('');
                setSubProductQty(1);
            };

            const removeBomItem = (code) => {
                setFormData({
                    ...formData,
                    formBom: formData.formBom.filter(b => b.code !== code)
                });
            };

            const removeSubProduct = (sku) => {
                setFormData({
                    ...formData,
                    formSubProducts: formData.formSubProducts.filter(sp => sp.sku !== sku)
                });
            };

            const handleSubmit = () => {
                if (!formData.sku || !formData.name || (formData.formBom.length === 0 && formData.formSubProducts.length === 0)) {
                    alert('Please fill SKU, Name and add at least one component or sub-product');
                    return;
                }

                // Check for duplicate SKU (only when adding new product)
                if (!editProduct && products.some(p => p.sku.toUpperCase() === formData.sku.toUpperCase())) {
                    alert(`Product SKU "${formData.sku}" already exists! Delete the existing product first or use a different SKU.`);
                    return;
                }

                const productData = {
                    sku: formData.sku,
                    name: formData.name,
                    category: formData.category,
                    sellingPrice: formData.sellingPrice ? Number(formData.sellingPrice) : defaultSellingPrice,
                    mrp: formData.mrp ? Number(formData.mrp) : defaultMRP,
                    d2cRate: formData.d2cRate,
                    amazonRate: formData.amazonRate,
                    flipkartRate: formData.flipkartRate,
                    dealerRate: formData.dealerRate
                };

                // Update/Add product
                if (editProduct) {
                    setProducts(products.map(p => p.sku === editProduct.sku ? productData : p));
                } else {
                    setProducts([...products, productData]);
                }

                // Update BOM (remove old entries for this product, add new ones)
                const otherBomEntries = bom.filter(b => b.productSku !== formData.sku);
                const newBomEntries = formData.formBom.map(b => ({
                    productSku: formData.sku,
                    componentCode: b.code,
                    qty: b.qty
                }));
                setBom([...otherBomEntries, ...newBomEntries]);

                // Update Sub-Products (remove old entries for this product, add new ones)
                const otherSubProductEntries = subProducts.filter(sp => sp.productSku !== formData.sku);
                const newSubProductEntries = formData.formSubProducts.map(sp => ({
                    productSku: formData.sku,
                    subProductSku: sp.sku,
                    qty: sp.qty
                }));
                setSubProducts([...otherSubProductEntries, ...newSubProductEntries]);

                setShowModal(false);
                resetForm();
            };

            const resetForm = () => {
                setFormData({ sku: '', name: '', category: 'SenseFlow', formBom: [], formSubProducts: [], sellingPrice: '', mrp: '', d2cRate: 3, amazonRate: 12, flipkartRate: 11, dealerRate: 500 });
                setEditProduct(null);
                setCircularError('');
            };

            // Category to prefix mapping
            const getCategoryPrefix = (category) => {
                const prefixMap = {
                    'SenseFlow': 'SF',
                    'Ambience': 'AMB',
                    'ThermoAmp': 'TA',
                    'Controllers': 'CTL',
                    'Sensors': 'SEN',
                    'Accessories': 'ACC'
                };
                return prefixMap[category] || category.substring(0, 3).toUpperCase();
            };

            // Generate unique SKU based on category
            const generateSKU = (category) => {
                const prefix = getCategoryPrefix(category);
                const regex = new RegExp(`^${prefix}(\\d+)$`, 'i');
                const numbers = products
                    .map(p => {
                        const match = p.sku.match(regex);
                        return match ? parseInt(match[1], 10) : 0;
                    })
                    .filter(n => n > 0);

                const nextNum = numbers.length > 0 ? Math.max(...numbers) + 1 : 1;
                return prefix + nextNum;
            };

            const handleEdit = (product) => {
                setEditProduct(product);
                // Load BOM from the bom array
                const productBom = bom.filter(b => b.productSku === product.sku).map(b => ({
                    code: b.componentCode,
                    qty: b.qty
                }));
                // Load Sub-Products from the subProducts array
                const productSubs = subProducts.filter(sp => sp.productSku === product.sku).map(sp => ({
                    sku: sp.subProductSku,
                    qty: sp.qty
                }));
                setFormData({
                    sku: product.sku,
                    name: product.name,
                    category: product.category,
                    formBom: productBom,
                    formSubProducts: productSubs,
                    sellingPrice: product.sellingPrice || '',
                    mrp: product.mrp || '',
                    d2cRate: product.d2cRate !== undefined ? product.d2cRate : 3,
                    amazonRate: product.amazonRate !== undefined ? product.amazonRate : 12,
                    flipkartRate: product.flipkartRate !== undefined ? product.flipkartRate : 11,
                    dealerRate: product.dealerRate !== undefined ? product.dealerRate : 500
                });
                setCircularError('');
                setShowModal(true);
            };

            const handleDelete = (sku) => {
                if (confirm('Delete this product?')) {
                    setProducts(products.filter(p => p.sku !== sku));
                    // Also remove BOM entries for this product
                    setBom(bom.filter(b => b.productSku !== sku));
                    // Remove from sub products if referenced (as parent or child)
                    setSubProducts(subProducts.filter(sp => sp.productSku !== sku && sp.subProductSku !== sku));
                }
            };

            const handleDuplicate = (product) => {
                // Load BOM from the bom array
                const productBom = bom.filter(b => b.productSku === product.sku).map(b => ({
                    code: b.componentCode,
                    qty: b.qty
                }));
                // Load Sub-Products from the subProducts array
                const productSubs = subProducts.filter(sp => sp.productSku === product.sku).map(sp => ({
                    sku: sp.subProductSku,
                    qty: sp.qty
                }));
                // Set form with copied data - SKU empty so user must enter new one
                setEditProduct(null); // Not editing, creating new
                setFormData({
                    sku: '', // User must enter new SKU
                    name: 'Copy of ' + product.name,
                    category: product.category,
                    formBom: productBom,
                    formSubProducts: productSubs,
                    sellingPrice: product.sellingPrice || '',
                    mrp: product.mrp || '',
                    d2cRate: product.d2cRate !== undefined ? product.d2cRate : 3,
                    amazonRate: product.amazonRate !== undefined ? product.amazonRate : 12,
                    flipkartRate: product.flipkartRate !== undefined ? product.flipkartRate : 11,
                    dealerRate: product.dealerRate !== undefined ? product.dealerRate : 500
                });
                setCircularError('');
                setShowModal(true);
            };

            return (
                <PasswordGate title="Products">
                    <div>
                        <div className="page-header">
                            <div>
                                <h1 className="page-title">Products</h1>
                                <p className="page-subtitle">Products with BOM - costs auto-update when component prices change</p>
                        </div>
                        <button className="btn btn-primary" onClick={() => { resetForm(); setShowModal(true); }}>
                            <Icons.Plus /> Add Product
                        </button>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <div className="search-box">
                                <Icons.Search />
                                <input type="text" placeholder="Search products..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <span style={{ color: 'var(--text-muted)', fontSize: '14px' }}>{filteredProducts.length} products</span>
                        </div>
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>SKU</th>
                                        <th>Product Name</th>
                                        <th>Category</th>
                                        <th>Making Cost</th>
                                        <th>Selling Price</th>
                                        <th>MRP</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredProducts.map(p => {
                                        const makingCost = calculateMakingCost(p, items, products, bom, subProducts);
                                        const sellingPrice = getSellingPrice(p, makingCost);
                                        const mrp = getMRP(p, makingCost);
                                        const profitPercent = makingCost > 0 ? Math.round(((sellingPrice - makingCost) / makingCost) * 100) : 0;
                                        const isExpanded = expandedProduct === p.sku;
                                        return (
                                            <React.Fragment key={p.sku}>
                                                <tr style={{ cursor: 'pointer' }} onClick={() => setExpandedProduct(isExpanded ? null : p.sku)}>
                                                    <td>
                                                        <span style={{ marginRight: '8px', color: 'var(--text-muted)' }}>{isExpanded ? '▼' : '▶'}</span>
                                                        <span className="code-badge">{p.sku}</span>
                                                    </td>
                                                    <td>{p.name}</td>
                                                    <td><span className={`category-badge ${getCategoryClass(p.category)}`}>{p.category}</span></td>
                                                    <td className="price">{formatCurrency(makingCost)}</td>
                                                    <td>
                                                        <span className="price green">{formatCurrency(sellingPrice)}</span>
                                                        {makingCost > 0 && <span className={`profit-indicator ${getProfitClass(makingCost, sellingPrice)}`}>{profitPercent}%</span>}
                                                    </td>
                                                    <td className="price">{formatCurrency(mrp)}</td>
                                                    <td className="actions" onClick={e => e.stopPropagation()}>
                                                        <button className="btn btn-secondary btn-sm btn-icon" onClick={() => handleDuplicate(p)} title="Duplicate"><Icons.Copy /></button>
                                                        <button className="btn btn-secondary btn-sm btn-icon" onClick={() => handleEdit(p)} title="Edit"><Icons.Edit /></button>
                                                        <button className="btn btn-danger btn-sm btn-icon" onClick={() => handleDelete(p.sku)} title="Delete"><Icons.Trash /></button>
                                                    </td>
                                                </tr>
                                                {isExpanded && (
                                                    <tr>
                                                        <td colSpan="7" style={{ padding: '16px', background: '#F8FAFC' }}>
                                                            <ProfitCalculator
                                                                sellingPrice={sellingPrice}
                                                                makingCost={makingCost}
                                                                productRates={{
                                                                    d2c: p.d2cRate !== undefined ? p.d2cRate : 3,
                                                                    amazon: p.amazonRate !== undefined ? p.amazonRate : 12,
                                                                    flipkart: p.flipkartRate !== undefined ? p.flipkartRate : 11,
                                                                    dealer: p.dealerRate !== undefined ? p.dealerRate : 500
                                                                }}
                                                                onRatesChange={(newRates) => {
                                                                    const updatedProduct = {
                                                                        ...p,
                                                                        d2cRate: newRates.d2c,
                                                                        amazonRate: newRates.amazon,
                                                                        flipkartRate: newRates.flipkart,
                                                                        dealerRate: newRates.dealer
                                                                    };
                                                                    setProducts(products.map(prod => prod.sku === p.sku ? updatedProduct : prod));
                                                                }}
                                                            />
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <Modal
                        isOpen={showModal}
                        onClose={() => { setShowModal(false); resetForm(); }}
                        title={editProduct ? 'Edit Product' : 'Add New Product'}
                        size="large"
                        footer={
                            <>
                                <button className="btn btn-secondary" onClick={() => { setShowModal(false); resetForm(); }}>Cancel</button>
                                <button className="btn btn-primary" onClick={handleSubmit}>{editProduct ? 'Update' : 'Add'} Product</button>
                            </>
                        }
                    >
                        <div className="form-row">
                            <div className="form-group">
                                <label className="form-label">SKU Code <span>*</span></label>
                                <div style={{ display: 'flex', gap: '8px' }}>
                                    <input type="text" className="form-input" placeholder="e.g., SF16" value={formData.sku} onChange={e => setFormData({ ...formData, sku: e.target.value.toUpperCase() })} disabled={!!editProduct} style={{ flex: 1 }} />
                                    {!editProduct && (
                                        <button
                                            type="button"
                                            className="btn btn-secondary btn-sm"
                                            onClick={() => setFormData({ ...formData, sku: generateSKU(formData.category) })}
                                            style={{ whiteSpace: 'nowrap' }}
                                        >
                                            Generate
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Category <span>*</span></label>
                                <select className="form-select" value={formData.category} onChange={e => setFormData({ ...formData, category: e.target.value })}>
                                    {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="form-group">
                            <label className="form-label">Product Name <span>*</span></label>
                            <input type="text" className="form-input" placeholder="e.g., New Product Name" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} />
                        </div>

                        {/* BOM Section - Components */}
                        <div className="bom-section">
                            <div className="bom-header">
                                <span className="bom-title">📦 Components (from Items)</span>
                            </div>

                            <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', alignItems: 'flex-end' }}>
                                <div style={{ flex: 1 }}>
                                    <SearchableSelect
                                        options={items}
                                        value={selectedItem}
                                        onChange={setSelectedItem}
                                        placeholder="Search components..."
                                        renderOption={(item) => `${item.code} - ${item.name} (${formatCurrency(item.price)})`}
                                    />
                                </div>
                                <input type="number" className="form-input" style={{ width: '70px' }} placeholder="Qty" value={itemQty} min="1" onChange={e => setItemQty(Number(e.target.value))} />
                                <button className="btn btn-primary btn-sm" onClick={addBomItem}><Icons.Plus /></button>
                            </div>

                            {formData.formBom.length === 0 ? (
                                <div className="empty-state" style={{ padding: '16px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
                                    No components added yet
                                </div>
                            ) : (
                                <>
                                    {formData.formBom.map(bomItem => {
                                        const item = items.find(i => i.code === bomItem.code);
                                        return (
                                            <div className="bom-item" key={bomItem.code}>
                                                <span className="bom-item-name"><span className="code-badge">{bomItem.code}</span> {item?.name || 'Unknown'}</span>
                                                <span style={{ textAlign: 'center' }}>{bomItem.qty}</span>
                                                <span className="price">{formatCurrency(item?.price || 0)}</span>
                                                <span className="price green">{formatCurrency((item?.price || 0) * bomItem.qty)}</span>
                                                <button className="btn btn-danger btn-sm btn-icon" onClick={() => removeBomItem(bomItem.code)}><Icons.X /></button>
                                            </div>
                                        );
                                    })}
                                </>
                            )}
                        </div>

                        {/* Sub-Products Section */}
                        <div className="bom-section" style={{ marginTop: '16px' }}>
                            <div className="bom-header">
                                <span className="bom-title">🔗 Sub-Products (from Products)</span>
                            </div>

                            <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', alignItems: 'flex-end' }}>
                                <div style={{ flex: 1 }}>
                                    <SearchableSelect
                                        options={products.filter(p => p.sku !== formData.sku)} // Exclude self
                                        value={selectedSubProduct}
                                        onChange={setSelectedSubProduct}
                                        placeholder="Search products..."
                                        renderOption={(p) => {
                                            const cost = calculateMakingCost(p, items, products, bom, subProducts);
                                            return `${p.sku} - ${p.name} (${formatCurrency(cost)})`;
                                        }}
                                    />
                                </div>
                                <input type="number" className="form-input" style={{ width: '70px' }} placeholder="Qty" value={subProductQty} min="1" onChange={e => setSubProductQty(Number(e.target.value))} />
                                <button className="btn btn-primary btn-sm" onClick={addSubProduct}><Icons.Plus /></button>
                            </div>

                            {circularError && (
                                <div style={{ background: '#FEE2E2', color: '#991B1B', padding: '10px 12px', borderRadius: '6px', marginBottom: '12px', fontSize: '13px' }}>
                                    ⚠️ {circularError}
                                </div>
                            )}

                            {formData.formSubProducts.length === 0 ? (
                                <div className="empty-state" style={{ padding: '16px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
                                    No sub-products added yet
                                </div>
                            ) : (
                                <>
                                    {formData.formSubProducts.map(sp => {
                                        const product = products.find(p => p.sku === sp.sku);
                                        const cost = product ? calculateMakingCost(product, items, products, bom, subProducts) : 0;
                                        return (
                                            <div className="bom-item" key={sp.sku}>
                                                <span className="bom-item-name"><span className="code-badge">{sp.sku}</span> {product?.name || 'Unknown'}</span>
                                                <span style={{ textAlign: 'center' }}>{sp.qty}</span>
                                                <span className="price">{formatCurrency(cost)}</span>
                                                <span className="price green">{formatCurrency(cost * sp.qty)}</span>
                                                <button className="btn btn-danger btn-sm btn-icon" onClick={() => removeSubProduct(sp.sku)}><Icons.X /></button>
                                            </div>
                                        );
                                    })}
                                </>
                            )}
                        </div>

                        {/* Total Making Cost */}
                        <div className="bom-total" style={{ marginTop: '16px' }}>
                            <span>Total Making Cost (Components + Sub-Products)</span>
                            <span className="price" style={{ fontSize: '16px' }}>{formatCurrency(formMakingCost)}</span>
                        </div>

                        {/* Pricing Section */}
                        <div className="price-summary">
                            <div className="price-row">
                                <span className="label">Making Cost</span>
                                <span className="value">{formatCurrency(formMakingCost)}</span>
                            </div>
                            <div className="form-row" style={{ marginTop: '12px' }}>
                                <div className="form-group" style={{ marginBottom: 0 }}>
                                    <label className="form-label">Selling Price (Default: {formatCurrency(defaultSellingPrice)} = 100%)</label>
                                    <input type="number" className="form-input" placeholder={defaultSellingPrice} value={formData.sellingPrice} onChange={e => setFormData({ ...formData, sellingPrice: e.target.value })} />
                                </div>
                                <div className="form-group" style={{ marginBottom: 0 }}>
                                    <label className="form-label">MRP (Default: {formatCurrency(defaultMRP)} = 150%)</label>
                                    <input type="number" className="form-input" placeholder={defaultMRP} value={formData.mrp} onChange={e => setFormData({ ...formData, mrp: e.target.value })} />
                                </div>
                            </div>
                            {/* Profit Calculator */}
                            <ProfitCalculator
                                sellingPrice={formData.sellingPrice || defaultSellingPrice}
                                makingCost={formMakingCost}
                                compact={true}
                                productRates={{
                                    d2c: formData.d2cRate,
                                    amazon: formData.amazonRate,
                                    flipkart: formData.flipkartRate,
                                    dealer: formData.dealerRate
                                }}
                                onRatesChange={(newRates) => setFormData({
                                    ...formData,
                                    d2cRate: newRates.d2c,
                                    amazonRate: newRates.amazon,
                                    flipkartRate: newRates.flipkart,
                                    dealerRate: newRates.dealer
                                })}
                            />
                        </div>
                    </Modal>
                </div>
            </PasswordGate>
            );
        };

        // ============ QUOTATION BUILDER ============
        const QuotationBuilder = ({ products, items, quotations, setQuotations, bom, subProducts, editingDoc, setEditingDoc }) => {
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            const [deliveryAddress, setDeliveryAddress] = useState({ name: '', phone: '', address: '' });
            const [sameAsDelivery, setSameAsDelivery] = useState(true);
            const [quoteItems, setQuoteItems] = useState([]);
            const [notes, setNotes] = useState('');
            const [selectedTerms, setSelectedTerms] = useState([]);
            const [customTerm, setCustomTerm] = useState('');
            const [selectedProduct, setSelectedProduct] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('SenseFlow');
            const [includeGST, setIncludeGST] = useState(true);
            const [discountEnabled, setDiscountEnabled] = useState(false);
            const [discountType, setDiscountType] = useState('percentage');
            const [discountValue, setDiscountValue] = useState(0);

            // Load editingDoc data when set
            React.useEffect(() => {
                if (editingDoc) {
                    setCustomer(editingDoc.customer || { name: '', phone: '', address: '' });
                    if (editingDoc.deliveryAddress) {
                        setSameAsDelivery(false);
                        setDeliveryAddress(editingDoc.deliveryAddress);
                    } else {
                        setSameAsDelivery(true);
                        setDeliveryAddress({ name: '', phone: '', address: '' });
                    }
                    setQuoteItems(editingDoc.items || []);
                    setNotes(editingDoc.notes || '');
                    setSelectedTerms(editingDoc.terms || []);
                    setSelectedBrand(editingDoc.brand || 'MV Solutions');
                    setIncludeGST(editingDoc.includeGST !== false);
                    if (editingDoc.discount && editingDoc.discount.value > 0) {
                        setDiscountEnabled(true);
                        setDiscountType(editingDoc.discount.type || 'percentage');
                        setDiscountValue(editingDoc.discount.value || 0);
                    } else {
                        setDiscountEnabled(false);
                        setDiscountType('percentage');
                        setDiscountValue(0);
                    }
                }
            }, [editingDoc]);

            const toggleTerm = (term) => {
                setSelectedTerms(prev => {
                    const exists = prev.find(t => t.id === term.id);
                    if (exists) return prev.filter(t => t.id !== term.id);
                    return [...prev, { id: term.id, text: term.text }];
                });
            };
            const updateTermText = (id, newText) => {
                setSelectedTerms(prev => prev.map(t => t.id === id ? { ...t, text: newText } : t));
            };
            const addCustomTerm = () => {
                if (!customTerm.trim()) return;
                setSelectedTerms(prev => [...prev, { id: 'custom_' + Date.now(), text: customTerm.trim() }]);
                setCustomTerm('');
            };
            const removeTermById = (id) => {
                setSelectedTerms(prev => prev.filter(t => t.id !== id));
            };

            const addItem = () => {
                if (!selectedProduct) return;
                const product = products.find(p => p.sku === selectedProduct);
                if (!product) return;

                const makingCost = calculateMakingCost(product, items, products, bom, subProducts);
                const mrp = getMRP(product, makingCost);
                const sellingPrice = getSellingPrice(product, makingCost);

                setQuoteItems([...quoteItems, {
                    sku: product.sku,
                    name: product.name,
                    description: '',
                    mrp: mrp,
                    minPrice: sellingPrice,
                    qty: 1,
                    discount: 0
                }]);
                setSelectedProduct('');
            };

            const addCustomItem = () => {
                setQuoteItems([...quoteItems, {
                    sku: 'CUSTOM',
                    name: '',
                    description: '',
                    mrp: 0,
                    minPrice: 0,
                    qty: 1,
                    discount: 0
                }]);
            };

            const updateItem = (index, field, value) => {
                const updated = [...quoteItems];
                if (field === 'name' || field === 'description') {
                    updated[index][field] = value;
                } else {
                    updated[index][field] = Number(value);
                }
                setQuoteItems(updated);
            };

            const removeItem = (index) => {
                setQuoteItems(quoteItems.filter((_, i) => i !== index));
            };

            const calculateNetPrice = (item) => {
                return Math.round(item.mrp * (1 - item.discount / 100));
            };

            const subtotal = quoteItems.reduce((sum, item) => {
                return sum + (calculateNetPrice(item) * item.qty);
            }, 0);

            const gst = includeGST ? calculateGST(subtotal) : 0;
            const grossTotal = subtotal + gst;
            const discountAmount = discountEnabled && discountValue > 0
                ? (discountType === 'percentage' ? Math.round(grossTotal * discountValue / 100) : Math.round(Number(discountValue)))
                : 0;
            const grandTotal = grossTotal - discountAmount;

            // Check if any item is below selling price
            const hasWarning = quoteItems.some(item => calculateNetPrice(item) < item.minPrice);

            const generatePDF = async (type = 'quotation') => {
                if (!customer.name || quoteItems.length === 0) {
                    alert('Please add customer name and at least one product');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const brand = CONFIG.BRANDS[selectedBrand];
                const brandColor = brand.color;

                // Header - light gray background with dark blue text
                doc.setFillColor(245, 245, 245);
                doc.rect(0, 0, 210, 44, 'F');
                let headerStartX = 15;
                if (brand.logo) {
                    try {
                        const logoW = 14;
                        const logoH = 18;
                        const logoX = 15;
                        const logoY = 6;
                        doc.addImage(brand.logo, 'PNG', logoX, logoY, logoW, logoH);
                        headerStartX = logoX + logoW + 4;
                    } catch(e) {}
                }

                doc.setTextColor(...brandColor);
                doc.setFontSize(22);
                doc.setFont('helvetica', 'bold');
                doc.text(brand.name, headerStartX, 14);

                doc.setFontSize(10);
                doc.setFont('helvetica', 'italic');
                doc.setTextColor(80, 80, 80);
                doc.text(brand.tagline, headerStartX, 22);

                if (brand.subtitle) {
                    doc.setFontSize(8);
                    doc.setFont('helvetica', 'normal');
                    doc.setTextColor(120, 120, 120);
                    doc.text(brand.subtitle, headerStartX, 28);
                }

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8);
                doc.setTextColor(80, 80, 80);
                doc.text(CONFIG.COMPANY.address + ' | ' + CONFIG.COMPANY.city, 15, 35);
                const contactLine = 'Email: ' + brand.email + (brand.website ? ' | Web: ' + brand.website : '') + ' | Phone: ' + CONFIG.COMPANY.phone + ' | GSTIN: ' + CONFIG.COMPANY.gst;
                doc.text(contactLine, 15, 41);

                // Separator line
                doc.setDrawColor(...brandColor);
                doc.setLineWidth(1);
                doc.line(15, 45, 195, 45);

                // Document Info
                const docNumber = editingDoc ? editingDoc.number : generateDocNumber(brand.prefix + (type === 'quotation' ? 'QT' : 'INV'), quotations.length);
                const today = editingDoc ? formatDate(editingDoc.date) : formatDate(new Date());

                doc.setTextColor(...brandColor);
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.text(type === 'quotation' ? 'QUOTATION' : (includeGST ? 'TAX INVOICE' : 'INVOICE'), 15, 58);

                doc.setTextColor(100);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.text(`No: ${docNumber}`, 160, 52);
                doc.text(`Date: ${today}`, 160, 58);

                // Customer
                const hasShipTo = !sameAsDelivery && deliveryAddress && deliveryAddress.name;
                doc.setFillColor(241, 245, 249);
                doc.rect(15, 68, 180, 30, 'F');

                doc.setTextColor(100);
                doc.setFontSize(9);
                doc.text('BILL TO:', 20, 76);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(11);
                doc.setTextColor(30);
                doc.text(customer.name, 20, 83);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(100);
                if (hasShipTo) {
                    if (customer.phone) doc.text('Ph: ' + customer.phone, 20, 89);
                    if (customer.address) { const al = doc.splitTextToSize(customer.address, 75); doc.text(al, 20, 94); }
                    // SHIP TO column
                    doc.text('SHIP TO:', 115, 76);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(11);
                    doc.setTextColor(30);
                    doc.text(deliveryAddress.name, 115, 83);
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(9);
                    doc.setTextColor(100);
                    if (deliveryAddress.phone) doc.text('Ph: ' + deliveryAddress.phone, 115, 89);
                    if (deliveryAddress.address) { const al2 = doc.splitTextToSize(deliveryAddress.address, 75); doc.text(al2, 115, 94); }
                } else {
                    if (customer.phone) doc.text('Ph: ' + customer.phone, 100, 76);
                    if (customer.address) { const al = doc.splitTextToSize(customer.address, 85); doc.text(al, 100, 83); }
                }

                // Table - smart columns based on discount usage
                const hasDiscount = quoteItems.some(item => item.discount > 0);

                let tableHead, tableData, colStyles;
                const productLabel = (item) => item.description ? item.name + '\n' + item.description : item.name;
                if (hasDiscount) {
                    tableHead = [['Product', 'Qty', 'MRP', 'Disc %', 'Net Price', 'Total']];
                    tableData = quoteItems.map(item => {
                        const netPrice = calculateNetPrice(item);
                        return [productLabel(item), item.qty.toString(), formatCurrencyPDF(item.mrp), item.discount + '%', formatCurrencyPDF(netPrice), formatCurrencyPDF(netPrice * item.qty)];
                    });
                    colStyles = { 0: { cellWidth: 'auto' }, 1: { halign: 'center', cellWidth: 15 }, 2: { halign: 'right', cellWidth: 25 }, 3: { halign: 'center', cellWidth: 18 }, 4: { halign: 'right', cellWidth: 25 }, 5: { halign: 'right', cellWidth: 25 } };
                } else {
                    tableHead = [['Product', 'Qty', 'Price', 'Total']];
                    tableData = quoteItems.map(item => {
                        const netPrice = calculateNetPrice(item);
                        return [productLabel(item), item.qty.toString(), formatCurrencyPDF(netPrice), formatCurrencyPDF(netPrice * item.qty)];
                    });
                    colStyles = { 0: { cellWidth: 'auto' }, 1: { halign: 'center', cellWidth: 20 }, 2: { halign: 'right', cellWidth: 30 }, 3: { halign: 'right', cellWidth: 30 } };
                }

                doc.autoTable({
                    startY: 104,
                    head: tableHead,
                    body: tableData,
                    theme: 'striped',
                    headStyles: { fillColor: brandColor, fontSize: 9, fontStyle: 'bold', cellPadding: 4 },
                    bodyStyles: { fontSize: 9, cellPadding: 4, overflow: 'linebreak' },
                    columnStyles: colStyles,
                    tableWidth: 180,
                    margin: { left: 15, right: 15 }
                });

                // Summary
                const finalY = doc.lastAutoTable.finalY + 12;

                let summaryOffset = 0;

                if (includeGST) {
                    doc.setFontSize(11);
                    doc.setTextColor(80);
                    doc.text('Subtotal:', 135, finalY);
                    doc.setTextColor(30);
                    doc.setFont('helvetica', 'bold');
                    doc.text(formatCurrencyPDF(subtotal), 195, finalY, { align: 'right' });

                    doc.setFont('helvetica', 'normal');
                    doc.setTextColor(80);
                    doc.text('GST (' + CONFIG.GST_RATE + '%):', 135, finalY + 8);
                    doc.setTextColor(30);
                    doc.setFont('helvetica', 'bold');
                    doc.text(formatCurrencyPDF(gst), 195, finalY + 8, { align: 'right' });

                    let totalLineY = finalY + 13;
                    let totalLabelY = finalY + 20;

                    if (discountAmount > 0) {
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(11);
                        doc.setTextColor(80);
                        doc.text('Gross Total:', 135, finalY + 16);
                        doc.setTextColor(30);
                        doc.setFont('helvetica', 'bold');
                        doc.text(formatCurrencyPDF(grossTotal), 195, finalY + 16, { align: 'right' });

                        doc.setFont('helvetica', 'normal');
                        doc.setTextColor(220, 38, 38);
                        const discLabel = discountType === 'percentage' ? 'Discount (' + discountValue + '%):' : 'Discount:';
                        doc.text(discLabel, 135, finalY + 24);
                        doc.setFont('helvetica', 'bold');
                        doc.text('- ' + formatCurrencyPDF(discountAmount), 195, finalY + 24, { align: 'right' });

                        totalLineY = finalY + 29;
                        totalLabelY = finalY + 36;
                    }

                    doc.setDrawColor(...brandColor);
                    doc.setLineWidth(0.5);
                    doc.line(120, totalLineY, 195, totalLineY);

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(14);
                    doc.setTextColor(...brandColor);
                    doc.text(discountAmount > 0 ? 'Amount Payable:' : 'Grand Total:', 120, totalLabelY);
                    doc.setTextColor(16, 185, 129);
                    doc.text(formatCurrencyPDF(grandTotal), 195, totalLabelY, { align: 'right' });
                    summaryOffset = (totalLabelY - finalY) + 8;
                } else {
                    let noGstOffset = 0;
                    if (discountAmount > 0) {
                        doc.setFontSize(11);
                        doc.setTextColor(80);
                        doc.text('Gross Total:', 135, finalY);
                        doc.setTextColor(30);
                        doc.setFont('helvetica', 'bold');
                        doc.text(formatCurrencyPDF(grossTotal), 195, finalY, { align: 'right' });

                        doc.setFont('helvetica', 'normal');
                        doc.setTextColor(220, 38, 38);
                        const discLabel = discountType === 'percentage' ? 'Discount (' + discountValue + '%):' : 'Discount:';
                        doc.text(discLabel, 135, finalY + 8);
                        doc.setFont('helvetica', 'bold');
                        doc.text('- ' + formatCurrencyPDF(discountAmount), 195, finalY + 8, { align: 'right' });
                        noGstOffset = 16;
                    }

                    doc.setDrawColor(...brandColor);
                    doc.setLineWidth(0.5);
                    doc.line(120, finalY + noGstOffset - 2, 195, finalY + noGstOffset - 2);

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(14);
                    doc.setTextColor(...brandColor);
                    doc.text(discountAmount > 0 ? 'Amount Payable:' : 'Total:', 125, finalY + noGstOffset + 6);
                    doc.setTextColor(16, 185, 129);
                    doc.text(formatCurrencyPDF(grandTotal), 195, finalY + noGstOffset + 6, { align: 'right' });
                    summaryOffset = noGstOffset + 14;
                }

                // Terms & Conditions - combine selected standard terms + free-text notes
                const allTermLines = [
                    ...selectedTerms.map(t => t.text),
                    ...(notes ? notes.split('\n').filter(l => l.trim()) : [])
                ];
                let notesEndY = finalY + summaryOffset;
                if (allTermLines.length > 0) {
                    const notesStartY = finalY + summaryOffset + 4;
                    doc.setTextColor(...brandColor);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10);
                    doc.text('Terms & Conditions:', 15, notesStartY);
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(9);
                    doc.setTextColor(60);
                    let bulletY = notesStartY + 7;
                    allTermLines.forEach(line => {
                        if (bulletY > 270) { doc.addPage(); bulletY = 20; }
                        const wrapped = doc.splitTextToSize(line.trim(), 165);
                        doc.text('\u2022', 17, bulletY);
                        doc.text(wrapped, 22, bulletY);
                        bulletY += wrapped.length * 4.5 + 2;
                    });
                    notesEndY = bulletY;
                }

                // Footer
                let footerY = Math.max(notesEndY + 10, 255);

                // Bank details - only on invoices
                if (type === 'invoice') {
                    doc.setDrawColor(200);
                    doc.line(15, footerY, 195, footerY);
                    footerY += 5;
                    doc.setTextColor(...brandColor);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(9);
                    doc.text('Bank Details:', 15, footerY);
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(8);
                    doc.setTextColor(60);
                    doc.text('Bank: ' + CONFIG.BANK.name + ', ' + CONFIG.BANK.branch, 15, footerY + 5);
                    doc.text('A/C No: ' + CONFIG.BANK.account + '  |  IFSC: ' + CONFIG.BANK.ifsc, 15, footerY + 10);
                    doc.text('UPI: ' + CONFIG.UPI_ID, 15, footerY + 15);

                    // UPI logo + QR code on the right
                    try {
                        doc.addImage(CONFIG.UPI_LOGO, 'PNG', 148, footerY + 2, 12, 12);
                        const qrDataUrl = generateUPIQR(grandTotal, brand.name);
                        doc.addImage(qrDataUrl, 'PNG', 163, footerY - 2, 30, 30);
                        doc.setFontSize(7);
                        doc.setTextColor(100);
                        const scanText = grandTotal && grandTotal <= 100000
                            ? 'Scan to Pay Rs. ' + Number(grandTotal).toLocaleString('en-IN')
                            : 'Scan to Pay';
                        doc.text(scanText, 178, footerY + 30, { align: 'center' });
                    } catch(e) {}

                    footerY += 34;
                }

                // Brand of MV Solutions line - for sub-brands
                if (brand.subtitle) {
                    doc.setDrawColor(200);
                    doc.line(15, footerY, 195, footerY);
                    footerY += 5;
                    doc.setTextColor(120);
                    doc.setFontSize(8);
                    doc.text(brand.name + ' is a brand of MV Solutions | GSTIN: ' + CONFIG.COMPANY.gst, 105, footerY, { align: 'center' });
                    footerY += 6;
                }

                doc.setTextColor(150);
                doc.setFontSize(8);
                doc.text('Thank you for your business!', 105, Math.min(footerY + 4, 292), { align: 'center' });

                doc.save(`${type}-${docNumber}.pdf`);

                // Save quotation to Firebase immediately (tamper-proof)
                const isEditing = editingDoc && editingDoc.firebaseId;

                const quotation = {
                    id: isEditing ? editingDoc.id : Date.now(),
                    number: isEditing ? editingDoc.number : docNumber,
                    type: type,
                    date: isEditing ? editingDoc.date : new Date().toISOString(),
                    customer,
                    brand: selectedBrand,
                    items: quoteItems,
                    subtotal,
                    gst,
                    grandTotal,
                    includeGST,
                    notes,
                    terms: selectedTerms,
                    status: isEditing ? editingDoc.status : 'sent',
                    discount: discountAmount > 0 ? { type: discountType, value: Number(discountValue), amount: discountAmount } : null,
                    deliveryAddress: sameAsDelivery ? null : deliveryAddress
                };

                if (isEditing) {
                    // Update existing record
                    const updateData = { ...quotation };
                    delete updateData.firebaseId;
                    const success = await FirebaseQuotations.updateQuotation(editingDoc.firebaseId, updateData);
                    if (success) {
                        quotation.firebaseId = editingDoc.firebaseId;
                        quotation.lastEditedAt = new Date().toISOString();
                        setQuotations(quotations.map(q => q.id === editingDoc.id ? quotation : q));
                        alert(`${type === 'quotation' ? 'Quotation' : 'Invoice'} ${quotation.number} updated successfully!`);
                    } else {
                        alert('Failed to update document in cloud. Try again.');
                    }
                    setEditingDoc(null);
                } else {
                    // Create new record
                    const firebaseId = await FirebaseQuotations.saveQuotation(quotation);
                    if (firebaseId) {
                        quotation.firebaseId = firebaseId;
                    }
                    setQuotations([quotation, ...quotations]);

                    if (firebaseId) {
                        alert(`${type === 'quotation' ? 'Quotation' : 'Invoice'} ${docNumber} saved & synced to cloud!`);
                    } else {
                        alert(`${type === 'quotation' ? 'Quotation' : 'Invoice'} ${docNumber} saved locally. Cloud sync failed — push to cloud manually.`);
                    }
                }
            };

            return (
                <div>
                    <div className="page-header">
                        <div>
                            <h1 className="page-title">{editingDoc ? `Edit ${editingDoc.number}` : 'Create Quotation / Invoice'}</h1>
                            <p className="page-subtitle">{editingDoc ? 'Editing saved document - save to update' : 'Build quotation with MRP, Discount & generate PDF'}</p>
                        </div>
                        {editingDoc && (
                            <button className="btn btn-secondary" onClick={() => {
                                setEditingDoc(null);
                                setCustomer({ name: '', phone: '', address: '' });
                                setDeliveryAddress({ name: '', phone: '', address: '' });
                                setSameAsDelivery(true);
                                setQuoteItems([]);
                                setNotes('');
                                setSelectedTerms([]);
                                setSelectedBrand('MV Solutions');
                                setIncludeGST(true);
                                setDiscountEnabled(false);
                                setDiscountType('percentage');
                                setDiscountValue(0);
                            }}>Cancel Edit</button>
                        )}
                    </div>

                    <div className="quote-builder">
                        <div>
                            {/* Brand Selector */}
                            <div className="card" style={{ marginBottom: '20px' }}>
                                <div className="card-header">
                                    <h3 className="card-title">Brand</h3>
                                </div>
                                <div className="card-body">
                                    <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                                        {Object.keys(CONFIG.BRANDS).map(b => {
                                            const br = CONFIG.BRANDS[b];
                                            const isActive = selectedBrand === b;
                                            return (
                                                <button key={b} onClick={() => setSelectedBrand(b)} style={{
                                                    padding: '10px 20px', borderRadius: '8px', border: isActive ? '2px solid rgb(' + br.color.join(',') + ')' : '2px solid #e2e8f0',
                                                    background: isActive ? 'rgba(' + br.color.join(',') + ', 0.1)' : '#fff',
                                                    color: isActive ? 'rgb(' + br.color.join(',') + ')' : '#64748b',
                                                    fontWeight: isActive ? '700' : '500', cursor: 'pointer', transition: 'all 0.2s',
                                                    fontSize: '14px', display: 'flex', alignItems: 'center', gap: '8px'
                                                }}>
                                                    <span style={{ width: '12px', height: '12px', borderRadius: '50%', background: 'rgb(' + br.color.join(',') + ')', display: 'inline-block' }}></span>
                                                    {b}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            {/* Customer */}
                            <div className="card" style={{ marginBottom: '20px' }}>
                                <div className="card-header">
                                    <h3 className="card-title">Customer Details</h3>
                                </div>
                                <div className="card-body">
                                    <div className="form-row">
                                        <div className="form-group">
                                            <label className="form-label">Customer Name <span>*</span></label>
                                            <input type="text" className="form-input" placeholder="Enter customer name" value={customer.name} onChange={e => setCustomer({ ...customer, name: e.target.value })} />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Phone</label>
                                            <input type="text" className="form-input" placeholder="Enter phone" value={customer.phone} onChange={e => setCustomer({ ...customer, phone: e.target.value })} />
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Address</label>
                                        <textarea className="form-textarea" rows="2" placeholder="Enter address" value={customer.address} onChange={e => setCustomer({ ...customer, address: e.target.value })} />
                                    </div>
                                    <div className="form-group" style={{ marginTop: '8px' }}>
                                        <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', fontSize: '13px' }}>
                                            <input type="checkbox" checked={sameAsDelivery} onChange={e => setSameAsDelivery(e.target.checked)} />
                                            Delivery address same as billing
                                        </label>
                                    </div>
                                    {!sameAsDelivery && (
                                        <div style={{ marginTop: '12px', padding: '16px', background: 'var(--bg)', borderRadius: '8px', border: '1px dashed var(--border)' }}>
                                            <h4 style={{ fontSize: '13px', color: 'var(--primary)', marginBottom: '12px' }}>Delivery / Shipping Address</h4>
                                            <div className="form-row">
                                                <div className="form-group">
                                                    <label className="form-label">Delivery Name</label>
                                                    <input type="text" className="form-input" placeholder="Recipient name" value={deliveryAddress.name} onChange={e => setDeliveryAddress({ ...deliveryAddress, name: e.target.value })} />
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label">Delivery Phone</label>
                                                    <input type="text" className="form-input" placeholder="Recipient phone" value={deliveryAddress.phone} onChange={e => setDeliveryAddress({ ...deliveryAddress, phone: e.target.value })} />
                                                </div>
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Delivery Address</label>
                                                <textarea className="form-textarea" rows="2" placeholder="Enter delivery address" value={deliveryAddress.address} onChange={e => setDeliveryAddress({ ...deliveryAddress, address: e.target.value })} />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Products */}
                            <div className="card" style={{ marginBottom: '20px' }}>
                                <div className="card-header">
                                    <h3 className="card-title">Products</h3>
                                </div>
                                <div className="card-body">
                                    <div className="product-selector">
                                        <select className="form-select" value={selectedProduct} onChange={e => setSelectedProduct(e.target.value)}>
                                            <option value="">Select a product...</option>
                                            {products.map(p => {
                                                const makingCost = calculateMakingCost(p, items, products, bom, subProducts);
                                                const mrp = getMRP(p, makingCost);
                                                return (
                                                    <option key={p.sku} value={p.sku}>
                                                        {p.sku} - {p.name} (MRP: {formatCurrency(mrp)})
                                                    </option>
                                                );
                                            })}
                                        </select>
                                        <button className="btn btn-primary" onClick={addItem}><Icons.Plus /> Add</button>
                                        <button className="btn btn-secondary" onClick={addCustomItem} title="Add custom line item"><Icons.Plus /> Custom Item</button>
                                    </div>

                                    {hasWarning && (
                                        <div className="alert alert-warning">
                                            ⚠️ Warning: Some items are priced below minimum selling price!
                                        </div>
                                    )}

                                    {quoteItems.length === 0 ? (
                                        <div className="empty-state">
                                            <Icons.Box />
                                            <h3>No products added</h3>
                                            <p>Select products from dropdown above</p>
                                        </div>
                                    ) : (
                                        <>

                                            {quoteItems.map((item, index) => {
                                                const netPrice = calculateNetPrice(item);
                                                const isBelowMin = item.minPrice > 0 && netPrice < item.minPrice;
                                                return (
                                                    <div className="quote-item" key={index} style={isBelowMin ? { background: '#FEE2E2' } : {}}>
                                                        <div className="quote-item-row1">
                                                            <div className="quote-item-name">
                                                                <textarea className="form-textarea" value={item.name} placeholder="Enter product name..." onChange={e => updateItem(index, 'name', e.target.value)} rows="2" style={{ fontSize: '14px', padding: '8px 10px', width: '100%', fontWeight: '500', resize: 'vertical', minHeight: '44px' }} />
                                                                <input className="form-input" value={item.description || ''} placeholder="Description (optional)" onChange={e => updateItem(index, 'description', e.target.value)} style={{ fontSize: '12px', padding: '4px 10px', marginTop: '4px', color: 'var(--text-muted)' }} />
                                                                <small>{item.sku !== 'CUSTOM' ? (item.sku + ' | Min: ' + formatCurrency(item.minPrice)) : 'Custom Item'}</small>
                                                            </div>
                                                            <button className="btn btn-danger btn-sm btn-icon" onClick={() => removeItem(index)} style={{ marginTop: '4px' }}><Icons.X /></button>
                                                        </div>
                                                        <div className="quote-item-row2">
                                                            <div><label>Qty</label><input type="number" className="form-input small" value={item.qty} min="1" onChange={e => updateItem(index, 'qty', e.target.value)} style={{ textAlign: 'center' }} /></div>
                                                            <div><label>MRP (₹)</label><input type="number" className="form-input small" value={item.mrp} min="0" step="100" onChange={e => updateItem(index, 'mrp', e.target.value)} style={{ textAlign: 'right' }} /></div>
                                                            <div><label>Disc %</label><input type="number" className="form-input small" value={item.discount} min="0" max="100" onChange={e => updateItem(index, 'discount', e.target.value)} style={{ textAlign: 'center' }} /></div>
                                                            <div><label>Net Price</label><div className={'price ' + (isBelowMin ? 'red' : 'green')} style={{ padding: '6px 0' }}>{formatCurrency(netPrice)}</div></div>
                                                            <div><label>Total</label><div className="price green" style={{ padding: '6px 0' }}>{formatCurrency(netPrice * item.qty)}</div></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </>
                                    )}

                                    <div className="form-group" style={{ marginTop: '16px' }}>
                                        <label className="form-label">Terms & Conditions</label>
                                        {/* Standard clause selector grouped by category */}
                                        <div style={{ border: '1px solid var(--border)', borderRadius: '8px', padding: '12px', marginBottom: '8px', maxHeight: '200px', overflowY: 'auto' }}>
                                            {Object.entries(CONFIG.STANDARD_TERMS.reduce((acc, t) => { (acc[t.category] = acc[t.category] || []).push(t); return acc; }, {})).map(([cat, terms]) => (
                                                <div key={cat} style={{ marginBottom: '8px' }}>
                                                    <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px' }}>{cat}</div>
                                                    {terms.map(term => {
                                                        const isSelected = selectedTerms.some(t => t.id === term.id);
                                                        return (
                                                            <label key={term.id} style={{ display: 'flex', alignItems: 'flex-start', gap: '8px', padding: '4px 0', cursor: 'pointer', fontSize: '13px', color: isSelected ? 'var(--text)' : 'var(--text-muted)' }}>
                                                                <input type="checkbox" checked={isSelected} onChange={() => toggleTerm(term)} style={{ marginTop: '2px', flexShrink: 0 }} />
                                                                <span>{term.text}</span>
                                                            </label>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                        {/* Selected terms - editable */}
                                        {selectedTerms.length > 0 && (
                                            <div style={{ marginBottom: '8px' }}>
                                                <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--text-muted)', marginBottom: '4px' }}>SELECTED ({selectedTerms.length}) — click to edit</div>
                                                {selectedTerms.map((t, idx) => (
                                                    <div key={t.id} style={{ display: 'flex', gap: '6px', alignItems: 'flex-start', marginBottom: '4px' }}>
                                                        <span style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '6px', flexShrink: 0 }}>{idx + 1}.</span>
                                                        <textarea className="form-textarea" rows="1" value={t.text} onChange={e => updateTermText(t.id, e.target.value)}
                                                            style={{ fontSize: '12px', flex: 1, resize: 'vertical', minHeight: '30px' }} />
                                                        <button type="button" onClick={() => removeTermById(t.id)} style={{ background: 'none', border: 'none', color: 'var(--danger)', cursor: 'pointer', fontSize: '16px', flexShrink: 0, padding: '4px' }}>×</button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {/* Custom term */}
                                        <div style={{ display: 'flex', gap: '6px' }}>
                                            <input className="form-input" value={customTerm} onChange={e => setCustomTerm(e.target.value)} placeholder="Add custom condition..."
                                                onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addCustomTerm(); } }}
                                                style={{ flex: 1, fontSize: '12px' }} />
                                            <button type="button" className="btn btn-sm" onClick={addCustomTerm} style={{ flexShrink: 0 }}>+ Add</button>
                                        </div>
                                        {/* Legacy free-text notes */}
                                        <textarea className="form-textarea" rows="2" placeholder="Additional notes (optional)..." value={notes} onChange={e => setNotes(e.target.value)} style={{ marginTop: '8px', fontSize: '12px' }} />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Summary */}
                        <div className="quote-summary">
                            <div className="card">
                                <div className="card-header">
                                    <h3 className="card-title">Summary</h3>
                                </div>
                                <div className="card-body">
                                    <div className="summary-row">
                                        <span className="label">Items</span>
                                        <span className="value">{quoteItems.length}</span>
                                    </div>
                                    <div className="summary-row">
                                        <span className="label">Subtotal</span>
                                        <span className="value">{formatCurrency(subtotal)}</span>
                                    </div>
                                    <div className="summary-row" style={{ alignItems: 'center' }}>
                                        <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', fontSize: '14px', color: 'var(--text-muted)' }}>
                                            <span style={{
