                                                <div style={{ fontWeight: 600 }}>{txn.itemName}</div>
                                                <div className="stock-card-code">{txn.itemCode}</div>
                                            </span>
                                            <span>
                                                <div className="txn-reason">{(INVENTORY_REASONS.IN.concat(INVENTORY_REASONS.OUT)).find(r => r.key === txn.reason)?.label || txn.reason}</div>
                                                {txn.reference && <div className="txn-ref">{txn.reference}</div>}
                                            </span>
                                            <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                                {txn.vendor && <div>{txn.vendor}</div>}
                                                {txn.billNumber && <div>Bill: {txn.billNumber}</div>}
                                                {txn.cost > 0 && <div>{formatCurrency(txn.cost)}/unit</div>}
                                                {txn.notes && <div>{txn.notes}</div>}
                                            </span>
                                            <button className="btn btn-secondary btn-sm btn-icon" onClick={() => handleOpenEdit(txn)} title="Edit" style={{ marginRight: '4px' }}>
                                                <Icons.Edit />
                                            </button>
                                            <button className="btn btn-danger btn-sm btn-icon" onClick={() => handleDeleteTxn(txn.id)} title="Delete">
                                                <Icons.Trash />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Add / Edit Stock Modal */}
                    <Modal isOpen={showAddModal} onClose={() => { setShowAddModal(false); setEditingTxn(null); setForm({ itemCode: '', qty: '', reason: '', vendor: '', cost: '', billNumber: '', reference: '', notes: '', transactionDate: new Date().toISOString().split('T')[0] }); }}
                        title={editingTxn ? `Edit Transaction (${addType === 'IN' ? 'Stock In' : 'Stock Out'})` : addType === 'IN' ? 'Stock In' : 'Stock Out'} size=""
                        footer={editingTxn
                            ? <button className="btn btn-primary" onClick={handleSaveEdit} disabled={!form.qty || !form.reason}>Save Changes</button>
                            : <button className="btn btn-primary" onClick={handleAddTransaction} disabled={!form.itemCode || !form.qty || !form.reason}>Save</button>
                        }>
                        <div className="inv-form-grid">
                            <div className="form-group full-width">
                                <label className="form-label">Item * (only registered items)</label>
                                {editingTxn ? (
                                    <input className="form-input" value={`${editingTxn.itemCode} — ${editingTxn.itemName}`} disabled style={{ background: 'var(--bg)', color: 'var(--text-muted)' }} />
                                ) : (
                                    <SearchableSelect
                                        options={items}
                                        value={form.itemCode}
                                        onChange={val => setForm({ ...form, itemCode: val })}
                                        placeholder="Search items by name or code..."
                                        renderOption={(i) => {
                                            const avail = stock[i.code]?.current || 0;
                                            return `${i.code} - ${i.name}${addType === 'OUT' ? ` [Stock: ${avail}]` : ''}`;
                                        }}
                                    />
                                )}
                            </div>
                            <div className="form-group">
                                <label className="form-label">Quantity *</label>
                                <input type="number" className="form-input" min="1" value={form.qty} onChange={e => setForm({ ...form, qty: e.target.value })}
                                    placeholder={addType === 'OUT' && form.itemCode ? `Max: ${stock[form.itemCode]?.current || 0}` : 'Qty'} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Transaction Date</label>
                                <input type="date" className="form-input" value={form.transactionDate} max={new Date().toISOString().split('T')[0]}
                                    onChange={e => setForm({ ...form, transactionDate: e.target.value })} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Reason *</label>
                                <select className="form-input" value={form.reason} onChange={e => setForm({ ...form, reason: e.target.value })}>
                                    <option value="">Select Reason...</option>
                                    {INVENTORY_REASONS[addType].filter(r => !r.auto).map(r => <option key={r.key} value={r.key}>{r.label}</option>)}
                                </select>
                            </div>
                            {addType === 'IN' && form.reason === 'PURCHASE' && (
                                <>
                                    <div className="form-group">
                                        <label className="form-label">Vendor</label>
                                        <input className="form-input" value={form.vendor} onChange={e => setForm({ ...form, vendor: e.target.value })} placeholder="Vendor name" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Cost per unit</label>
                                        <input type="number" className="form-input" value={form.cost} onChange={e => setForm({ ...form, cost: e.target.value })} placeholder="0" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Bill Number</label>
                                        <input className="form-input" value={form.billNumber} onChange={e => setForm({ ...form, billNumber: e.target.value })} placeholder="INV-2026-001" />
                                    </div>
                                </>
                            )}
                            <div className="form-group full-width">
                                <label className="form-label">Reference</label>
                                <input className="form-input" value={form.reference} onChange={e => setForm({ ...form, reference: e.target.value })}
                                    placeholder={addType === 'OUT' ? 'e.g., QT-0045, Lab testing, Client demo' : 'e.g., PO number, supplier ref'} />
                            </div>
                            <div className="form-group full-width">
                                <label className="form-label">Notes</label>
                                <input className="form-input" value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} placeholder="Optional notes..." />
                            </div>
                            {addType === 'OUT' && form.itemCode && (
                                <div className="full-width" style={{ padding: '10px', background: 'var(--bg)', borderRadius: '8px', fontSize: '13px' }}>
                                    Available: <strong>{stock[form.itemCode]?.current || 0}</strong>
                                    {form.qty && <span> | After this: <strong style={{ color: (stock[form.itemCode]?.current || 0) - Number(form.qty) < 0 ? 'var(--danger)' : 'var(--success)' }}>
                                        {(stock[form.itemCode]?.current || 0) - Number(form.qty)}
                                    </strong></span>}
                                </div>
                            )}
                        </div>
                    </Modal>

                    {/* Build Product Modal */}
                    <Modal isOpen={showProductionModal} onClose={() => { setShowProductionModal(false); setBomCheck([]); setProdError(''); }}
                        title="Build Product (Production)" size=""
                        footer={
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button className="btn btn-secondary" onClick={handleCheckBOM} disabled={!prodForm.productSKU}>Check BOM</button>
                                <button className="btn btn-primary" onClick={handleProduction}
                                    disabled={!prodForm.productSKU || bomCheck.length === 0 || bomCheck.some(c => !c.sufficient)}>
                                    Build
                                </button>
                            </div>
                        }>
                        <div className="inv-form-grid">
                            <div className="form-group full-width">
                                <label className="form-label">Product *</label>
                                <SearchableSelect
                                    options={products}
                                    value={prodForm.productSKU}
                                    onChange={val => { setProdForm({ ...prodForm, productSKU: val }); setBomCheck([]); setProdError(''); }}
                                    placeholder="Search products by name or SKU..."
                                    renderOption={(p) => `${p.sku} - ${p.name}`}
                                />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Quantity to Build *</label>
                                <input type="number" className="form-input" min="1" value={prodForm.qty}
                                    onChange={e => { setProdForm({ ...prodForm, qty: e.target.value }); setBomCheck([]); }} />
                            </div>
                        </div>
                        {bomCheck.length > 0 && (
                            <div className="prod-check" style={{ marginTop: '16px' }}>
                                <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '4px' }}>BOM Check:</div>
                                {bomCheck.map(c => (
                                    <div key={c.itemCode} className={`prod-check-row ${c.sufficient ? 'ok' : 'short'}`}>
                                        <span style={{ flex: 1 }}>{c.itemName}</span>
                                        <span style={{ width: '80px' }}>Need: {c.needed}</span>
                                        <span style={{ width: '80px' }}>Have: {c.available}</span>
                                        {!c.sufficient && <span style={{ color: 'var(--danger)', fontWeight: 700 }}>Short: {c.shortage}</span>}
                                        {c.sufficient && <span style={{ color: 'var(--success)', fontWeight: 700 }}>OK</span>}
                                    </div>
                                ))}
                                {prodError && <div style={{ color: 'var(--danger)', fontSize: '13px', fontWeight: 600, marginTop: '4px' }}>{prodError}</div>}
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        // ============ SITE INSPECTION ============
        const TANK_MATERIALS = ['Concrete', 'Plastic (HDPE)', 'Stainless Steel', 'Mild Steel', 'FRP', 'Other'];
        const TANK_TYPES = ['Overhead', 'Underground', 'Ground Level'];
        const MONITORING_OPTIONS = ['Water Level', 'Temperature', 'Flow', 'Pressure'];
        const ALERT_OPTIONS = ['Overflow', 'Low Level', 'Dry Run', 'Leak Detection'];
        const INSPECTION_STATUSES = ['pending_quote', 'quoted', 'closed'];

        const emptyTank = () => ({ label: '', type: 'Overhead', material: 'Concrete', height: '', capacity: '', photos: [], wireRouting: '', wireNotes: '' });

        const INSP_DRAFT_KEY = 'mvs_inspection_draft';

        const SiteInspection = ({ products }) => {
            const [view, setView] = useState('list'); // 'list' | 'form' | 'detail'
            const [inspections, setInspections] = useState([]);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [draftSaved, setDraftSaved] = useState(false);
            const [selectedInsp, setSelectedInsp] = useState(null);
            const [step, setStep] = useState(0);

            // Form state
            const emptyForm = () => ({
                customerName: '', contactPerson: '', phone: '',
                gps: null, address: '',
                propertyType: '', numBuildings: '', numFloors: '',
                tanks: [emptyTank()],
                clustered: 'Clustered (<50m)',
                power: 'Yes', wifi: 'Yes',
                controlRoomDistance: '',
                siteConditionPhotos: [],
                siteExtraDetails: '',
                monitoring: ['Water Level'],
                alerts: ['Overflow', 'Low Level'],
                valveControl: false, valveControlDesc: '',
                submersiblePumpControl: false, submersiblePumpDesc: '',
                singlePhaseMotorControl: false, singlePhaseMotorDesc: '',
                pumpAutomation: 'No', pumpCount: '',
                suggestedProducts: [],
                notes: '',
                nextAction: '', nextFollowupDate: '',
                referenceSource: '',
                inspectedBy: '',
                status: 'pending_quote'
            });
            const [form, setForm] = useState(emptyForm());

            // Draft helpers
            const hasDraft = () => { try { return !!localStorage.getItem(INSP_DRAFT_KEY); } catch { return false; } };
            const loadDraft = () => { try { return JSON.parse(localStorage.getItem(INSP_DRAFT_KEY)); } catch { return null; } };
            const saveDraft = (data) => { try { localStorage.setItem(INSP_DRAFT_KEY, JSON.stringify({ ...data, _draftSavedAt: new Date().toISOString() })); } catch {} };
            const clearDraft = () => { try { localStorage.removeItem(INSP_DRAFT_KEY); } catch {} };

            // Auto-save draft whenever form changes (only while in form view)
            useEffect(() => {
                if (view === 'form') {
                    saveDraft(form);
                    setDraftSaved(true);
                    const t = setTimeout(() => setDraftSaved(false), 2000);
                    return () => clearTimeout(t);
                }
            }, [form, view]);

            const startNewInspection = () => {
                if (hasDraft()) {
                    const draft = loadDraft();
                    const name = draft?.customerName || 'unnamed';
                    const savedAt = draft?._draftSavedAt ? new Date(draft._draftSavedAt).toLocaleTimeString() : '';
                    const resume = confirm(`You have a saved draft for "${name}" (saved at ${savedAt}).\n\nTap OK to resume draft, or Cancel to start fresh.`);
                    if (resume) {
                        setForm(draft);
                    } else {
                        clearDraft();
                        setForm(emptyForm());
                    }
                } else {
                    setForm(emptyForm());
                }
                setStep(0);
                setView('form');
            };

            const handleCancel = () => {
                if (form.customerName || form.inspectedBy) {
                    const keep = confirm('Keep this as a draft to continue later?\n\nOK = Save draft\nCancel = Discard and go back');
                    if (keep) {
                        saveDraft(form);
                        alert('Draft saved. You can resume it next time.');
                    } else {
                        clearDraft();
                    }
                } else {
                    clearDraft();
                }
                setView('list');
            };

            const handleManualSaveDraft = () => {
                saveDraft(form);
                alert('Draft saved to this device.');
            };

            useEffect(() => {
                FirebaseInspections.getAllInspections().then(data => {
                    setInspections(data);
                    setLoading(false);
                });
            }, []);

            // GPS capture
            const captureGPS = () => {
                if (!navigator.geolocation) { alert('GPS not supported on this device.'); return; }
                navigator.geolocation.getCurrentPosition(
                    pos => setForm(f => ({ ...f, gps: { lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6), accuracy: Math.round(pos.coords.accuracy) } })),
                    err => alert('Could not get GPS: ' + err.message),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            };

            // Camera trigger — captures filename only, photo stays on phone
            const triggerCamera = (onCapture) => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.capture = 'environment';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (file) {
                        onCapture({ filename: file.name, takenAt: new Date().toISOString() });
                    }
                    input.value = '';
                };
                input.click();
            };

            // Tank helpers
            const addTank = () => setForm(f => ({ ...f, tanks: [...f.tanks, emptyTank()] }));
            const removeTank = idx => setForm(f => ({ ...f, tanks: f.tanks.filter((_, i) => i !== idx) }));
            const updateTank = (idx, field, val) => setForm(f => {
                const tanks = [...f.tanks];
                tanks[idx] = { ...tanks[idx], [field]: val };
                return { ...f, tanks };
            });
            const addTankPhoto = (idx) => {
                triggerCamera(photo => {
                    setForm(f => {
                        const tanks = [...f.tanks];
                        tanks[idx] = { ...tanks[idx], photos: [...(tanks[idx].photos || []), photo] };
                        return { ...f, tanks };
                    });
                });
            };

            // Checklist toggle
            const toggleCheck = (field, val) => {
                setForm(f => {
                    const arr = f[field] || [];
                    return { ...f, [field]: arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val] };
                });
            };

            // Product multi-select
            const toggleProduct = (sku) => {
                setForm(f => {
                    const arr = f.suggestedProducts || [];
                    return { ...f, suggestedProducts: arr.includes(sku) ? arr.filter(x => x !== sku) : [...arr, sku] };
                });
            };

            const handleSave = async () => {
                if (!form.customerName || !form.inspectedBy) { alert('Customer name and Inspected By are required.'); return; }
                setSaving(true);
                const { _draftSavedAt, ...formData } = form;
                const id = await FirebaseInspections.saveInspection({ ...formData, id: Date.now() });
                if (id) {
                    clearDraft();
                    const saved = { ...formData, id: Date.now(), firebaseId: id, createdAt: new Date().toISOString() };
                    setInspections(prev => [saved, ...prev]);
                    setForm(emptyForm());
                    setStep(0);
                    setView('list');
                    alert('Inspection submitted to Firebase!');
                } else {
                    alert('Submit failed. Check internet connection.\n\nYour data is still saved as a draft on this device.');
                }
                setSaving(false);
            };

            const handleStatusChange = async (insp, newStatus) => {
                if (insp.firebaseId) await FirebaseInspections.updateStatus(insp.firebaseId, newStatus);
                setInspections(prev => prev.map(i => i.firebaseId === insp.firebaseId ? { ...i, status: newStatus } : i));
                if (selectedInsp?.firebaseId === insp.firebaseId) setSelectedInsp(s => ({ ...s, status: newStatus }));
            };

            const handleDelete = async (insp) => {
                const pwd = prompt('Enter admin password to delete this inspection:');
                if (!pwd) return;
                if (pwd !== 'admin123') { alert('Incorrect password.'); return; }
                if (!confirm('Delete this inspection permanently?')) return;
                if (insp.firebaseId) await FirebaseInspections.deleteInspection(insp.firebaseId);
                setInspections(prev => prev.filter(i => i.firebaseId !== insp.firebaseId));
                setView('list');
                setSelectedInsp(null);
            };

            const statusLabel = s => ({ pending_quote: 'Pending Quote', quoted: 'Quoted', closed: 'Closed' }[s] || s);
            const statusClass = s => ({ pending_quote: 'insp-status-pending', quoted: 'insp-status-quoted', closed: 'insp-status-closed' }[s] || '');

            const STEPS = ['Customer', 'Tanks', 'Site', 'Requirements', 'Recommend'];

            // ---- RENDER: LIST ----
            if (view === 'list') return (
                <div>
                    <div className="page-header">
                        <div>
                            <h1 className="page-title">Site Inspections</h1>
                            <p className="page-subtitle">Field inspection forms — saved to Firebase instantly</p>
                        </div>
                        <button className="btn btn-primary" onClick={startNewInspection}>
                            <Icons.Plus /> New Inspection
                        </button>
                    </div>

                    {hasDraft() && (() => { const d = loadDraft(); return (
                        <div style={{ background: '#FEF3C7', border: '1px solid #FDE68A', borderRadius: '10px', padding: '12px 16px', marginBottom: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px', flexWrap: 'wrap' }}>
                            <div>
                                <strong style={{ color: '#92400E' }}>Draft in progress</strong>
                                <span style={{ color: '#92400E', fontSize: '13px', marginLeft: '8px' }}>
                                    {d?.customerName ? `"${d.customerName}"` : 'Unnamed'}{d?._draftSavedAt ? ` · saved ${new Date(d._draftSavedAt).toLocaleTimeString()}` : ''}
                                </span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button className="btn btn-primary btn-sm" onClick={startNewInspection}>Resume Draft</button>
                                <button className="btn btn-danger btn-sm" onClick={() => { if (confirm('Discard draft?')) { clearDraft(); setInspections(prev => [...prev]); } }}>Discard</button>
                            </div>
                        </div>
                    ); })()}

                    {loading ? (
                        <div className="card" style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>Loading from Firebase...</div>
                    ) : inspections.length === 0 ? (
                        <div className="card" style={{ textAlign: 'center', padding: '60px 20px' }}>
                            <Icons.Clipboard />
                            <h3 style={{ marginTop: '16px' }}>No inspections yet</h3>
                            <p style={{ color: 'var(--text-muted)', marginBottom: '20px' }}>Tap "New Inspection" to start a site visit form</p>
                            <button className="btn btn-primary" onClick={startNewInspection}>
                                <Icons.Plus /> Start First Inspection
                            </button>
                        </div>
                    ) : (
                        <div>
                            {inspections.map(insp => (
                                <div key={insp.firebaseId || insp.id} className="insp-card" onClick={() => { setSelectedInsp(insp); setView('detail'); }}>
                                    <div className="insp-card-header">
                                        <div>
                                            <div className="insp-card-name">{insp.customerName}</div>
                                            <div className="insp-card-meta">
                                                {insp.contactPerson && <span>{insp.contactPerson} · </span>}
                                                {insp.phone && <span>{insp.phone} · </span>}
                                                {insp.propertyType && <span>{insp.propertyType} · </span>}{insp.tanks?.length || 0} tanks · {insp.inspectedBy}
                                            </div>
                                            {insp.address && <div className="insp-card-meta" style={{ marginTop: '2px' }}>{insp.address}</div>}
                                        </div>
                                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '6px' }}>
                                            <span className={`status-badge ${statusClass(insp.status)}`}>{statusLabel(insp.status)}</span>
                                            <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{insp.createdAt ? formatDate(insp.createdAt) : ''}</span>
                                        </div>
                                    </div>
                                    <div style={{ display: 'flex', gap: '16px', fontSize: '12px', color: 'var(--text-muted)' }}>
                                        {insp.monitoring?.length > 0 && <span>📊 {insp.monitoring.join(', ')}</span>}
                                        {insp.suggestedProducts?.length > 0 && <span>🛒 {insp.suggestedProducts.length} product(s) suggested</span>}
                                        {insp.gps && <span>📍 GPS captured</span>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            // ---- RENDER: DETAIL ----
            if (view === 'detail' && selectedInsp) return (
                <div>
                    <div className="page-header">
                        <div>
                            <button className="btn btn-secondary btn-sm" onClick={() => setView('list')} style={{ marginBottom: '8px' }}>← Back</button>
                            <h1 className="page-title">{selectedInsp.customerName}</h1>
                            <p className="page-subtitle">{selectedInsp.address} · {formatDate(selectedInsp.createdAt)} · By {selectedInsp.inspectedBy}</p>
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            <select className="form-select" style={{ width: 'auto' }} value={selectedInsp.status}
                                onChange={e => handleStatusChange(selectedInsp, e.target.value)}>
                                {INSPECTION_STATUSES.map(s => <option key={s} value={s}>{statusLabel(s)}</option>)}
                            </select>
                            <button className="btn btn-danger btn-sm" onClick={() => handleDelete(selectedInsp)}>
                                <Icons.Trash /> Delete
                            </button>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                        {/* Customer */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Customer Info</h3></div>
                            <div className="card-body" style={{ fontSize: '14px' }}>
                                <div><strong>Customer:</strong> {selectedInsp.customerName}</div>
                                <div><strong>Contact:</strong> {selectedInsp.contactPerson || '—'}</div>
                                <div><strong>Phone:</strong> {selectedInsp.phone ? <a href={`tel:${selectedInsp.phone}`}>{selectedInsp.phone}</a> : '—'}</div>
                                <div><strong>Address:</strong> {selectedInsp.address || '—'}</div>
                                {selectedInsp.referenceSource && <div style={{ marginTop: '6px' }}><strong>Reference:</strong> {selectedInsp.referenceSource}</div>}
                                {selectedInsp.propertyType && <div style={{ marginTop: '6px' }}><strong>Property Type:</strong> {selectedInsp.propertyType}{selectedInsp.numBuildings ? ` · ${selectedInsp.numBuildings} buildings` : ''}{selectedInsp.numFloors ? `, ${selectedInsp.numFloors} floors` : ''}</div>}
                                {selectedInsp.gps ? (
                                    <div className="gps-box" style={{ marginTop: '10px' }}>
                                        <Icons.MapPin />
                                        <span>GPS: {selectedInsp.gps.lat}, {selectedInsp.gps.lng} (±{selectedInsp.gps.accuracy}m)</span>
                                        <a href={`https://maps.google.com/?q=${selectedInsp.gps.lat},${selectedInsp.gps.lng}`} target="_blank" rel="noreferrer"
                                            style={{ marginLeft: 'auto', color: 'var(--primary)', fontSize: '12px' }}>Open Map</a>
                                    </div>
                                ) : <div style={{ color: 'var(--text-muted)', fontSize: '12px', marginTop: '6px' }}>No GPS captured</div>}
                            </div>
                        </div>

                        {/* Site Conditions */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Site Conditions</h3></div>
                            <div className="card-body" style={{ fontSize: '14px' }}>
                                <div><strong>Tank Layout:</strong> {selectedInsp.clustered}</div>
                                <div><strong>Power Available:</strong> {selectedInsp.power}</div>
                                <div><strong>WiFi Available:</strong> {selectedInsp.wifi}</div>
                                <div><strong>Control Room Distance:</strong> {selectedInsp.controlRoomDistance ? selectedInsp.controlRoomDistance + ' meters' : '—'}</div>
                                <div><strong>Pump Automation:</strong> {selectedInsp.pumpAutomation}{selectedInsp.pumpCount ? ` (${selectedInsp.pumpCount} pumps)` : ''}</div>
                            </div>
                        </div>

                        {/* Tanks */}
                        <div className="card" style={{ gridColumn: '1 / -1' }}>
                            <div className="card-header"><h3 className="card-title">Tanks ({selectedInsp.tanks?.length || 0})</h3></div>
                            <div className="table-container">
                                <table>
                                    <thead><tr><th>Label</th><th>Type</th><th>Material</th><th>H/D (ft)</th><th>Capacity</th><th>Wire Routing</th><th>Notes</th><th>Photos</th></tr></thead>
                                    <tbody>
                                        {(selectedInsp.tanks || []).map((t, i) => (
                                            <tr key={i}>
                                                <td><strong>{t.label || `Tank ${i+1}`}</strong></td>
                                                <td>{t.type}</td>
                                                <td>{t.material}</td>
                                                <td>{t.height || '—'}</td>
                                                <td>{t.capacity ? Number(t.capacity).toLocaleString() + ' L' : '—'}</td>
                                                <td>{t.wireRouting || '—'}</td>
                                                <td>{t.wireNotes || '—'}</td>
                                                <td>{t.photos?.length > 0 ? <span style={{ color: 'var(--success)' }}>📷 {t.photos.length}</span> : <span style={{ color: 'var(--text-muted)' }}>—</span>}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Requirements */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Requirements</h3></div>
                            <div className="card-body" style={{ fontSize: '14px' }}>
                                <div><strong>Monitor:</strong> {selectedInsp.monitoring?.join(', ') || '—'}</div>
                                <div style={{ marginTop: '6px' }}><strong>Alerts:</strong> {selectedInsp.alerts?.join(', ') || '—'}</div>
                                {selectedInsp.valveControl && <div style={{ marginTop: '6px' }}><strong>Valve Control:</strong> {selectedInsp.valveControlDesc || 'Yes'}</div>}
                                {selectedInsp.submersiblePumpControl && <div style={{ marginTop: '6px' }}><strong>Submersible Pump:</strong> {selectedInsp.submersiblePumpDesc || 'Yes'}</div>}
                                {selectedInsp.singlePhaseMotorControl && <div style={{ marginTop: '6px' }}><strong>Single Phase Motor:</strong> {selectedInsp.singlePhaseMotorDesc || 'Yes'}</div>}
                            </div>
                        </div>

                        {/* Suggested Products */}
                        <div className="card">
                            <div className="card-header"><h3 className="card-title">Suggested Products</h3></div>
                            <div className="card-body">
                                {selectedInsp.suggestedProducts?.length > 0 ? (
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                        {selectedInsp.suggestedProducts.map(sku => <span key={sku} className="code-badge">{sku}</span>)}
                                    </div>
                                ) : <span style={{ color: 'var(--text-muted)', fontSize: '13px' }}>None suggested</span>}
                            </div>
                        </div>

                        {selectedInsp.notes && (
                            <div className="card" style={{ gridColumn: '1 / -1' }}>
                                <div className="card-header"><h3 className="card-title">Notes</h3></div>
                                <div className="card-body" style={{ fontSize: '14px' }}>{selectedInsp.notes}</div>
                            </div>
                        )}
                        {selectedInsp.siteExtraDetails && (
                            <div className="card" style={{ gridColumn: '1 / -1' }}>
                                <div className="card-header"><h3 className="card-title">Additional Site Details</h3></div>
                                <div className="card-body" style={{ fontSize: '14px' }}>{selectedInsp.siteExtraDetails}</div>
                            </div>
                        )}
                        {(selectedInsp.nextAction || selectedInsp.nextFollowupDate) && (
                            <div className="card" style={{ gridColumn: '1 / -1', background: '#EFF6FF', borderColor: '#BFDBFE' }}>
                                <div className="card-header"><h3 className="card-title">Next Steps</h3></div>
                                <div className="card-body" style={{ fontSize: '14px', display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                                    {selectedInsp.nextAction && <div><strong>Document Required:</strong> {selectedInsp.nextAction}</div>}
                                    {selectedInsp.nextFollowupDate && <div><strong>Follow-up Date:</strong> {new Date(selectedInsp.nextFollowupDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            // ---- RENDER: FORM ----
            return (
                <div>
                    <div className="page-header">
                        <div>
                            <button className="btn btn-secondary btn-sm" onClick={handleCancel} style={{ marginBottom: '8px' }}>← Cancel</button>
                            <h1 className="page-title">New Site Inspection</h1>
                            {draftSaved && <span style={{ fontSize: '11px', color: 'var(--success)', marginLeft: '8px' }}>✓ Draft auto-saved</span>}
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            <button className="btn btn-secondary btn-sm" onClick={handleManualSaveDraft}>💾 Save Draft</button>
                            {step === STEPS.length - 1 && (
                                <button className="btn btn-success" onClick={handleSave} disabled={saving}>
                                    {saving ? 'Submitting...' : '🚀 Submit to Firebase'}
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Step indicator */}
                    <div className="insp-steps">
                        {STEPS.map((s, i) => (
                            <div key={s} className={`insp-step ${i === step ? 'active' : i < step ? 'done' : ''}`}
                                onClick={() => setStep(i)}>
                                <span className="insp-step-num">{i < step ? '✓' : i + 1}</span>
                                {s}
                            </div>
                        ))}
                    </div>

                    <div className="card">
                        <div className="card-body">

                        {/* STEP 0: Customer Info */}
                        {step === 0 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Customer & Site Info</h3>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Customer Name <span>*</span></label>
                                        <input className="form-input" value={form.customerName} onChange={e => setForm(f => ({ ...f, customerName: e.target.value }))} placeholder="e.g., Sharma Industries" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Contact Person on Site</label>
                                        <input className="form-input" value={form.contactPerson} onChange={e => setForm(f => ({ ...f, contactPerson: e.target.value }))} placeholder="Name of person at site" />
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Phone</label>
                                        <input type="tel" className="form-input" value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} placeholder="+91 98765 43210" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Inspected By <span>*</span></label>
                                        <input className="form-input" value={form.inspectedBy} onChange={e => setForm(f => ({ ...f, inspectedBy: e.target.value }))} placeholder="Technician name" />
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">How Did They Hear About Us?</label>
                                    <div className="checklist-row">
                                        {['Friend / Referral', 'Google Search', 'WhatsApp Ad', 'ChatGPT / AI Tools', 'Social Media', 'Exhibition / Event', 'Existing Customer', 'Other'].map(src => (
                                            <div key={src} className={`checklist-item ${form.referenceSource === src ? 'checked' : ''}`}
                                                onClick={() => setForm(f => ({ ...f, referenceSource: src }))}>
                                                {form.referenceSource === src ? '✓ ' : ''}{src}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Site Address</label>
                                    <input className="form-input" value={form.address} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} placeholder="Full site address" />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">GPS Location</label>
                                    {form.gps ? (
                                        <div className="gps-box">
                                            <Icons.MapPin />
                                            <span>Lat: {form.gps.lat}, Lng: {form.gps.lng} (±{form.gps.accuracy}m accuracy)</span>
                                            <button className="btn btn-secondary btn-sm" style={{ marginLeft: 'auto' }} onClick={() => setForm(f => ({ ...f, gps: null }))}>Clear</button>
                                        </div>
                                    ) : (
                                        <div className="gps-box no-gps">
                                            <Icons.MapPin />
                                            <span style={{ color: '#92400E' }}>GPS not captured yet</span>
                                            <button className="btn btn-primary btn-sm" style={{ marginLeft: 'auto' }} onClick={captureGPS}>📍 Capture GPS</button>
                                        </div>
                                    )}
                                </div>
                                {/* Site photos */}
                                <div className="form-group">
                                    <label className="form-label">Site Overview Photos</label>
                                    <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '8px' }}>
                                        <button className="photo-btn" onClick={() => triggerCamera(photo => setForm(f => ({ ...f, sitePhotos: [...(f.sitePhotos || []), photo] })))}>
                                            <Icons.Camera /> Take Photo
                                        </button>
                                        {(form.sitePhotos || []).map((p, i) => (
                                            <span key={i} className="photo-record" style={{ cursor: 'pointer' }} onClick={() => setForm(f => ({ ...f, sitePhotos: f.sitePhotos.filter((_, x) => x !== i) }))}>
                                                📷 {p.filename} ✕
                                            </span>
                                        ))}
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Photos stay on your phone. Tap a badge to remove it.</div>
                                </div>
                            </div>
                        )}

                        {/* STEP 1: Tanks */}
                        {step === 1 && (
                            <div>
                                <div className="form-group">
                                    <label className="form-label">Property Type</label>
                                    <div className="checklist-row">
                                        {['Housing Society', 'Bungalow', 'Building', 'Chawl', 'Industrial', 'Other'].map(pt => (
                                            <div key={pt} className={`checklist-item ${form.propertyType === pt ? 'checked' : ''}`}
                                                onClick={() => setForm(f => ({ ...f, propertyType: pt }))}>
                                                {form.propertyType === pt ? '✓ ' : ''}{pt}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {['Housing Society', 'Building', 'Chawl'].includes(form.propertyType) && (
                                    <div className="form-row" style={{ marginBottom: '16px' }}>
                                        <div className="form-group" style={{ marginBottom: 0 }}>
                                            <label className="form-label">Number of Buildings / Wings</label>
                                            <input type="number" className="form-input" value={form.numBuildings} onChange={e => setForm(f => ({ ...f, numBuildings: e.target.value }))} placeholder="e.g., 6" min="1" />
                                        </div>
                                        <div className="form-group" style={{ marginBottom: 0 }}>
                                            <label className="form-label">Floors per Building</label>
                                            <input type="number" className="form-input" value={form.numFloors} onChange={e => setForm(f => ({ ...f, numFloors: e.target.value }))} placeholder="e.g., 12" min="1" />
                                        </div>
                                    </div>
                                )}
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                                    <h3 style={{ color: 'var(--primary)' }}>Tanks ({form.tanks.length})</h3>
                                    <button className="btn btn-secondary btn-sm" onClick={addTank}><Icons.Plus /> Add Tank</button>
                                </div>
                                {form.tanks.map((tank, idx) => (
                                    <div key={idx} className="tank-card">
                                        <div className="tank-card-header">
                                            <span className="tank-card-label">{tank.label || `Tank ${idx + 1}`}</span>
                                            {form.tanks.length > 1 && (
                                                <button className="btn btn-danger btn-sm btn-icon" onClick={() => removeTank(idx)}><Icons.X /></button>
                                            )}
                                        </div>
                                        <div className="tank-grid" style={{ marginBottom: '10px' }}>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Label</label>
                                                <input className="form-input" value={tank.label} onChange={e => updateTank(idx, 'label', e.target.value)} placeholder="e.g., OH-1, UG-3" />
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Type</label>
                                                <select className="form-select" value={tank.type} onChange={e => updateTank(idx, 'type', e.target.value)}>
                                                    {TANK_TYPES.map(t => <option key={t}>{t}</option>)}
                                                </select>
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Material</label>
                                                <select className="form-select" value={tank.material} onChange={e => updateTank(idx, 'material', e.target.value)}>
                                                    {TANK_MATERIALS.map(m => <option key={m}>{m}</option>)}
                                                </select>
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Height/Depth (ft)</label>
                                                <input type="number" className="form-input" value={tank.height} onChange={e => updateTank(idx, 'height', e.target.value)} placeholder="e.g., 8" />
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Capacity (Litres)</label>
                                                <input type="number" className="form-input" value={tank.capacity} onChange={e => updateTank(idx, 'capacity', e.target.value)} placeholder="e.g., 5000" />
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Tank Photos</label>
                                                <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '6px' }}>
                                                    <button className="photo-btn" style={{ padding: '6px 10px', fontSize: '12px' }} onClick={() => addTankPhoto(idx)}>
                                                        <Icons.Camera /> Add Photo
                                                    </button>
                                                    {(tank.photos || []).map((p, pi) => (
                                                        <span key={pi} className="photo-record" style={{ cursor: 'pointer' }} onClick={() => {
                                                            setForm(f => {
                                                                const tanks = [...f.tanks];
                                                                tanks[idx] = { ...tanks[idx], photos: tanks[idx].photos.filter((_, x) => x !== pi) };
                                                                return { ...f, tanks };
                                                            });
                                                        }}>📷 {p.filename} ✕</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="form-row" style={{ marginTop: '8px' }}>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Wire Routing Possible?</label>
                                                <select className="form-select" value={tank.wireRouting} onChange={e => updateTank(idx, 'wireRouting', e.target.value)}>
                                                    <option value="">Select</option>
                                                    <option>Yes — Easy Access</option>
                                                    <option>Yes — Conduit Required</option>
                                                    <option>Partial — Some Challenges</option>
                                                    <option>No — Wireless Only</option>
                                                </select>
                                            </div>
                                            <div className="form-group" style={{ marginBottom: 0 }}>
                                                <label className="form-label">Wire Routing Notes</label>
                                                <input className="form-input" value={tank.wireNotes} onChange={e => updateTank(idx, 'wireNotes', e.target.value)} placeholder="e.g., 20m cable, 2 bends needed" />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                <button className="btn btn-secondary" style={{ width: '100%' }} onClick={addTank}><Icons.Plus /> Add Another Tank</button>
                            </div>
                        )}

                        {/* STEP 2: Site Conditions */}
                        {step === 2 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Site Conditions</h3>
                                <div className="form-group">
                                    <label className="form-label">Tank Layout</label>
                                    <select className="form-select" value={form.clustered} onChange={e => setForm(f => ({ ...f, clustered: e.target.value }))}>
                                        <option>Clustered (&lt;50m)</option>
                                        <option>Spread (50-200m)</option>
                                        <option>Far Apart (&gt;200m)</option>
                                    </select>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Power Available Near Tanks?</label>
                                        <select className="form-select" value={form.power} onChange={e => setForm(f => ({ ...f, power: e.target.value }))}>
                                            <option>Yes</option><option>No</option><option>Partial</option>
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">WiFi / Internet Available?</label>
                                        <select className="form-select" value={form.wifi} onChange={e => setForm(f => ({ ...f, wifi: e.target.value }))}>
                                            <option>Yes</option><option>No</option><option>Can Arrange</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Distance to Control Room (meters)</label>
                                        <input type="number" className="form-input" value={form.controlRoomDistance} onChange={e => setForm(f => ({ ...f, controlRoomDistance: e.target.value }))} placeholder="e.g., 50" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Pump Automation Needed?</label>
                                        <select className="form-select" value={form.pumpAutomation} onChange={e => setForm(f => ({ ...f, pumpAutomation: e.target.value }))}>
                                            <option>No</option><option>Yes</option><option>Future</option>
                                        </select>
                                    </div>
                                </div>
                                {form.pumpAutomation === 'Yes' && (
                                    <div className="form-group">
                                        <label className="form-label">Number of Pumps</label>
                                        <input type="number" className="form-input" value={form.pumpCount} onChange={e => setForm(f => ({ ...f, pumpCount: e.target.value }))} placeholder="e.g., 4" style={{ maxWidth: '150px' }} />
                                    </div>
                                )}
                                <div className="form-group">
                                    <label className="form-label">Site Condition Photos</label>
                                    <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '8px' }}>
                                        <button className="photo-btn" onClick={() => triggerCamera(photo => setForm(f => ({ ...f, siteConditionPhotos: [...(f.siteConditionPhotos || []), photo] })))}>
                                            <Icons.Camera /> Take Photo
                                        </button>
                                        {(form.siteConditionPhotos || []).map((p, i) => (
                                            <span key={i} className="photo-record" style={{ cursor: 'pointer' }} onClick={() => setForm(f => ({ ...f, siteConditionPhotos: f.siteConditionPhotos.filter((_, x) => x !== i) }))}>
                                                📷 {p.filename} ✕
                                            </span>
                                        ))}
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Photos stay on your phone. Tap a photo badge to remove it.</div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Additional Site Details</label>
                                    <textarea className="form-textarea" rows="3" value={form.siteExtraDetails} onChange={e => setForm(f => ({ ...f, siteExtraDetails: e.target.value }))} placeholder="e.g., Rooftop access via external staircase, corrosive environment near tank 3, CCTV room nearby, conduit already in place..." />
                                </div>
                            </div>
                        )}

                        {/* STEP 3: Requirements */}
                        {step === 3 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Monitoring & Control Requirements</h3>
                                <div className="form-group">
                                    <label className="form-label">What to Monitor?</label>
                                    <div className="checklist-row">
                                        {MONITORING_OPTIONS.map(opt => (
                                            <div key={opt} className={`checklist-item ${form.monitoring.includes(opt) ? 'checked' : ''}`}
                                                onClick={() => toggleCheck('monitoring', opt)}>
                                                {form.monitoring.includes(opt) ? '✓ ' : ''}{opt}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Alerts Required?</label>
                                    <div className="checklist-row">
                                        {ALERT_OPTIONS.map(opt => (
                                            <div key={opt} className={`checklist-item ${form.alerts.includes(opt) ? 'checked' : ''}`}
                                                onClick={() => toggleCheck('alerts', opt)}>
                                                {form.alerts.includes(opt) ? '✓ ' : ''}{opt}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label" style={{ marginBottom: '10px' }}>Control Requirements</label>
                                    {[
                                        { key: 'valveControl', descKey: 'valveControlDesc', label: 'Valve Control', placeholder: 'e.g., 4 motorised ball valves, 2 inch' },
                                        { key: 'submersiblePumpControl', descKey: 'submersiblePumpDesc', label: 'Submersible Pump Control', placeholder: 'e.g., 2 pumps, 1HP each, 3-phase' },
                                        { key: 'singlePhaseMotorControl', descKey: 'singlePhaseMotorDesc', label: 'Single Phase Motor Control', placeholder: 'e.g., 3 motors, 0.5HP, star-delta starter needed' },
                                    ].map(ctrl => (
                                        <div key={ctrl.key} style={{ background: 'var(--bg)', borderRadius: '8px', padding: '12px', marginBottom: '10px' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer', fontWeight: 600, fontSize: '14px' }}>
                                                <input type="checkbox" checked={form[ctrl.key]} onChange={e => setForm(f => ({ ...f, [ctrl.key]: e.target.checked }))} style={{ width: '18px', height: '18px' }} />
                                                {ctrl.label}
                                            </label>
                                            {form[ctrl.key] && (
                                                <input className="form-input" style={{ marginTop: '8px' }} value={form[ctrl.descKey]} onChange={e => setForm(f => ({ ...f, [ctrl.descKey]: e.target.value }))} placeholder={ctrl.placeholder} />
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* STEP 4: Recommendation */}
                        {step === 4 && (
                            <div>
                                <h3 style={{ marginBottom: '16px', color: 'var(--primary)' }}>Technician Recommendations</h3>
                                <div className="form-group">
                                    <label className="form-label">Notes / Observations</label>
                                    <textarea className="form-textarea" rows="4" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="e.g., Tanks on rooftop, cable tray needed, corrosive environment near tank 3..." />
                                </div>
                                <div className="form-row">
                                    <div className="form-group" style={{ marginBottom: 0 }}>
                                        <label className="form-label">Next Document Required</label>
                                        <select className="form-select" value={form.nextAction} onChange={e => setForm(f => ({ ...f, nextAction: e.target.value }))}>
                                            <option value="">— Select —</option>
                                            <option>Presentation</option>
                                            <option>Quotation</option>
                                            <option>Revised Quotation</option>
                                            <option>Proposal</option>
                                            <option>Demo / POC</option>
                                            <option>Site Survey Report</option>
                                            <option>Purchase Order Expected</option>
                                            <option>Follow-up Call Only</option>
                                        </select>
                                    </div>
                                    <div className="form-group" style={{ marginBottom: 0 }}>
                                        <label className="form-label">Next Follow-up Date</label>
                                        <input type="date" className="form-input" value={form.nextFollowupDate} onChange={e => setForm(f => ({ ...f, nextFollowupDate: e.target.value }))} />
                                    </div>
                                </div>
                                {products.length > 0 && (
                                    <div className="form-group">
                                        <label className="form-label">Suggested Products <span style={{ fontWeight: 400, color: 'var(--text-muted)', fontSize: '12px' }}>(optional — tap to select)</span></label>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '6px' }}>
                                            {products.map(p => (
                                                <div key={p.sku} className={`checklist-item ${(form.suggestedProducts || []).includes(p.sku) ? 'checked' : ''}`}
                                                    onClick={() => toggleProduct(p.sku)}>
                                                    {(form.suggestedProducts || []).includes(p.sku) ? '✓ ' : ''}{p.sku} – {p.name}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        </div>
                    </div>

                    {/* Navigation */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '16px' }}>
                        <button className="btn btn-secondary" onClick={() => step > 0 ? setStep(step - 1) : handleCancel()}>
                            ← {step === 0 ? 'Cancel' : 'Back'}
                        </button>
                        {step < STEPS.length - 1 ? (
                            <button className="btn btn-primary" onClick={() => setStep(step + 1)}>
                                Next →
                            </button>
                        ) : (
                            <button className="btn btn-success" onClick={handleSave} disabled={saving}>
                                {saving ? 'Submitting...' : '🚀 Submit to Firebase'}
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // ============ PROJECTS ============
        const Projects = () => {
            const [projects, setProjects] = useState([]);
            const [view, setView] = useState('list'); // 'list' | 'form' | 'detail'
            const [selectedProject, setSelectedProject] = useState(null);
            const [projectTasks, setProjectTasks] = useState([]);
            const [filter, setFilter] = useState('all');
            const [members, setMembers] = useState(() => JSON.parse(localStorage.getItem('mvs_team_members') || '[]'));
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [showTaskForm, setShowTaskForm] = useState(false);
            const [expandedTaskId, setExpandedTaskId] = useState(null);
            const [noteText, setNoteText] = useState('');
            const [projNoteText, setProjNoteText] = useState('');
            const [extendDate, setExtendDate] = useState('');
            const [extendReason, setExtendReason] = useState('');
            const [showExtendForm, setShowExtendForm] = useState(null);
            const myName = localStorage.getItem('mvs_my_name') || '';

            const emptyProject = {
                title: '', description: '', category: 'Sales Lead',
                status: 'Active', priority: 'Medium',
                responsiblePerson: '', teamMembers: [],
                startDate: new Date().toISOString().split('T')[0],
                targetDate: '', goal: '', linkedInspectionId: '',
                projectNotes: []
            };
            const emptyProjectTask = {
                projectId: '', title: '', assignedTo: '', assignedBy: myName,
                targetDate: '', priority: 'Medium', status: 'Open',
                extensions: [], updates: [], lesson: '', outcome: ''
            };

            const [form, setForm] = useState(emptyProject);
            const [editingId, setEditingId] = useState(null);
            const [taskForm, setTaskForm] = useState(emptyProjectTask);

            const CATEGORIES = ['Sales Lead','Installation','Internal','Product Development','Service','Other'];
            const STATUSES = ['Planning','Active','On Hold','Completed'];
            const PRIORITIES = ['Low','Medium','High','Urgent'];
            const TASK_STATUSES = ['Open','In Progress','Completed','Blocked'];

            useEffect(() => { loadProjects(); }, []);

            const loadProjects = async () => {
                setLoading(true);
                const data = await FirebaseProjects.getProjects();
                setProjects(data);
                // cache members from firebase team_members if not already cached
                try {
                    const snap = await db.collection('team_members').orderBy('name').get();
                    const m = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (m.length) {
                        setMembers(m);
                        localStorage.setItem('mvs_team_members', JSON.stringify(m));
                    }
                } catch(e) {}
                setLoading(false);
            };

            const loadProjectTasks = async (projectId) => {
                const tasks = await FirebaseProjects.getProjectTasks(projectId);
                setProjectTasks(tasks);
            };

            const openDetail = (project) => {
                setSelectedProject(project);
                setView('detail');
                loadProjectTasks(project.firebaseId);
                setExpandedTaskId(null);
                setShowTaskForm(false);
                setNoteText('');
                setProjNoteText('');
            };

            const openForm = (project = null) => {
                if (project) {
                    setForm({ ...emptyProject, ...project });
                    setEditingId(project.firebaseId);
                } else {
                    setForm(emptyProject);
                    setEditingId(null);
                }
                setView('form');
            };

            const saveProject = async () => {
                if (!form.title.trim()) { alert('Title is required'); return; }
                setSaving(true);
                const data = { ...form };
                delete data.firebaseId;
                if (editingId) {
                    await FirebaseProjects.updateProject(editingId, data);
                    await loadProjects();
                    // refresh selectedProject if in detail
                    if (selectedProject && selectedProject.firebaseId === editingId) {
                        const updated = { ...data, firebaseId: editingId };
                        setSelectedProject(updated);
                        setView('detail');
                    } else {
                        setView('list');
                    }
                } else {
                    await FirebaseProjects.addProject(data);
                    await loadProjects();
                    setView('list');
                }
                setSaving(false);
            };

            const deleteProject = async (project) => {
                const pw = prompt('Enter admin password to delete this project:');
                if (pw !== 'admin123') { alert('Incorrect password'); return; }
                if (!confirm(`Delete project "${project.title}" and all its tasks?`)) return;
                setSaving(true);
                // delete all project tasks first
                const tasks = await FirebaseProjects.getProjectTasks(project.firebaseId);
                for (const t of tasks) { await FirebaseProjects.deleteProjectTask(t.firebaseId); }
                await FirebaseProjects.deleteProject(project.firebaseId);
                await loadProjects();
                setView('list');
                setSaving(false);
            };

            const saveTask = async () => {
                if (!taskForm.title.trim()) { alert('Task title required'); return; }
                setSaving(true);
                const data = { ...taskForm, projectId: selectedProject.firebaseId };
                delete data.firebaseId;
                const newId = await FirebaseProjects.addProjectTask(data);
                const newTask = { ...data, firebaseId: newId, createdAt: new Date().toISOString() };
                setProjectTasks(prev => [newTask, ...prev]);
                setTaskForm({ ...emptyProjectTask, projectId: selectedProject.firebaseId });
                setShowTaskForm(false);
                setSaving(false);
            };

            const updateTaskStatus = async (task, newStatus) => {
                await FirebaseProjects.updateProjectTask(task.firebaseId, { status: newStatus });
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const addTaskNote = async (task) => {
                if (!noteText.trim()) return;
                const updates = [...(task.updates || []), { text: noteText, by: myName, at: new Date().toISOString() }];
                await FirebaseProjects.updateProjectTask(task.firebaseId, { updates });
                setNoteText('');
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const extendTaskDate = async (task) => {
                if (!extendDate) { alert('Select a new target date'); return; }
                const extensions = [...(task.extensions || []), { from: task.targetDate, to: extendDate, reason: extendReason, at: new Date().toISOString(), by: myName }];
                await FirebaseProjects.updateProjectTask(task.firebaseId, { targetDate: extendDate, extensions });
                setExtendDate(''); setExtendReason(''); setShowExtendForm(null);
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const deleteTask = async (task) => {
                if (!confirm('Delete this task?')) return;
                await FirebaseProjects.deleteProjectTask(task.firebaseId);
                await loadProjectTasks(selectedProject.firebaseId);
            };

            const addProjectNote = async () => {
                if (!projNoteText.trim()) return;
                const notes = [...(selectedProject.projectNotes || []), { text: projNoteText, by: myName, at: new Date().toISOString() }];
                await FirebaseProjects.updateProject(selectedProject.firebaseId, { projectNotes: notes });
                const updated = { ...selectedProject, projectNotes: notes };
                setSelectedProject(updated);
                setProjects(prev => prev.map(p => p.firebaseId === updated.firebaseId ? updated : p));
                setProjNoteText('');
            };

            const priorityColor = (p) => ({ Low: '#9CA3AF', Medium: '#3B82F6', High: '#F97316', Urgent: '#EF4444' }[p] || '#9CA3AF');
            const statusColor = (s) => ({ Planning: '#8B5CF6', Active: '#10B981', 'On Hold': '#F59E0B', Completed: '#6B7280' }[s] || '#6B7280');
            const taskStatusColor = (s) => ({ Open: '#3B82F6', 'In Progress': '#F59E0B', Completed: '#10B981', Blocked: '#EF4444' }[s] || '#6B7280');

            const isOverdue = (date) => date && new Date(date) < new Date() && true;
            const daysRemaining = (date) => {
                if (!date) return null;
                const diff = Math.ceil((new Date(date) - new Date()) / 86400000);
                return diff;
            };

            const filteredProjects = useMemo(() => {
                if (filter === 'all') return projects;
                if (filter === 'active') return projects.filter(p => p.status === 'Active');
                if (filter === 'completed') return projects.filter(p => p.status === 'Completed');
                if (filter === 'onhold') return projects.filter(p => p.status === 'On Hold');
                return projects;
            }, [projects, filter]);

            // — List View —
            const renderListView = () => (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Projects</h1>
                        <button className="btn btn-primary" onClick={() => openForm()}>+ New Project</button>
                    </div>
                    <div style={{display:'flex', gap:'8px', marginBottom:'16px', flexWrap:'wrap'}}>
                        {[['all','All'],['active','Active'],['onhold','On Hold'],['completed','Completed']].map(([k,l]) => (
                            <button key={k} className={`btn btn-sm ${filter===k ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setFilter(k)}>{l}</button>
                        ))}
                    </div>
                    {loading ? <div style={{textAlign:'center',padding:'40px',color:'var(--text-secondary)'}}>Loading...</div> :
                        filteredProjects.length === 0 ? <div style={{textAlign:'center',padding:'40px',color:'var(--text-secondary)'}}>No projects found. Create one!</div> :
                        filteredProjects.map(p => {
